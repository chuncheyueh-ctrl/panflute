<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle 教學管理系統 v10.1.3</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f7f3df;
  color:#2d2d2d;
}
.layout{display:flex;min-height:100vh;}
.sidebar{
  width:260px;
  background:#83dbc9;
  padding:24px;
}
.logo{
  font-size:42px;
  font-weight:900;
  color:white;
}
.ver{
  margin-top:10px;
  color:white;
  font-weight:700;
}
.menu button{
  width:100%;
  border:none;
  border-radius:20px;
  padding:18px;
  margin-top:16px;
  font-size:20px;
  font-weight:900;
}
.main{flex:1;padding:36px;}
.card{
  background:white;
  border-radius:24px;
  padding:24px;
  margin-bottom:24px;
  border:1px solid #eadfc8;
}
.growth-bar{
  display:flex;
  overflow:hidden;
  height:22px;
  border-radius:999px;
  background:#ece6d7;
}
.seg{height:100%;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.chip{
  color:white;
  padding:6px 12px;
  border-radius:999px;
  font-weight:800;
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">🎵 教學管理系統</div>
    <div class="ver">v10.1.3 穩定版</div>
    <div class="menu">
      <button style="background:#f7e38a">🎒 上課介面</button>
      <button>🧑‍🎓 學生端</button>
      <button>🎭 演出中心</button>
    </div>
  </aside>

  <main class="main">
    <h1>上課介面</h1>

    <div id="students"></div>
  </main>
</div>

<script>
const growthTypes = [
  {name:"氣息",color:"#2fb37b",xp:10},
  {name:"音色",color:"#4b8df8",xp:10},
  {name:"節奏",color:"#f2a93b",xp:10},
  {name:"視譜",color:"#8b6cf6",xp:10},
  {name:"合奏",color:"#22a6b3",xp:10},
  {name:"幫助同學",color:"#d4a017",xp:15},
];

const students = [
  {
    name:"戴宸睿",
    school:"康樂國小",
    logs:[
      {type:"節奏",xp:10},
      {type:"節奏",xp:10},
      {type:"氣息",xp:10},
      {type:"幫助同學",xp:15},
    ]
  },
  {
    name:"高海媗",
    school:"銅蘭國小",
    logs:[
      {type:"音色",xp:10},
      {type:"視譜",xp:10},
    ]
  }
];

function typeColor(type){
  const t = growthTypes.find(x=>x.name===type);
  return t ? t.color : "#999";
}

function renderStudent(student){
  let total = 0;
  const map = {};

  student.logs.forEach(log=>{
    total += log.xp;
    map[log.type] = (map[log.type] || 0) + log.xp;
  });

  const segs = Object.entries(map).map(([type,val])=>{
    const w = (val/total)*100;
    return `<div class="seg" style="width:${w}%;background:${typeColor(type)}"></div>`;
  }).join("");

  const chips = Object.entries(map).map(([type,val])=>{
    return `<div class="chip" style="background:${typeColor(type)}">${type} ${val}XP</div>`;
  }).join("");

  return `
    <div class="card">
      <h2>${student.name}</h2>
      <div>${student.school}</div>
      <h3>累積 ${total} XP</h3>

      <div class="growth-bar">
        ${segs}
      </div>

      <div class="chips">
        ${chips}
      </div>
    </div>
  `;
}

document.getElementById("students").innerHTML =
  students.map(renderStudent).join("");
</script>
</body>
</html>
