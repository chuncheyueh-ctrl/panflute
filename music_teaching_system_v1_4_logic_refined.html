<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>教學管理系統 v1.4</title>
<style>
:root{--bg:#fbf8ed;--panel:#fffdf7;--card:#ffffffcc;--ink:#2f2b27;--muted:#7b746b;--line:#e9dcc4;--brand:#42a6b5;--brand2:#f6cf69;--danger:#df6371;--ok:#69b58a;--shadow:0 14px 34px rgba(94,76,44,.12);--r:22px;--sidebar:260px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 20% 5%,#fff2bf 0 12%,transparent 36%),linear-gradient(120deg,#fffaf0,#f4fbf8 72%,#eef8fb);min-height:100vh}.app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;padding:22px 16px;border-right:1px solid var(--line);background:rgba(255,253,246,.86);backdrop-filter:blur(18px);overflow:auto}.brand{background:linear-gradient(135deg,#fff,#fff3c7);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}.brand h1{font-size:24px;line-height:1.2;margin:0 0 6px}.brand p{margin:0;color:var(--muted);font-weight:700}.nav-title{font-size:12px;color:#9a8d77;margin:18px 8px 8px;font-weight:900;letter-spacing:.08em}.nav button{width:100%;display:flex;gap:10px;align-items:center;border:0;background:transparent;padding:12px 14px;border-radius:16px;font-size:16px;font-weight:900;color:#554f48;text-align:left;cursor:pointer}.nav button:hover{background:#fff5d5}.nav button.active{background:linear-gradient(135deg,#ffe89b,#fff9e5);box-shadow:inset 0 0 0 1px #ead58f;color:#302916}.main{padding:26px 32px 50px;max-width:1260px;width:100%;margin:0 auto}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.page-title{font-size:32px;font-weight:1000;margin:0;display:flex;gap:10px;align-items:center}.badge{display:inline-flex;align-items:center;border-radius:99px;background:#fff0b8;padding:9px 14px;font-weight:900;color:#72570d}.grid{display:grid;gap:18px}.cols2{grid-template-columns:1fr 1fr}.cols3{grid-template-columns:repeat(3,1fr)}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}.card h2{margin:0 0 16px;font-size:22px}.card h3{margin:0 0 12px;font-size:18px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.form-grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:14px;font-weight:900;color:#685e50}input,select,textarea{width:100%;border:1px solid #dfd4c4;background:#fff;border-radius:14px;padding:12px 13px;font-size:16px;color:var(--ink);outline:none}textarea{min-height:92px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(66,166,181,.13)}button{font-family:inherit}.btn{border:0;border-radius:14px;padding:11px 15px;font-size:15px;font-weight:1000;cursor:pointer;background:#f3ead9;color:#3d352b}.btn.primary{background:var(--brand);color:white}.btn.warn{background:var(--brand2)}.btn.danger{background:var(--danger);color:white}.btn.ok{background:var(--ok);color:white}.btn.ghost{background:#fff;border:1px solid var(--line)}.btn:active{transform:translateY(1px)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.table{width:100%;border-collapse:separate;border-spacing:0 10px}.table th{font-size:13px;color:#7b746b;text-align:left;padding:0 10px;font-weight:1000}.table td{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:11px 10px;vertical-align:middle}.table td:first-child{border-left:1px solid var(--line);border-radius:15px 0 0 15px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 15px 15px 0}.pill{display:inline-flex;align-items:center;border-radius:99px;padding:6px 10px;background:#f4ead2;font-size:13px;font-weight:900}.pill.blue{background:#dff3f6;color:#146a76}.pill.red{background:#ffe0e4;color:#9a2533}.pill.green{background:#e0f5e9;color:#207348}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-weight:1000;cursor:pointer}.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}.stat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px}.stat b{display:block;font-size:28px}.stat span{color:var(--muted);font-weight:900}.empty{color:#998e7e;background:#fff7dc;border:1px dashed #e7d193;border-radius:18px;padding:18px;text-align:center;font-weight:900}.mini{font-size:13px;color:var(--muted);font-weight:800}.shop{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}.reward{background:linear-gradient(135deg,#fff,#fff5d5);border:1px solid var(--line);border-radius:22px;padding:16px}.reward .emoji{font-size:34px}.hidden{display:none!important}.fade{animation:fade .18s ease}@keyframes fade{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}canvas{background:#fff;border:1px solid var(--line);border-radius:18px;max-width:100%}@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.nav{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.main{padding:18px}.cols2,.cols3,.form-grid,.form-grid.three{grid-template-columns:1fr}.page-title{font-size:26px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><h1 id="brandName">🎵 教學管理系統</h1><p id="brandSub">可愛穩定版 v1.4</p></div>
    <div class="nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="topbar"><h1 class="page-title" id="pageTitle"></h1><span class="badge">資料存在這台瀏覽器</span></div>
    <section id="page" class="fade"></section>
  </main>
</div>
<script>
'use strict';
const KEY='bt_music_teaching_system_v1';
const uid=(p='id')=>p+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const q=s=>document.querySelector(s); const page=()=>q('#page');
const navItems=[
 {group:'日常操作',items:[['home','⭐','首頁'],['students','🧒','學生管理'],['attendance','✅','出席紀錄'],['lessons','📚','課程紀錄'],['calendar','📅','行事曆'],['scores','📊','成績輸入'],['levels','🎓','分級檢定'],['points','🪙','點數獎勵'],['rewards','🎁','獎品兌換'],['query','🔍','個人查詢'],['stats','📈','統計總覽']]},
 {group:'系統',items:[['settings','⚙️','設定中心']]}
];
const defaultFields=[['name','名稱','text',1],['goal','能力指標','textarea',2],['tech','技巧重點','textarea',3],['rhythm','節奏能力','textarea',4],['range','音域範圍','text',5],['pieces','建議曲目','textarea',6],['standard','通過標準','textarea',7],['note','老師備註','textarea',8],['bonus','通過獎勵點數','number',9]];
function fresh(){const school=uid('school'),unit=uid('unit'),stu=uid('stu');let levels=[];for(let i=1;i<=50;i++)levels.push({id:'basic_'+i,stage:'basic',num:i,values:{name:`第${i}等`,goal:i===1?'能認識排笛與正確吹氣':'可自行編輯能力指標',bonus:i%10===0?'5':'2'}});for(let i=1;i<=15;i++)levels.push({id:'artist_'+i,stage:'artist',num:i,values:{name:`演奏家第${i}級`,goal:'可自行編輯演奏家能力指標',bonus:'5'}});return{version:'1.4',settings:{systemName:'教學管理系統',subtitle:'可愛穩定版 v1.4'},schools:[{id:school,name:'中正國小',active:true}],units:[{id:unit,schoolId:school,name:'三年級',order:1,active:true}],students:[{id:stu,name:'王小明',schoolId:school,unitId:unit,seat:'01',stage:'basic',level:12,code:'A30518',pass:'1476',points:30,totalEarned:30,totalSpent:0,active:true}],fields:defaultFields.map(x=>({id:x[0],name:x[1],type:x[2],order:x[3],active:true})),levels,pointLogs:[{id:uid('pl'),studentId:stu,date:today(),points:30,reason:'示範點數',note:'系統預設資料'}],rewards:[{id:uid('rw'),name:'貼紙',cost:5,stock:30,active:true,note:'小獎勵'},{id:uid('rw'),name:'小鉛筆',cost:10,stock:20,active:true,note:''},{id:uid('rw'),name:'神秘禮物',cost:50,stock:5,active:true,note:''}],redemptions:[],scores:[{id:uid('sc'),studentId:stu,date:today(),pitch:80,rhythm:75,breath:78,finger:82,reading:70,music:76,comment:'示範成績'}],attendance:[],lessons:[],events:[{id:uid('ev'),date:'2026-05-27',title:'維也納表演',type:'演出',schoolId:'',note:''}]};}
let db=load();let state={page:'home',settingsTab:'system',selectedSchoolId:null,selectedUnitSchoolId:null,levelStage:'basic',selectedStudentId:null};
function load(){let raw=null;try{raw=JSON.parse(localStorage.getItem(KEY)||'null')}catch(e){};let d=raw||fresh();return normalize(d)}
function normalize(d){let f=fresh();d.settings={...f.settings,...(d.settings||{})};for(const k of ['schools','units','students','fields','levels','pointLogs','rewards','redemptions','scores','attendance','lessons','events'])if(!Array.isArray(d[k]))d[k]=f[k];d.schools.forEach(x=>{if(x.active===undefined)x.active=true});d.units.forEach(x=>{if(x.active===undefined)x.active=true;if(!x.order)x.order=1});d.students.forEach(x=>{if(x.active===undefined)x.active=true;if(!x.code)x.code=genCode();if(!x.pass)x.pass=genPass();if(!x.points)x.points=0;if(!x.stage)x.stage='basic';if(!x.level)x.level=1});if(!d.fields.length)d.fields=f.fields;if(!d.levels.length)d.levels=f.levels;return d}
function save(){localStorage.setItem(KEY,JSON.stringify(db));renderNavBrand()}
const activeSchools=()=>db.schools.filter(x=>x.active!==false);
const activeUnits=sid=>db.units.filter(u=>u.active!==false&&(!sid||u.schoolId===sid)).sort((a,b)=>(+a.order||0)-(+b.order||0));
const schoolName=id=>(db.schools.find(s=>s.id===id)||{}).name||'未指定學校';
const unitName=id=>(db.units.find(u=>u.id===id)||{}).name||'未指定課程';
const studentName=id=>(db.students.find(s=>s.id===id)||{}).name||'未知學生';
function genCode(){return 'S'+Math.floor(100000+Math.random()*900000)}function genPass(){return String(Math.floor(1000+Math.random()*9000))}
function schoolOptions(selected='',includeAll=false){return (includeAll?'<option value="">全部/不指定</option>':'')+activeSchools().map(s=>`<option value="${s.id}" ${s.id===selected?'selected':''}>${esc(s.name)}</option>`).join('')}
function unitOptions(sid,selected=''){return activeUnits(sid).map(u=>`<option value="${u.id}" ${u.id===selected?'selected':''}>${esc(u.name)}</option>`).join('')||'<option value="">請先新增課程單位</option>'}
function setPage(p){state.page=p;render()}
function renderNavBrand(){q('#brandName').innerHTML='🎵 '+esc(db.settings.systemName||'教學管理系統');q('#brandSub').textContent=db.settings.subtitle||'可愛穩定版';let html='';navItems.forEach(g=>{html+=`<div class="nav-title">${g.group}</div>`;g.items.forEach(([id,ic,tx])=>html+=`<button class="${state.page===id?'active':''}" onclick="setPage('${id}')"><span>${ic}</span><span>${tx}</span></button>`)});q('#nav').innerHTML=html}
function titleFor(){for(const g of navItems)for(const [id,ic,tx] of g.items)if(id===state.page)return `${ic} ${tx}`;return '首頁'}
function render(){renderNavBrand();q('#pageTitle').textContent=titleFor();page().classList.remove('fade');void page().offsetWidth;page().classList.add('fade');const map={home,students,attendance,lessons,calendar,scores,levels,points,rewards,query,stats,settings};(map[state.page]||home)()}
function home(){let total=db.students.filter(s=>s.active!==false).length;let pts=db.students.reduce((a,s)=>a+(+s.points||0),0);page().innerHTML=`<div class="grid cols3"><div class="stat"><b>${total}</b><span>學生數</span></div><div class="stat"><b>${activeSchools().length}</b><span>學校數</span></div><div class="stat"><b>${pts}</b><span>目前總點數</span></div></div><div class="card" style="margin-top:18px"><h2>🌟 今日工作區</h2><div class="row"><button class="btn primary" onclick="setPage('students')">新增學生</button><button class="btn warn" onclick="setPage('points')">快速加點</button><button class="btn" onclick="setPage('lessons')">寫課程紀錄</button><button class="btn" onclick="setPage('calendar')">新增行事曆</button></div></div>`}
function settings(){let tab=state.settingsTab;page().innerHTML=`<div class="tabs"><button class="tab ${tab==='system'?'active':''}" onclick="state.settingsTab='system';settings()">系統設定</button><button class="tab ${tab==='schools'?'active':''}" onclick="state.settingsTab='schools';settings()">學校設定</button><button class="tab ${tab==='units'?'active':''}" onclick="state.settingsTab='units';settings()">課程單位設定</button><button class="tab ${tab==='level'?'active':''}" onclick="state.settingsTab='level';settings()">分級制度設定</button><button class="tab ${tab==='backup'?'active':''}" onclick="state.settingsTab='backup';settings()">備份/匯入</button></div><div id="settingsBody"></div>`;({system:settingsSystem,schools:settingsSchools,units:settingsUnits,level:settingsLevel,backup:settingsBackup}[tab]||settingsSystem)()}
function settingsSystem(){q('#settingsBody').innerHTML=`<div class="card"><h2>⚙️ 系統名稱</h2><div class="form-grid"><div class="field"><label>系統名稱</label><input id="sysName" value="${esc(db.settings.systemName)}"></div><div class="field"><label>副標題</label><input id="sysSub" value="${esc(db.settings.subtitle)}"></div></div><br><button class="btn primary" onclick="db.settings.systemName=q('#sysName').value.trim()||'教學管理系統';db.settings.subtitle=q('#sysSub').value.trim();save();render()">儲存設定</button></div>`}
function settingsSchools(){q('#settingsBody').innerHTML=`<div class="card"><h2>🏫 學校設定</h2><div class="row"><input id="newSchool" placeholder="新增學校名稱" style="max-width:420px"><button class="btn primary" onclick="addSchool()">新增</button></div><table class="table"><thead><tr><th>名稱</th><th>狀態</th><th>操作</th></tr></thead><tbody>${db.schools.map(s=>`<tr><td><input value="${esc(s.name)}" onchange="renameSchool('${s.id}',this.value)"></td><td>${s.active===false?'<span class="pill red">停用</span>':'<span class="pill green">啟用</span>'}</td><td class="row"><button class="btn" onclick="toggleSchool('${s.id}')">${s.active===false?'啟用':'停用'}</button><button class="btn danger" onclick="deleteSchool('${s.id}')">刪除</button></td></tr>`).join('')}</tbody></table></div>`}
function addSchool(){let name=q('#newSchool').value.trim();if(!name)return alert('請輸入學校名稱');let id=uid('school');db.schools.push({id,name,active:true});save();settingsSchools()}
function renameSchool(id,name){let s=db.schools.find(x=>x.id===id);if(s){s.name=name.trim()||s.name;save();render()}}
function toggleSchool(id){let s=db.schools.find(x=>x.id===id);if(s){s.active=s.active===false;save();settingsSchools()}}
function deleteSchool(id){if(db.units.some(u=>u.schoolId===id)||db.students.some(s=>s.schoolId===id)){if(!confirm('這間學校已有課程或學生。建議停用，不建議刪除。仍要刪除嗎？'))return;}db.schools=db.schools.filter(s=>s.id!==id);db.units=db.units.filter(u=>u.schoolId!==id);save();settingsSchools()}
function settingsUnits(){let sid=state.selectedUnitSchoolId||activeSchools()[0]?.id||'';state.selectedUnitSchoolId=sid;q('#settingsBody').innerHTML=`<div class="card"><h2>📚 課程單位設定</h2><div class="form-grid three"><div class="field"><label>學校</label><select id="unitSchool" onchange="state.selectedUnitSchoolId=this.value;settingsUnits()">${schoolOptions(sid)}</select></div><div class="field"><label>課程單位名稱</label><input id="newUnit" placeholder="例如：社團課、排笛隊、三年級"></div><div class="field"><label>排序</label><input id="newUnitOrder" type="number" value="${activeUnits(sid).length+1}"></div></div><br><button class="btn primary" onclick="addUnit()">新增課程單位</button><table class="table"><thead><tr><th>學校</th><th>名稱</th><th>排序</th><th>狀態</th><th>操作</th></tr></thead><tbody>${activeUnits(sid).concat(db.units.filter(u=>u.schoolId===sid&&u.active===false)).map(u=>`<tr><td>${esc(schoolName(u.schoolId))}</td><td><input value="${esc(u.name)}" onchange="updateUnit('${u.id}','name',this.value)"></td><td><input type="number" value="${esc(u.order)}" onchange="updateUnit('${u.id}','order',this.value)"></td><td>${u.active===false?'<span class="pill red">停用</span>':'<span class="pill green">啟用</span>'}</td><td><button class="btn" onclick="toggleUnit('${u.id}')">${u.active===false?'啟用':'停用'}</button></td></tr>`).join('')||'<tr><td colspan="5">尚無課程</td></tr>'}</tbody></table></div>`}
function addUnit(){let sid=q('#unitSchool').value,name=q('#newUnit').value.trim(),order=+q('#newUnitOrder').value||1;if(!sid)return alert('請選學校');if(!name)return alert('請輸入課程單位名稱');db.units.push({id:uid('unit'),schoolId:sid,name,order,active:true});state.selectedUnitSchoolId=sid;save();settingsUnits()}
function updateUnit(id,k,v){let u=db.units.find(x=>x.id===id);if(u){u[k]=k==='order'?+v||1:v.trim();save();settingsUnits()}}
function toggleUnit(id){let u=db.units.find(x=>x.id===id);if(u){u.active=u.active===false;save();settingsUnits()}}
function settingsLevel(){q('#settingsBody').innerHTML=`<div class="grid cols2"><div class="card"><h2>🧩 評量項目設定</h2><p class="mini">這裡設定「每個等級內容會出現哪些欄位」，例如能力指標、技巧重點、建議曲目。可新增、改名、排序、隱藏。</p><div class="form-grid three"><input id="newFieldName" placeholder="新增項目名稱"><select id="newFieldType"><option value="textarea">多行文字</option><option value="text">單行文字</option><option value="number">數字</option></select><button class="btn primary" onclick="addField()">新增項目</button></div><table class="table"><thead><tr><th>項目名稱</th><th>型態</th><th>排序</th><th>狀態</th><th>操作</th></tr></thead><tbody>${db.fields.sort((a,b)=>a.order-b.order).map(f=>`<tr><td><input value="${esc(f.name)}" onchange="updateField('${f.id}','name',this.value)"></td><td><select onchange="updateField('${f.id}','type',this.value)"><option value="text" ${f.type==='text'?'selected':''}>單行文字</option><option value="textarea" ${f.type==='textarea'?'selected':''}>多行文字</option><option value="number" ${f.type==='number'?'selected':''}>數字</option></select></td><td><input type="number" value="${f.order}" onchange="updateField('${f.id}','order',this.value)"></td><td>${f.active===false?'隱藏':'顯示'}</td><td><button class="btn" onclick="toggleField('${f.id}')">${f.active===false?'顯示':'隱藏'}</button></td></tr>`).join('')}</tbody></table></div><div class="card"><h2>📘 等級內容設定</h2><p class="mini">右邊會依左側「評量項目」自動產生欄位。</p><div class="tabs"><button class="tab ${state.levelStage==='basic'?'active':''}" onclick="state.levelStage='basic';settingsLevel()">初中階 1～50等</button><button class="tab ${state.levelStage==='artist'?'active':''}" onclick="state.levelStage='artist';settingsLevel()">演奏家 1～15級</button></div><div id="levelEditor"></div></div></div>`;renderLevelEditor()}
function renderLevelEditor(){let stage=state.levelStage,levels=db.levels.filter(l=>l.stage===stage).sort((a,b)=>a.num-b.num);let sel=q('#levelSelect')?.value||levels[0]?.id;let lv=db.levels.find(l=>l.id===sel)||levels[0];q('#levelEditor').innerHTML=`<div class="field"><label>選擇等級</label><select id="levelSelect" onchange="renderLevelEditor()">${levels.map(l=>`<option value="${l.id}" ${l.id===lv.id?'selected':''}>${esc(l.values.name||lv.num)}</option>`).join('')}</select></div><br>${db.fields.filter(f=>f.active!==false).sort((a,b)=>a.order-b.order).map(f=>`<div class="field"><label>${esc(f.name)}</label>${f.type==='textarea'?`<textarea onchange="updateLevel('${lv.id}','${f.id}',this.value)">${esc(lv.values[f.id]||'')}</textarea>`:`<input type="${f.type==='number'?'number':'text'}" value="${esc(lv.values[f.id]||'')}" onchange="updateLevel('${lv.id}','${f.id}',this.value)">`}</div><br>`).join('')}`}
function addField(){let name=q('#newFieldName').value.trim();if(!name)return alert('請輸入項目名稱');db.fields.push({id:uid('field'),name,type:q('#newFieldType').value,order:db.fields.length+1,active:true});save();settingsLevel()}
function updateField(id,k,v){let f=db.fields.find(x=>x.id===id);if(f){f[k]=k==='order'?+v||1:v;save();settingsLevel()}}
function toggleField(id){let f=db.fields.find(x=>x.id===id);if(f){f.active=f.active===false;save();settingsLevel()}}
function updateLevel(id,fid,v){let lv=db.levels.find(x=>x.id===id);if(lv){lv.values[fid]=v;save();}}
function settingsBackup(){q('#settingsBody').innerHTML=`<div class="card"><h2>💾 備份與匯入</h2><p>建議每次正式輸入大量資料後都匯出備份。</p><div class="row"><button class="btn primary" onclick="exportData()">匯出 JSON 備份</button><label class="btn ghost">匯入 JSON<input type="file" accept="application/json" class="hidden" onchange="importData(this.files[0])"></label><button class="btn danger" onclick="resetData()">重置示範資料</button></div></div>`}
function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='teaching-system-backup-'+today()+'.json';a.click()}
function importData(file){if(!file)return;let r=new FileReader();r.onload=()=>{try{db=normalize(JSON.parse(r.result));save();alert('匯入完成');render()}catch(e){alert('匯入失敗：JSON格式不正確')}};r.readAsText(file)}
function resetData(){if(confirm('會清除這台瀏覽器目前資料，確定？')){db=fresh();save();render()}}
function students(){let sid=state.selectedSchoolId||activeSchools()[0]?.id||'';state.selectedSchoolId=sid;let units=activeUnits(sid);let uidv=units[0]?.id||'';page().innerHTML=`<div class="card"><h2>🧒 學生管理</h2><div class="form-grid three"><div class="field"><label>姓名</label><input id="stuName"></div><div class="field"><label>學校</label><select id="stuSchool" onchange="state.selectedSchoolId=this.value;students()">${schoolOptions(sid)}</select></div><div class="field"><label>課程單位</label><select id="stuUnit">${unitOptions(sid,uidv)}</select></div><div class="field"><label>座號/編號</label><input id="stuSeat"></div><div class="field"><label>階段</label><select id="stuStage"><option value="basic">初中階</option><option value="artist">演奏家</option></select></div><div class="field"><label>等級</label><input id="stuLevel" type="number" value="1"></div></div><br><button class="btn primary" onclick="addStudent()">新增學生</button></div><div class="card" style="margin-top:18px"><table class="table"><thead><tr><th>學生</th><th>學校/課程</th><th>查詢資料</th><th>等級</th><th>點數</th><th>操作</th></tr></thead><tbody>${db.students.filter(s=>s.active!==false).map(s=>`<tr><td><b>${esc(s.name)}</b><br><span class="mini">${esc(s.seat||'')}</span></td><td>${esc(schoolName(s.schoolId))}<br><span class="mini">${esc(unitName(s.unitId))}</span></td><td><b>${esc(s.code)} / ${esc(s.pass)}</b></td><td>${s.stage==='artist'?'演奏家':'初中階'} 第${s.level}${s.stage==='artist'?'級':'等'}</td><td><b>${s.points||0}</b></td><td class="row"><button class="btn" onclick="resetPass('${s.id}')">重設密碼</button><button class="btn danger" onclick="disableStudent('${s.id}')">停用</button></td></tr>`).join('')||'<tr><td colspan="6">尚無學生</td></tr>'}</tbody></table></div>`}
function addStudent(){let name=q('#stuName').value.trim();if(!name)return alert('請輸入姓名');let sid=q('#stuSchool').value,unit=q('#stuUnit').value;if(!sid||!unit)return alert('請先設定學校與課程單位');db.students.push({id:uid('stu'),name,schoolId:sid,unitId:unit,seat:q('#stuSeat').value.trim(),stage:q('#stuStage').value,level:+q('#stuLevel').value||1,code:genCode(),pass:genPass(),points:0,totalEarned:0,totalSpent:0,active:true});state.selectedSchoolId=sid;save();students()}
function resetPass(id){let s=db.students.find(x=>x.id===id);if(s){s.pass=genPass();save();students()}}
function disableStudent(id){let s=db.students.find(x=>x.id===id);if(s&&confirm('停用這位學生？')){s.active=false;save();students()}}
function calendar(){page().innerHTML=`<div class="grid cols2"><div class="card"><h2>📅 新增行事曆事件</h2><div class="field"><label>日期</label><input id="evDate" type="date" value="${today()}"></div><div class="field"><label>事件名稱</label><input id="evTitle" placeholder="例如：期末檢定、演出、停課"></div><div class="field"><label>類型</label><select id="evType"><option>上課</option><option>考試</option><option>演出</option><option>停課</option><option>補課</option><option>兌換日</option></select></div><div class="field"><label>學校</label><select id="evSchool">${schoolOptions('',true)}</select></div><div class="field"><label>備註</label><textarea id="evNote"></textarea></div><button class="btn primary" onclick="addEvent()">新增事件</button></div><div class="card"><h2>📌 事件列表</h2>${db.events.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`<div class="reward" style="margin-bottom:10px"><b>${esc(e.date)}｜${esc(e.title)}</b> <span class="pill red">${esc(e.type)}</span><br><span class="mini">${e.schoolId?esc(schoolName(e.schoolId)):'全部學校'}</span><br><button class="btn danger" onclick="delEvent('${e.id}')">刪除</button></div>`).join('')||'<div class="empty">尚無事件</div>'}</div></div>`}
function addEvent(){let title=q('#evTitle').value.trim();if(!title)return alert('請輸入事件名稱');db.events.push({id:uid('ev'),date:q('#evDate').value,type:q('#evType').value,title,schoolId:q('#evSchool').value,note:q('#evNote').value});save();calendar()}function delEvent(id){db.events=db.events.filter(e=>e.id!==id);save();calendar()}
function lessons(){page().innerHTML=`<div class="grid cols2"><div class="card"><h2>📚 新增課程紀錄</h2>${schoolUnitPicker('lesson')}<div class="field"><label>日期</label><input id="lessonDate" type="date" value="${today()}"></div><div class="field"><label>上課內容</label><textarea id="lessonContent"></textarea></div><div class="field"><label>學生狀況</label><textarea id="lessonStatus"></textarea></div><div class="field"><label>作業/練習目標</label><textarea id="lessonHw"></textarea></div><button class="btn primary" onclick="addLesson()">新增紀錄</button></div><div class="card"><h2>歷史紀錄</h2>${db.lessons.slice().reverse().map(l=>`<div class="reward" style="margin-bottom:10px"><b>${esc(l.date)}｜${esc(schoolName(l.schoolId))} ${esc(unitName(l.unitId))}</b><p>${esc(l.content)}</p><span class="mini">${esc(l.homework||'')}</span></div>`).join('')||'<div class="empty">尚無課程紀錄</div>'}</div></div>`}
function schoolUnitPicker(prefix){let sid=state.selectedSchoolId||activeSchools()[0]?.id||'';return `<div class="form-grid"><div class="field"><label>學校</label><select id="${prefix}School" onchange="state.selectedSchoolId=this.value;render()">${schoolOptions(sid)}</select></div><div class="field"><label>課程單位</label><select id="${prefix}Unit">${unitOptions(sid)}</select></div></div>`}
function addLesson(){db.lessons.push({id:uid('lesson'),date:q('#lessonDate').value,schoolId:q('#lessonSchool').value,unitId:q('#lessonUnit').value,content:q('#lessonContent').value,status:q('#lessonStatus').value,homework:q('#lessonHw').value});save();lessons()}
function attendance(){page().innerHTML=`<div class="card"><h2>✅ 出席紀錄</h2>${schoolUnitPicker('att')}<div class="field"><label>日期</label><input id="attDate" type="date" value="${today()}"></div><br><button class="btn primary" onclick="renderAttendanceList()">載入點名名單</button><div id="attList" style="margin-top:16px"></div></div>`}
function renderAttendanceList(){let sid=q('#attSchool').value,uidv=q('#attUnit').value,students=db.students.filter(s=>s.active!==false&&s.schoolId===sid&&s.unitId===uidv);q('#attList').innerHTML=students.map(s=>`<div class="reward row" style="justify-content:space-between;margin-bottom:8px"><b>${esc(s.name)}</b><select onchange="saveAttendance('${s.id}',this.value)"><option>出席</option><option>缺席</option><option>遲到</option><option>請假</option></select></div>`).join('')||'<div class="empty">這個課程目前沒有學生</div>'}
function saveAttendance(stu,status){db.attendance.push({id:uid('att'),date:q('#attDate').value,studentId:stu,status});if(status==='出席')addPoints(stu,1,'出席','出席自動加點',false);save()}
function scores(){let stuOpts=db.students.filter(s=>s.active!==false).map(s=>`<option value="${s.id}">${esc(s.name)}｜${esc(schoolName(s.schoolId))}</option>`).join('');page().innerHTML=`<div class="grid cols2"><div class="card"><h2>📊 新增成績</h2><div class="field"><label>學生</label><select id="scoreStudent">${stuOpts}</select></div><div class="field"><label>日期</label><input id="scoreDate" type="date" value="${today()}"></div><div class="form-grid three">${[['pitch','音準'],['rhythm','節奏'],['breath','氣息'],['finger','指法'],['reading','視譜'],['music','音樂表現']].map(([id,tx])=>`<div class="field"><label>${tx}</label><input id="${id}" type="number" min="0" max="100" value="80"></div>`).join('')}</div><div class="field"><label>評語</label><textarea id="scoreComment"></textarea></div><button class="btn primary" onclick="addScore()">新增成績</button></div><div class="card"><h2>最近成績</h2>${db.scores.slice(-8).reverse().map(s=>`<div class="reward" style="margin-bottom:8px"><b>${esc(studentName(s.studentId))}</b>｜${esc(s.date)}<br>音準${s.pitch} 節奏${s.rhythm} 氣息${s.breath} 指法${s.finger} 視譜${s.reading} 表現${s.music}</div>`).join('')||'<div class="empty">尚無成績</div>'}</div></div>`}
function addScore(){let obj={id:uid('score'),studentId:q('#scoreStudent').value,date:q('#scoreDate').value,comment:q('#scoreComment').value};['pitch','rhythm','breath','finger','reading','music'].forEach(k=>obj[k]=+q('#'+k).value||0);db.scores.push(obj);save();scores()}
function levels(){let stuOpts=db.students.filter(s=>s.active!==false).map(s=>`<option value="${s.id}">${esc(s.name)}｜${s.stage==='artist'?'演奏家':'初中階'} 第${s.level}</option>`).join('');page().innerHTML=`<div class="card"><h2>🎓 分級檢定</h2><p class="mini">等級內容與評量項目請到「設定中心 → 分級制度設定」修改。</p><div class="form-grid"><div class="field"><label>學生</label><select id="lvStudent">${stuOpts}</select></div><div class="field"><label>評語</label><input id="lvNote" placeholder="例如：通過第12等，節奏穩定"></div></div><br><button class="btn primary" onclick="passLevel()">通過並升級</button></div>`}
function passLevel(){let s=db.students.find(x=>x.id===q('#lvStudent').value);if(!s)return;let current=db.levels.find(l=>l.stage===s.stage&&l.num===+s.level);let bonus=+(current?.values?.bonus||0);if(s.stage==='basic'&&s.level>=50){s.stage='artist';s.level=1}else if(s.stage==='artist'&&s.level>=15){alert('已是最高等級')}else{s.level=(+s.level||1)+1}addPoints(s.id,bonus,'升級成功',q('#lvNote').value,false);save();levels()}
function points(){let sid=state.selectedSchoolId||activeSchools()[0]?.id||'';page().innerHTML=`<div class="card"><h2>🪙 快速加點</h2>${schoolUnitPicker('pt')}<div class="form-grid"><div class="field"><label>點數</label><input id="ptNum" type="number" value="1"></div><div class="field"><label>原因</label><select id="ptReason"><option>準時出席</option><option>帶樂器</option><option>完成練習</option><option>考試進步</option><option>特殊表現</option></select></div></div><br><button class="btn primary" onclick="renderPointList()">載入學生</button><div id="ptList"></div></div>`}
function renderPointList(){let sid=q('#ptSchool').value,uidv=q('#ptUnit').value,students=db.students.filter(s=>s.active!==false&&s.schoolId===sid&&s.unitId===uidv);q('#ptList').innerHTML=`<br><div class="row"><button class="btn warn" onclick="bulkPoints()">勾選學生加點</button></div>`+students.map(s=>`<label class="reward row" style="margin-top:8px"><input type="checkbox" class="ptCheck" value="${s.id}"> <b>${esc(s.name)}</b><span class="pill blue">${s.points||0}點</span></label>`).join('')}
function addPoints(stuId,pts,reason,note='',doSave=true){let s=db.students.find(x=>x.id===stuId);if(!s)return;s.points=(+s.points||0)+(+pts||0);if(pts>0)s.totalEarned=(+s.totalEarned||0)+(+pts||0);else s.totalSpent=(+s.totalSpent||0)+Math.abs(+pts||0);db.pointLogs.push({id:uid('pl'),studentId:stuId,date:today(),points:+pts||0,reason,note});if(doSave)save()}
function bulkPoints(){let pts=+q('#ptNum').value||0,reason=q('#ptReason').value;document.querySelectorAll('.ptCheck:checked').forEach(c=>addPoints(c.value,pts,reason,'批量加點',false));save();points()}
function rewards(){page().innerHTML=`<div class="grid cols2"><div class="card"><h2>🎁 獎品設定</h2><div class="form-grid"><input id="rwName" placeholder="獎品名稱"><input id="rwCost" type="number" placeholder="需要點數"><input id="rwStock" type="number" placeholder="庫存"><input id="rwNote" placeholder="備註"></div><br><button class="btn primary" onclick="addReward()">新增獎品</button></div><div class="card"><h2>🛒 獎品小商店</h2><div class="shop">${db.rewards.filter(r=>r.active!==false).map(r=>`<div class="reward"><div class="emoji">🎁</div><h3>${esc(r.name)}</h3><p><b>${r.cost}</b> 點｜庫存 ${r.stock}</p><button class="btn danger" onclick="toggleReward('${r.id}')">下架</button></div>`).join('')}</div></div></div>`}
function addReward(){db.rewards.push({id:uid('rw'),name:q('#rwName').value.trim()||'未命名獎品',cost:+q('#rwCost').value||0,stock:+q('#rwStock').value||0,note:q('#rwNote').value,active:true});save();rewards()}function toggleReward(id){let r=db.rewards.find(x=>x.id===id);if(r){r.active=false;save();rewards()}}
function query(){page().innerHTML=`<div class="grid cols2"><div class="card"><h2>🔍 個人查詢</h2><div class="field"><label>查詢碼</label><input id="qCode" placeholder="例如 A30518"></div><div class="field"><label>查詢密碼</label><input id="qPass" placeholder="例如 1476"></div><br><button class="btn primary" onclick="doQuery()">查詢</button></div><div id="queryResult" class="card"><div class="empty">請輸入查詢資料</div></div></div>`}
function doQuery(){let s=db.students.find(x=>x.code===q('#qCode').value.trim()&&x.pass===q('#qPass').value.trim()&&x.active!==false);let box=q('#queryResult');if(!s){box.innerHTML='<div class="empty">查無資料，請確認查詢碼與密碼</div>';return}let can=db.rewards.filter(r=>r.active!==false&&r.stock>0&&(+s.points||0)>=r.cost);let scores=db.scores.filter(sc=>sc.studentId===s.id).slice(-1)[0];box.innerHTML=`<h2>哈囉，${esc(s.name)}！</h2><div class="stat"><b>⭐ ${s.points||0} 點</b><span>目前點數</span></div><br><h3>🎁 可以兌換</h3>${can.map(r=>`<span class="pill blue">${esc(r.name)} ${r.cost}點</span>`).join(' ')||'<p class="mini">目前點數還不能兌換獎品，繼續加油！</p>'}<hr><p><b>目前等級：</b>${s.stage==='artist'?'演奏家':'初中階'} 第${s.level}${s.stage==='artist'?'級':'等'}</p>${scores?`<canvas id="radar" width="360" height="260"></canvas><p class="mini">老師評語：${esc(scores.comment||'')}</p>`:''}`;if(scores)drawRadar(scores)}
function drawRadar(sc){let c=q('#radar'),ctx=c.getContext('2d'),cx=180,cy=130,r=85,vals=[sc.pitch,sc.rhythm,sc.breath,sc.finger,sc.reading,sc.music],labs=['音準','節奏','氣息','指法','視譜','表現'];ctx.clearRect(0,0,c.width,c.height);ctx.strokeStyle='#ddd';ctx.fillStyle='#666';ctx.font='14px sans-serif';for(let ring=1;ring<=5;ring++){ctx.beginPath();for(let i=0;i<6;i++){let a=Math.PI*2*i/6-Math.PI/2,x=cx+Math.cos(a)*r*ring/5,y=cy+Math.sin(a)*r*ring/5;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();ctx.stroke()}ctx.beginPath();vals.forEach((v,i)=>{let a=Math.PI*2*i/6-Math.PI/2,x=cx+Math.cos(a)*r*v/100,y=cy+Math.sin(a)*r*v/100;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.closePath();ctx.fillStyle='rgba(66,166,181,.25)';ctx.fill();ctx.strokeStyle='#42a6b5';ctx.stroke();labs.forEach((l,i)=>{let a=Math.PI*2*i/6-Math.PI/2;ctx.fillStyle='#333';ctx.fillText(l,cx+Math.cos(a)*(r+20)-14,cy+Math.sin(a)*(r+20)+5)})}
function stats(){let active=db.students.filter(s=>s.active!==false);page().innerHTML=`<div class="grid cols3"><div class="stat"><b>${active.length}</b><span>學生</span></div><div class="stat"><b>${db.events.length}</b><span>行事曆事件</span></div><div class="stat"><b>${db.lessons.length}</b><span>課程紀錄</span></div></div><div class="card" style="margin-top:18px"><h2>🏆 點數排行榜</h2>${active.slice().sort((a,b)=>(b.points||0)-(a.points||0)).map((s,i)=>`<div class="reward row" style="justify-content:space-between;margin-bottom:8px"><b>${i+1}. ${esc(s.name)}</b><span class="pill blue">${s.points||0}點</span></div>`).join('')}</div>`}
render();
</script>
</body>
</html>
