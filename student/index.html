<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Battle 學生端 v10.1.2.2</title>
  <style>
:root{
  --bg-a:#fff6dc;
  --bg-b:#eef8f3;
  --card:#fffdf7;
  --line:#eadfcb;
  --text:#2f2a23;
  --muted:#746c60;
  --mint:#7fc8a9;
  --mint-dark:#5fae91;
  --blue:#7da6ff;
  --gold:#f5c542;
  --gold-light:#fff0a8;
  --red:#ff8a8a;
  --red-dark:#d95454;
  --gray:#ece6db;
  --shadow:0 8px 22px rgba(120,90,40,.08);
  --radius:22px;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 8% 4%, rgba(255,240,168,.72) 0%, transparent 38%),
    radial-gradient(circle at 94% 8%, rgba(127,200,169,.28) 0%, transparent 32%),
    linear-gradient(135deg,var(--bg-a),var(--bg-b));
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;
}
button,input,select,textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:15px;
  padding:12px 13px;
  background:white;
  color:var(--text);
  outline:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}
button{cursor:pointer}
.app{display:flex;min-height:100vh}
.sidebar{
  width:260px;
  min-width:260px;
  min-height:100vh;
  padding:26px 18px;
  background:linear-gradient(180deg,#8ed4ba,#6fc3a5);
  color:white;
  position:sticky;
  top:0;
  box-shadow:0 14px 32px rgba(80,58,24,.10);
}
.logo{font-size:25px;font-weight:950;line-height:1.25;margin-bottom:6px}
.version{font-size:13px;font-weight:800;opacity:.9;margin-bottom:24px}
.nav button{
  width:100%;
  border:0;
  margin:7px 0;
  padding:14px 16px;
  border-radius:18px;
  background:rgba(255,255,255,.9);
  color:#255145;
  font-weight:950;
  text-align:left;
  box-shadow:0 4px 12px rgba(80,58,24,.06);
}
.nav button.active{
  background:#fff2a7;
  color:#654d00;
  box-shadow:0 7px 18px rgba(75,55,0,.14);
}
.main{flex:1;padding:30px 36px;overflow:auto}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
h1{font-size:34px;margin:0;font-weight:950}
.badge{
  padding:10px 16px;
  border-radius:999px;
  background:#fff0a8;
  color:#654d00;
  font-weight:950;
  white-space:nowrap;
}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
.card{
  background:rgba(255,253,247,.96);
  border:1px solid #eadfcb;
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
}
.col-12{grid-column:span 12}
.col-8{grid-column:span 8}
.col-7{grid-column:span 7}
.col-6{grid-column:span 6}
.col-5{grid-column:span 5}
.col-4{grid-column:span 4}
.col-3{grid-column:span 3}
.row{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;align-items:end}
.f12{grid-column:span 12}.f9{grid-column:span 9}.f8{grid-column:span 8}.f6{grid-column:span 6}.f4{grid-column:span 4}.f3{grid-column:span 3}.f2{grid-column:span 2}
h2,h3{margin:0 0 14px}
label{display:block;margin:0 0 6px;font-size:13px;font-weight:950;color:#51493e}
input,select,textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:15px;
  padding:12px 13px;
  background:white;
  color:var(--text);
  outline:none;
}
textarea{min-height:95px;resize:vertical;line-height:1.6}
.btn{
  border:0;
  border-radius:15px;
  padding:11px 14px;
  font-weight:950;
  background:var(--gray);
  color:var(--text);
  box-shadow:0 4px 10px rgba(70,50,25,.05);
}
.btn.primary{background:var(--mint);color:white}
.btn.gold{background:var(--gold);color:#4d3900}
.btn.blue{background:var(--blue);color:white}
.btn.red{background:var(--red);color:white}
.btn.dark{background:#31584f;color:white}
.btn.small{padding:7px 10px;border-radius:12px;font-size:13px}
.btn.ghost{background:#fff;border:1px solid var(--line)}
.note{
  background:#fff8d9;
  border:1px dashed #e7d184;
  color:#675b37;
  padding:12px 14px;
  border-radius:15px;
  line-height:1.6;
  font-weight:700;
}
.tabs{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.tabs button{
  border:0;
  border-radius:999px;
  padding:10px 14px;
  background:#f0eadc;
  font-weight:950;
}
.tabs button.active{background:var(--mint-dark);color:white}
.table{width:100%;border-collapse:separate;border-spacing:0 9px}
.table th{text-align:left;color:#6b6256;font-size:13px;padding:0 10px}
.table td{background:white;padding:10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:middle}
.table td:first-child{border-left:1px solid var(--line);border-radius:15px 0 0 15px}
.table td:last-child{border-right:1px solid var(--line);border-radius:0 15px 15px 0}
.inactive-row td{background:#f2eee6;color:#999}
.student-card{
  display:grid;
  grid-template-columns:minmax(220px,1.5fr) 118px minmax(330px,1.7fr);
  align-items:center;
  gap:14px;
}
.student-name{font-size:24px;font-weight:950;margin-bottom:4px}
.student-meta{font-size:13px;color:var(--muted);font-weight:800;line-height:1.7}
.point-box{
  background:linear-gradient(180deg,#fff5b7,#f5c542);
  border:2px solid #f1c94c;
  color:#5a4300;
  border-radius:19px;
  text-align:center;
  padding:10px;
  box-shadow:0 7px 16px rgba(180,130,0,.12);
}
.point-box .star{font-size:26px;line-height:1}
.point-box .num{font-size:34px;font-weight:950;line-height:1.05}
.point-box .label{font-size:12px;font-weight:950}
.actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.status-pill{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  background:#eee6da;
  font-size:12px;
  font-weight:950;
}
.status-present{background:#dff3e9;color:#2f755e}
.status-absent{background:#ffe1e1;color:#b13d3d}
.status-late{background:#e6efff;color:#335aa8}
.status-leave{background:#eee;color:#555}
.check-list{display:flex;gap:8px;flex-wrap:wrap}
.check-chip{background:white;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:14px;font-weight:900}
.small-muted{color:var(--muted);font-size:12px;font-weight:800}
.two-line{line-height:1.55}
.history-list{display:flex;flex-direction:column;gap:10px}
.history-item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}
hr{border:0;border-top:1px solid var(--line);margin:18px 0}

.reward-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.reward-card{
  background:#fffdf7;
  border:1px solid var(--line);
  border-radius:22px;
  padding:14px;
  box-shadow:0 8px 20px rgba(120,90,40,.08);
}
.reward-img{
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  border-radius:16px;
  background:#f1eadf;
  border:1px solid var(--line);
}
.reward-name{font-size:18px;font-weight:950;margin-top:10px}
.reward-cost{font-size:22px;font-weight:950;color:#6b5000;margin:6px 0}
.reward-meta{font-size:13px;color:var(--muted);font-weight:800;line-height:1.6}
.preview-img{
  width:180px;
  max-width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  border-radius:16px;
  border:1px solid var(--line);
  background:#f1eadf;
  display:block;
  margin-top:10px;
}

@media(max-width:1000px){
  .app{display:block}
  .sidebar{position:static;width:100%;min-width:0;min-height:auto}
  .main{padding:22px}
  .col-8,.col-7,.col-6,.col-5,.col-4,.col-3,.f9,.f8,.f6,.f4,.f3,.f2{grid-column:span 12}
  .student-card{grid-template-columns:1fr}
  .actions{justify-content:flex-start}
}

/* =========================================================
   v3.4.3 精緻 UI：桌機按鈕縮小，小螢幕保留好按
   ========================================================= */
@media (min-width: 769px){
  .btn{
    padding:6px 10px !important;
    font-size:12px !important;
    border-radius:12px !important;
    line-height:1.25 !important;
  }

  .btn.small{
    padding:5px 8px !important;
    font-size:11px !important;
    border-radius:10px !important;
  }

  .actions{
    gap:6px !important;
  }

  .actions .btn{
    padding:5px 9px !important;
    font-size:12px !important;
    border-radius:999px !important;
    min-height:0 !important;
  }

  .student-card{
    grid-template-columns:minmax(220px,1.4fr) 106px minmax(300px,1.4fr) !important;
    gap:12px !important;
    padding:16px !important;
  }

  .student-name{
    font-size:21px !important;
  }

  .student-meta{
    font-size:12px !important;
  }

  .point-box{
    padding:7px 8px !important;
    border-radius:16px !important;
  }

  .point-box .star{
    font-size:20px !important;
  }

  .point-box .num{
    font-size:28px !important;
  }

  .point-box .label{
    font-size:11px !important;
  }

  .card{
    padding:18px !important;
  }

  .tabs button{
    padding:8px 12px !important;
    font-size:13px !important;
  }

  input,select,textarea{
    padding:9px 11px !important;
    border-radius:13px !important;
    font-size:13px !important;
  }

  label{
    font-size:12px !important;
  }
}

@media (max-width: 768px){
  .btn{
    padding:10px 13px !important;
    font-size:14px !important;
    border-radius:14px !important;
  }
  .actions{
    gap:7px !important;
  }
}


/* =========================================================
   v3.4.4 遊戲化 UI：按鈕依文字長度，不再整條撐滿
   ========================================================= */

/* 所有一般按鈕預設改成內容寬度 */
.btn{
  width:auto !important;
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  white-space:nowrap !important;
  padding:7px 12px !important;
  font-size:12px !important;
  line-height:1.2 !important;
  border-radius:999px !important;
  min-width:0 !important;
}

/* 學生上課按鈕區：改成緊湊膠囊排列 */
.actions{
  display:flex !important;
  flex-direction:row !important;
  flex-wrap:wrap !important;
  align-items:center !important;
  justify-content:flex-end !important;
  gap:6px !important;
}

.actions .btn{
  width:auto !important;
  flex:0 0 auto !important;
  padding:6px 10px !important;
  font-size:12px !important;
  border-radius:999px !important;
  min-height:0 !important;
}

/* 防止表單區的按鈕被拉滿 */
.card .btn,
.reward-card .btn,
.table .btn{
  width:auto !important;
  flex:0 0 auto !important;
}

/* 只有側邊選單維持滿寬 */
.nav button{
  width:100% !important;
}

/* 分頁按鈕也維持內容寬度 */
.tabs button{
  width:auto !important;
  padding:8px 13px !important;
  border-radius:999px !important;
  transition:transform .12s ease, box-shadow .12s ease;
}
.tabs button:hover{
  transform:translateY(-1px);
  box-shadow:0 5px 12px rgba(70,50,25,.10);
}

/* 遊戲化：可兌換/不可兌換按鈕 */
.redeem-available,
.reward-card .btn.primary{
  background:#e6f6ee !important;
  color:#2e7d5b !important;
  border:1px solid #bfe6d3 !important;
}

.redeem-disabled,
.reward-card .btn.ghost[disabled]{
  background:#fdeaea !important;
  color:#b94a4a !important;
  border:1px solid #f3c2c2 !important;
  cursor:not-allowed !important;
  opacity:1 !important;
}

/* 點數按鈕像金幣 */
.actions .btn.gold{
  background:linear-gradient(180deg,#fff0a8,#f5c542) !important;
  color:#5a4300 !important;
  border:1px solid #edc94d !important;
  box-shadow:0 3px 8px rgba(180,130,0,.14) !important;
}

/* 出席像綠色徽章 */
.actions .btn.primary{
  background:linear-gradient(180deg,#86d2b4,#4e9f85) !important;
  color:white !important;
  border:1px solid #4e9f85 !important;
}

/* 遲到 / 缺席保持明確但柔和 */
.actions .btn.blue{
  background:#e6efff !important;
  color:#335aa8 !important;
  border:1px solid #bad0ff !important;
}
.actions .btn.red{
  background:#fdeaea !important;
  color:#b94a4a !important;
  border:1px solid #f3c2c2 !important;
}

/* 學生卡片更緊湊 */
.student-card{
  align-items:center !important;
  grid-template-columns:minmax(190px,1.2fr) 96px minmax(280px,1.8fr) !important;
  gap:10px !important;
  padding:14px 16px !important;
}

.point-box{
  max-width:96px !important;
  padding:7px 8px !important;
}
.point-box .num{
  font-size:26px !important;
}

/* 小螢幕仍保持可點，但不撐滿整排 */
@media(max-width:768px){
  .actions{
    justify-content:flex-start !important;
  }
  .actions .btn,
  .btn{
    width:auto !important;
    padding:8px 11px !important;
    font-size:13px !important;
  }
  .student-card{
    grid-template-columns:1fr !important;
  }
}

/* Hover 小回饋 */
.btn:not(:disabled):hover{
  transform:translateY(-1px);
  filter:brightness(1.02);
}


/* v3.4.5 學生照片與課程清爽版 */
.student-avatar{
  width:54px;
  height:54px;
  border-radius:18px;
  object-fit:cover;
  border:2px solid #eadfcb;
  background:#fff8df;
  box-shadow:0 4px 10px rgba(120,90,40,.08);
  flex:0 0 auto;
}
.student-head{
  display:flex;
  align-items:center;
  gap:12px;
}
.student-photo-preview{
  width:78px;
  height:78px;
  border-radius:20px;
  object-fit:cover;
  border:2px solid #eadfcb;
  background:#fff8df;
  display:block;
}
.course-clean-table td:first-child,
.course-clean-table th:first-child{
  display:none;
}


/* v3.4.6 上課分頁與出席表 */
.attendance-summary{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:12px;
}
.summary-chip{
  background:#fff8df;
  border:1px solid #eadfcb;
  border-radius:999px;
  padding:8px 12px;
  font-weight:950;
  color:#5a4300;
}
.attendance-table .student-avatar{
  width:42px;
  height:42px;
  border-radius:14px;
}
.attendance-table td,
.attendance-table th{
  font-size:13px;
}
.attendance-table .actions{
  justify-content:flex-start !important;
}
.attendance-table .btn{
  padding:5px 9px !important;
  font-size:12px !important;
}
.classroom-tabs{
  margin:0 0 14px;
}


/* v3.4.7 學期選單與整學期出席表 */
.attendance-grid th{
  position:sticky;
  top:0;
  background:#fffdf7;
  z-index:1;
}
.attendance-grid td:first-child,
.attendance-grid th:first-child{
  position:sticky;
  left:0;
  z-index:2;
  background:#fffdf7;
}
.attendance-cell{
  width:38px !important;
  min-width:38px !important;
  height:30px !important;
  padding:4px 6px !important;
  border-radius:999px !important;
  font-weight:950 !important;
}
.attendance-cell.status-present{
  background:#dff3e9 !important;
  color:#2f755e !important;
  border:1px solid #bfe6d3 !important;
}
.attendance-cell.status-absent{
  background:#fdeaea !important;
  color:#b94a4a !important;
  border:1px solid #f3c2c2 !important;
}
.attendance-cell.status-late{
  background:#e6efff !important;
  color:#335aa8 !important;
  border:1px solid #bad0ff !important;
}
.attendance-cell.status-leave{
  background:#eee6da !important;
  color:#6b6256 !important;
  border:1px solid #d9cdbb !important;
}


/* =========================================================
   v3.5.0 iPad / Safari 介面修正
   ========================================================= */
*, *::before, *::after{
  box-sizing:border-box !important;
}

input, select, textarea{
  max-width:100% !important;
  min-width:0 !important;
}

.row > *{
  min-width:0 !important;
}

/* iPad Safari 對 date input 比較容易爆版，特別修正 */
input[type="date"]{
  -webkit-appearance:none !important;
  appearance:none !important;
  width:100% !important;
  max-width:100% !important;
  min-width:0 !important;
  overflow:hidden !important;
}

/* iPad 橫向時，篩選列不要把日期推出外框 */
@supports (-webkit-touch-callout: none){
  .row{
    width:100% !important;
  }
  .card{
    overflow:hidden !important;
  }
  select, input[type="date"]{
    font-size:16px !important; /* 避免 iPad 自動放大 */
  }
}

/* 平板寬度：上課介面的篩選欄位自動換行 */
@media (min-width: 768px) and (max-width: 1180px){
  .row .f3,
  .row .f4{
    flex:1 1 calc(50% - 12px) !important;
    max-width:calc(50% - 12px) !important;
  }
  .row .f2{
    flex:1 1 calc(33.333% - 12px) !important;
    max-width:calc(33.333% - 12px) !important;
  }
}

/* 更窄螢幕直接單欄 */
@media (max-width: 767px){
  .row .f2,.row .f3,.row .f4,.row .f5,.row .f6,.row .f8,.row .f12{
    flex:1 1 100% !important;
    max-width:100% !important;
  }
}


.exam-check-card{
  margin-bottom:10px;
  padding:14px 16px;
  border-radius:18px;
  border:1px dashed var(--line);
  background:rgba(255,240,168,.55);
}
.exam-check-card.checked{
  background:rgba(127,200,169,.22);
}
.exam-check-label{
  display:grid;
  grid-template-columns:24px 1fr;
  gap:10px;
  align-items:flex-start;
  width:100%;
  cursor:pointer;
}
.exam-check-label input{
  width:18px !important;
  height:18px !important;
  margin-top:3px;
}
.exam-check-content{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
  line-height:1.55;
  word-break:break-word;
}
.exam-check-content span{
  white-space:pre-wrap;
}
.btn:disabled{
  opacity:.45;
  cursor:not-allowed;
}


.growth-box{
  margin-top:12px;
  padding:12px;
  border-radius:18px;
  background:rgba(255,255,255,.72);
  border:1px solid var(--line);
}
.growth-box summary{
  cursor:pointer;
  font-weight:800;
  color:#5f6f65;
}
.growth-quick{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin:10px 0;
}
.growth-log-item{
  padding:8px 10px;
  border-radius:14px;
  background:rgba(127,200,169,.16);
  margin-top:6px;
  font-size:13px;
  line-height:1.45;
}
.growth-xp{
  color:#c49a2c;
  font-weight:900;
}


.growth-progress{height:10px;border-radius:999px;background:#eadfc9;overflow:hidden;margin-top:8px}
.growth-progress > span{display:block;height:100%;background:linear-gradient(90deg,#7fc8a9,#d8b45f);border-radius:999px}
.growth-profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.growth-profile-card{padding:14px;border-radius:20px;background:rgba(255,255,255,.78);border:1px solid var(--line)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9999;display:flex;align-items:center;justify-content:center;padding:18px}
.modal-panel{width:min(900px,96vw);max-height:90vh;overflow:auto;background:var(--card);border-radius:28px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.22);position:relative}
.modal-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;border:none;background:#f3d9d7;color:#8f3d39;font-size:22px}


.magic-guide-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.magic-card{padding:16px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid var(--line)}

.log-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

.adventure-board{

}
.story-card{

}
.story-card h3{

}
.story-title{
  font-size:18px;
  font-weight:900;
  margin-bottom:8px;
}
.story-progress{
  display:inline-block;
  padding:5px 11px;
  border-radius:999px;
  background:rgba(255,214,102,.28);
  color:#705500;
  font-weight:800;
  margin-bottom:10px;
}
.story-task{
  padding:8px 0;
  border-bottom:1px dashed rgba(0,0,0,.08);

}
.story-task:last-child{border-bottom:none}
.story-growth-item{
  padding:11px 12px;
  border-radius:16px;
  background:rgba(127,200,169,.14);
  margin-bottom:10px;
  line-height:1.5;
}
.story-growth-xp{

  font-weight:900;

}

}


.chapter-editor{
  margin-top:14px;
  padding:14px;
  border-radius:18px;
  background:#fff9e8;
  border:1px dashed #e2c97b;
}
.chapter-editor input,
.chapter-editor textarea{
  width:100%;
  margin-top:8px;
  margin-bottom:10px;
}
.chapter-editor textarea{
  min-height:90px;
}


.sync-status{position:fixed;right:18px;top:18px;z-index:9999;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.94);border:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.10);font-weight:900;font-size:13px;display:flex;gap:8px;align-items:center}
.sync-status.clean{color:#2f7d4d}.sync-status.dirty{color:#9a6b00}.sync-status.syncing{color:#2d65b0}.sync-status.error{color:#b84c44}
.sync-status button{width:auto;padding:5px 9px;border-radius:999px;font-size:12px}

.curriculum-readonly-note{font-size:12px;color:var(--muted);margin-top:10px}

.main-progress-bar{height:10px;border-radius:999px;background:#eee2c3;overflow:hidden;margin:8px 0 12px}.main-progress-bar span{display:block;height:100%;background:#7fc8a9;border-radius:999px}

.lesson-checklist{display:flex;flex-direction:column;gap:8px;margin:10px 0 14px}

.lesson-summary{background:#fff7d6;border:1px dashed #d6bd5d;border-radius:16px;padding:12px;margin:12px 0;white-space:pre-wrap}


.adventure-board{
  display:grid !important;
  grid-template-columns:repeat(2,minmax(0,1fr)) !important;
  grid-auto-rows:minmax(430px,auto);

  align-items:stretch !important;
}
.story-card{
  min-height:430px;

  flex-direction:column;
}
.story-card textarea{

}
.story-card .note,
.story-card .lesson-checklist,
.story-card .chapter-editor{

    grid-auto-rows:auto;
  }

.mode-pill-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}

.mode-pill.active{background:var(--gold-light);border-color:var(--gold);color:#735a00}
.week-report{white-space:pre-wrap;line-height:1.7;background:#fffdf0;border:1px dashed #d6bd5d;border-radius:16px;padding:14px;margin-top:12px}


.template-card{border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;background:rgba(255,255,255,.72)}
.week-report-toolbar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:8px;flex-wrap:wrap}
.week-report-toolbar button{width:auto;padding:7px 11px;border-radius:999px}


/* =========================================================
   DARK MODE
   ========================================================= */
body.dark-mode{
  --bg-a:#1f241f;
  --bg-b:#111814;
  --card:#242820;
  --line:#4a4335;
  --text:#f3ead7;
  --muted:#c8bfae;
  --mint:#6fc3a5;
  --mint-dark:#4d9f85;
  --blue:#8eaaff;
  --gold:#f1c04f;
  --gold-light:#4b3f1f;
  --red:#ff8a8a;
  --red-dark:#d95454;
  --gray:#3a372f;
  background:linear-gradient(135deg,var(--bg-a),var(--bg-b)) !important;
}
body.dark-mode .main,
body.dark-mode .content,
body.dark-mode .card,
body.dark-mode .story-card,
body.dark-mode section,
body.dark-mode .note,
body.dark-mode .template-card{
  background-color:var(--card) !important;
  color:var(--text) !important;
}
body.dark-mode input,
body.dark-mode textarea,
body.dark-mode select,
body.dark-mode button{
  background:#1a1d18 !important;
  color:var(--text) !important;
  border-color:var(--line) !important;
}
body.dark-mode .note,
body.dark-mode .story-progress,
body.dark-mode .lesson-summary,
body.dark-mode .week-report{
  background:#302b1b !important;
  color:var(--text) !important;
  border-color:#67562a !important;
}
body.dark-mode .sidebar{
  background:linear-gradient(180deg,#224536,#153126) !important;
}
body.dark-mode .sidebar button,
body.dark-mode .nav button{
  background:#26372f !important;
  color:#f6edda !important;
}
body.dark-mode .tabs button.active,
body.dark-mode .mode-pill.active{
  background:#5a471d !important;
  color:#fff1bd !important;
}
body.dark-mode table,
body.dark-mode th,
body.dark-mode td{
  color:var(--text) !important;
  border-color:var(--line) !important;
}
.theme-toggle{
  position:fixed;
  right:18px;
  top:64px;
  z-index:9999;
  width:auto;
  padding:9px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.92);
  border:1px solid var(--line);
  box-shadow:0 8px 24px rgba(0,0,0,.10);
  font-weight:900;
  font-size:13px;
}
body.dark-mode .theme-toggle{
  background:#1b211c !important;
  color:#ffe7a3 !important;
}
@media(max-width:720px){
  .theme-toggle{
    right:12px;
    top:12px;
  }
}


.cloud-warning{
  position:fixed;
  left:50%;
  top:84px;
  transform:translateX(-50%);
  z-index:10000;
  max-width:min(92vw,680px);
  background:#fff8db;
  color:#453a20;
  border:1px solid #e0c85f;
  border-radius:20px;
  box-shadow:0 12px 36px rgba(0,0,0,.18);
  padding:14px 16px;
  font-weight:900;
}
.cloud-warning .actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:10px}
.cloud-warning button{width:auto;padding:7px 11px;border-radius:999px}
body.dark-mode .cloud-warning{background:#372f18;color:#fff3bd;border-color:#7b6729}
.sync-status .sync-actions{display:flex;gap:6px}
.sync-status .sync-actions button{white-space:nowrap}
@media(max-width:720px){
  .cloud-warning{top:72px}
  .sync-status{flex-wrap:wrap}
}


/* =========================================================
   ADAPTIVE TEACHING UI
   ========================================================= */
body.touch-mode button,
body.touch-mode .btn,
body.touch-mode input,
body.touch-mode select{
  min-height:50px;
  font-size:16px;
}
body.touch-mode textarea{
  min-height:110px;
  font-size:16px;
}

  padding:14px;
  border-radius:18px;
}
body.touch-mode .lesson-check-item input[type="checkbox"]{
  width:24px;
  height:24px;
}
.touch-toolbar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:9998;
  display:none;
  gap:10px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,.96);
  border-top:1px solid var(--line);
  backdrop-filter:blur(10px);
}
.touch-toolbar button{
  flex:1;

}

  display:flex;
}
body.touch-mode .main,
body.touch-mode .content{
  padding-bottom:96px;
}
.device-badge{
  position:fixed;
  left:14px;
  bottom:86px;
  z-index:9997;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.92);
  border:1px solid var(--line);
  font-size:12px;
  font-weight:900;
}

   PERFORMANCE WORKBENCH V2
   ========================================================= */
.perf-dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:14px;
  margin:14px 0;
}

  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;

}

  font-weight:950;
  margin-top:6px;
}

  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:14px;
}
.perf-event-card{
  border:1px solid var(--line);
  border-radius:22px;

}

}

}

.song-card{

  margin:12px 0;

}
.assignment-card{

}
function safeFormatDateTime(value){

  const spent = arr("redeemLogs").filter(l=>l.studentId===studentId).reduce((sum,l)=>sum+(Number(l.cost ?? l.points ?? 0)||0),0);

    .slice(0,30);

  return [...arr("redeemLogs")]

    .slice(0,30);

function performances(studentId){
  const rows = [];
  arr("performances").forEach(p=>{
    (p.songs || []).forEach(song=>{
      (song.assignments || []).forEach(a=>{
        if((a.studentIds || []).includes(studentId)){
          rows.push({performance:p, song, part:studentPart(a, studentId)});
        }
      });
    });
  });
  return rows.sort((a,b)=>String(b.performance.date || "").localeCompare(String(a.performance.date || "")));

function daysUntilExpiry(reward){
  if(!reward?.expiryDate) return null;
  const now = new Date(today() + "T00:00:00");
  const end = new Date(reward.expiryDate + "T00:00:00");
  const diff = Math.ceil((end - now) / (1000*60*60*24));
  return Number.isNaN(diff) ? null : diff;
}
function discountInfo(reward){
  const s = state.rewardDiscountSettings || {twoWeeksDays:14,twoWeeksRate:0.75,oneWeekDays:7,oneWeekRate:0.5};
  const days = daysUntilExpiry(reward);
  const original = Number(reward?.cost ?? reward?.price ?? 0) || 0;
  if(days === null || days < 0) return {price:original, original, rate:1, label:"", days};
  if(days <= Number(s.oneWeekDays || 7)){
    const rate = Number(s.oneWeekRate || 0.5);
    return {price:Math.round(original * rate), original, rate, label:`${Math.round(rate*100)}折`, days};
  }
  if(days <= Number(s.twoWeeksDays || 14)){
    const rate = Number(s.twoWeeksRate || 0.75);
    return {price:Math.round(original * rate), original, rate, label:`${Math.round(rate*100)}折`, days};
  }
  return {price:original, original, rate:1, label:"", days};
}

  }).sort((a,b)=>Number(b.can)-Number(a.can) || a.price-b.price);
}

    state = snap.val() || {};
    if(typeof state === "string"){
      try{ state = JSON.parse(state); }catch(e){ console.warn("state string parse failed", e); }

  const name = ($("loginName")?.value || "").trim();

    return;

  const st = schoolStudents(schoolId).find(s=>String(s.name || "").trim() === name);

  const storedCode = String(st.studentCode || st.loginCode || st.password || "").trim();

  const logs = redeemLogs(st.id);
  return `<section class="card"><h3>🎁 我的獎勵</h3><h4>可兌換獎品</h4><div class="student-reward-mini-grid">
    ${rewards.length ? rewards.slice(0,12).map(item=>`<div class="student-reward-mini">${item.img ? `<img src="${escapeHtml(item.img)}">` : `<div class="student-portal-photo" style="width:100%;height:120px;border-radius:16px">🎁</div>`}<h4>${escapeHtml(item.reward.name || "未命名獎品")}</h4><div>需要：${item.price} 點 ${item.label ? `<span class="student-badge yellow">${escapeHtml(item.label)}</span>` : ""}</div><div>庫存：${Number(item.reward.stock ?? 0)}</div><span class="student-badge ${item.can ? 'green' : ''}">${item.can ? "可以兌換" : "點數不足 / 無庫存"}</span></div>`).join("") : `<div class="student-empty">目前沒有獎品。</div>`}
  </div><h4>兌換紀錄</h4>${logs.length ? logs.map(log=>`<div class="student-list-card"><b>${escapeHtml(log.rewardName || "獎品")}</b><span class="student-badge">-${Number(log.cost || log.points || 0)} 點</span><div class="small-muted">${escapeHtml(safeFormatDateTime(log.date || ""))}</div></div>`).join("") : `<div class="student-empty">尚無兌換紀錄。</div>`}</section>`;
}

loadData();
</script>
</body>
</html>
