<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>教學管理系統 v2.1 課程歸屬與回顧版</title>
<style>
:root{
  --bg-a:#fff8df;
  --bg-b:#eef8f3;
  --card:#fffdf8;
  --line:#eadfcb;
  --text:#2f2a23;
  --muted:#746c60;
  --mint:#7fc8a9;
  --mint-dark:#4e9f85;
  --blue:#7da6ff;
  --gold:#f5c542;
  --gold-light:#fff0a8;
  --red:#ff8a8a;
  --red-dark:#d95454;
  --gray:#ece6db;
  --shadow:0 10px 26px rgba(70,50,25,.08);
  --radius:20px;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,var(--bg-a),var(--bg-b));
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app{display:flex;min-height:100vh}
.sidebar{
  width:260px;
  min-width:260px;
  min-height:100vh;
  padding:26px 18px;
  background:linear-gradient(180deg,#7fc8a9,#5dad92);
  color:white;
  position:sticky;
  top:0;
  box-shadow:var(--shadow);
}
.logo{font-size:25px;font-weight:950;line-height:1.25;margin-bottom:6px}
.version{font-size:13px;font-weight:800;opacity:.9;margin-bottom:24px}
.nav button{
  width:100%;
  border:0;
  margin:7px 0;
  padding:14px 16px;
  border-radius:17px;
  background:rgba(255,255,255,.9);
  color:#255145;
  font-weight:950;
  text-align:left;
}
.nav button.active{
  background:#fff2a7;
  color:#654d00;
  box-shadow:0 6px 16px rgba(75,55,0,.12);
}
.main{flex:1;padding:30px 36px;overflow:auto}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
h1{font-size:34px;margin:0;font-weight:950}
.badge{
  padding:10px 16px;
  border-radius:999px;
  background:#fff0a8;
  color:#654d00;
  font-weight:950;
  white-space:nowrap;
}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
.card{
  background:rgba(255,253,248,.94);
  border:1px solid rgba(234,223,203,.95);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
}
.col-12{grid-column:span 12}
.col-8{grid-column:span 8}
.col-7{grid-column:span 7}
.col-6{grid-column:span 6}
.col-5{grid-column:span 5}
.col-4{grid-column:span 4}
.col-3{grid-column:span 3}
.row{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;align-items:end}
.f12{grid-column:span 12}.f9{grid-column:span 9}.f8{grid-column:span 8}.f6{grid-column:span 6}.f4{grid-column:span 4}.f3{grid-column:span 3}.f2{grid-column:span 2}
h2,h3{margin:0 0 14px}
label{display:block;margin:0 0 6px;font-size:13px;font-weight:950;color:#51493e}
input,select,textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:15px;
  padding:12px 13px;
  background:white;
  color:var(--text);
  outline:none;
}
textarea{min-height:95px;resize:vertical;line-height:1.6}
.btn{
  border:0;
  border-radius:15px;
  padding:11px 14px;
  font-weight:950;
  background:var(--gray);
  color:var(--text);
}
.btn.primary{background:var(--mint-dark);color:white}
.btn.gold{background:var(--gold);color:#4d3900}
.btn.blue{background:var(--blue);color:white}
.btn.red{background:var(--red);color:white}
.btn.dark{background:#31584f;color:white}
.btn.small{padding:7px 10px;border-radius:12px;font-size:13px}
.btn.ghost{background:#fff;border:1px solid var(--line)}
.note{
  background:#fff8d9;
  border:1px dashed #e7d184;
  color:#675b37;
  padding:12px 14px;
  border-radius:15px;
  line-height:1.6;
  font-weight:700;
}
.tabs{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.tabs button{
  border:0;
  border-radius:999px;
  padding:10px 14px;
  background:#f0eadc;
  font-weight:950;
}
.tabs button.active{background:var(--mint-dark);color:white}
.table{width:100%;border-collapse:separate;border-spacing:0 9px}
.table th{text-align:left;color:#6b6256;font-size:13px;padding:0 10px}
.table td{background:white;padding:10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:middle}
.table td:first-child{border-left:1px solid var(--line);border-radius:15px 0 0 15px}
.table td:last-child{border-right:1px solid var(--line);border-radius:0 15px 15px 0}
.student-card{
  display:grid;
  grid-template-columns:minmax(220px,1.5fr) 118px minmax(330px,1.7fr);
  align-items:center;
  gap:14px;
}
.student-name{font-size:24px;font-weight:950;margin-bottom:4px}
.student-meta{font-size:13px;color:var(--muted);font-weight:800;line-height:1.7}
.point-box{
  background:linear-gradient(180deg,#fff5b7,#f6d85d);
  border:2px solid #f1c94c;
  color:#4a3700;
  border-radius:19px;
  text-align:center;
  padding:10px;
}
.point-box .star{font-size:26px;line-height:1}
.point-box .num{font-size:34px;font-weight:950;line-height:1.05}
.point-box .label{font-size:12px;font-weight:950}
.actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.status-pill{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  background:#eee6da;
  font-size:12px;
  font-weight:950;
}
.status-present{background:#dff3e9;color:#2f755e}
.status-absent{background:#ffe1e1;color:#b13d3d}
.status-late{background:#e6efff;color:#335aa8}
.status-leave{background:#eee;color:#555}
.check-list{display:flex;gap:8px;flex-wrap:wrap}
.check-chip{background:white;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:14px;font-weight:900}
.small-muted{color:var(--muted);font-size:12px;font-weight:800}
.two-line{line-height:1.55}
hr{border:0;border-top:1px solid var(--line);margin:18px 0}
@media(max-width:1000px){
  .app{display:block}
  .sidebar{position:static;width:100%;min-width:0;min-height:auto}
  .main{padding:22px}
  .col-8,.col-7,.col-6,.col-5,.col-4,.col-3,.f9,.f8,.f6,.f4,.f3,.f2{grid-column:span 12}
  .student-card{grid-template-columns:1fr}
  .actions{justify-content:flex-start}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo" id="logoTitle">🎵 教學管理系統</div>
    <div class="version">v2.1 課程歸屬與回顧版｜本地資料</div>
    <div class="nav">
      <button data-page="classroom" class="active">🎒 上課介面</button>
      <button data-page="exam">🎓 升級考試</button>
      <button data-page="settings">⚙️ 設定中心</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1 id="pageTitle">上課介面</h1>
      <div class="badge">資料存在這台瀏覽器</div>
    </div>
    <div id="app"></div>
  </main>
</div>

<script>
"use strict";

/* =========================================================
   0. STORAGE / DEFAULT DATA
   ========================================================= */
const STORE_KEY = "bt_teaching_system_v2_structured";
const makeId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const today = () => new Date().toISOString().slice(0,10);

function buildDefaultState(){
  const schoolId = makeId();
  const classA = makeId();
  const classB = makeId();
  const s1 = makeId(), s2 = makeId(), s3 = makeId();

  return {
    settings:{
      systemName:"教學管理系統",
      attendPoint:1,
      bonusSmall:1,
      bonusBig:5,
      penalty:-1,
      upgradeReward:5
    },
    schools:[
      {id:schoolId,name:"銅蘭國小",active:true}
    ],
    classes:[
      {id:classA,schoolId,name:"三年級",order:1,active:true},
      {id:classB,schoolId,name:"排笛隊",order:2,active:true}
    ],
    students:[
      {id:s1,name:"任琪",seat:"1",stageId:"basic",level:1,active:true},
      {id:s2,name:"古雪芙",seat:"2",stageId:"basic",level:2,active:true},
      {id:s3,name:"高海媚",seat:"3",stageId:"basic",level:1,active:true}
    ],
    enrollments:[
      {studentId:s1,classId:classA},
      {studentId:s2,classId:classA},
      {studentId:s3,classId:classA},
      {studentId:s1,classId:classB}
    ],
    points:{
      [s1]:2,
      [s2]:4,
      [s3]:1
    },
    attendance:[],
    pointLogs:[],
    courseNotes:[],
    examLogs:[],
    levelStages:[
      {id:"basic",name:"初階",start:1,end:10,unit:"級",order:1},
      {id:"mid",name:"中階",start:11,end:25,unit:"級",order:2},
      {id:"high",name:"高階",start:26,end:50,unit:"級",order:3},
      {id:"pro",name:"演奏家",start:1,end:15,unit:"級",order:4}
    ],
    levelFields:[
      {id:"name",name:"名稱",order:1,active:true},
      {id:"ability",name:"能力指標",order:2,active:true},
      {id:"technique",name:"技巧重點",order:3,active:true},
      {id:"rhythm",name:"節奏能力",order:4,active:true},
      {id:"range",name:"音域範圍",order:5,active:true},
      {id:"songs",name:"建議曲目",order:6,active:true},
      {id:"standard",name:"通過標準",order:7,active:true},
      {id:"teacherNote",name:"老師備註",order:8,active:true}
    ],
    levelContents:{}
  };
}

function migrateState(data){
  const fallback = buildDefaultState();
  const merged = {...fallback, ...data};
  merged.settings = {...fallback.settings, ...(data.settings || {})};
  for(const key of ["schools","classes","students","enrollments","attendance","pointLogs","courseNotes","examLogs","levelStages","levelFields"]){
    if(!Array.isArray(merged[key])) merged[key] = fallback[key];
  }
  if(typeof merged.points !== "object" || !merged.points) merged.points = {};
  if(typeof merged.levelContents !== "object" || !merged.levelContents) merged.levelContents = {};
  return merged;
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return buildDefaultState();
    return migrateState(JSON.parse(raw));
  }catch(err){
    console.warn(err);
    return buildDefaultState();
  }
}

function saveState(){
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

let state = loadState();

/* =========================================================
   1. READ HELPERS
   ========================================================= */
function findById(list,id){ return list.find(item => item.id === id); }
function activeSchools(){ return state.schools.filter(s => s.active !== false); }
function activeClasses(){ return state.classes.filter(c => c.active !== false); }
function classesBySchool(schoolId){
  return activeClasses()
    .filter(c => c.schoolId === schoolId)
    .sort((a,b) => (Number(a.order)||0) - (Number(b.order)||0));
}
function enrollmentsByClass(classId){ return state.enrollments.filter(e => e.classId === classId); }
function classesOfStudent(studentId){
  return state.enrollments
    .filter(e => e.studentId === studentId)
    .map(e => findById(state.classes, e.classId))
    .filter(Boolean);
}
function studentsByClass(classId){
  return enrollmentsByClass(classId)
    .map(e => findById(state.students, e.studentId))
    .filter(s => s && s.active !== false)
    .sort((a,b) => (Number(a.seat)||9999) - (Number(b.seat)||9999));
}
function schoolName(id){ return findById(state.schools,id)?.name || "未指定學校"; }
function className(id){ return findById(state.classes,id)?.name || "未指定課程"; }
function stageList(){
  return state.levelStages.slice().sort((a,b)=>(Number(a.order)||0)-(Number(b.order)||0));
}
function stageOfStudent(student){
  return findById(state.levelStages, student.stageId) || stageList()[0];
}
function levelLabel(student){
  const stage = stageOfStudent(student);
  if(!stage) return "未設定等級";
  return `${stage.name}第${student.level}${stage.unit || "級"}`;
}
function studentLine(student,classId){
  const cls = findById(state.classes,classId) || classesOfStudent(student.id)[0];
  return `${schoolName(cls?.schoolId)} / ${cls?.name || "未指定課程"} / ${student.seat || "-"}號 / ${levelLabel(student)}`;
}
function previousCourseNotes(classId,date,limit=5){
  return state.courseNotes
    .filter(n => n.classId === classId && n.date < date && (n.content || "").trim())
    .sort((a,b)=> b.date.localeCompare(a.date))
    .slice(0,limit);
}
function courseNoteFor(classId,date){
  return state.courseNotes.find(n => n.classId === classId && n.date === date)?.content || "";
}
function studentEnrolledIn(studentId,classId){
  return state.enrollments.some(e => e.studentId === studentId && e.classId === classId);
}
function levelKey(stageId,level){ return `${stageId}_${level}`; }
function levelContent(stageId,level){
  return state.levelContents[levelKey(stageId,level)] || {};
}
function nextLevel(student){
  const stages = stageList();
  const stage = findById(stages, student.stageId);
  const index = stages.findIndex(s => s.id === student.stageId);
  if(!stage || index < 0) return null;

  if(Number(student.level) < Number(stage.end)){
    return {stageId:stage.id, level:Number(student.level)+1};
  }

  const nextStage = stages[index+1];
  if(nextStage){
    return {stageId:nextStage.id, level:Number(nextStage.start)};
  }

  return null;
}
function previousLevel(student){
  const stages = stageList();
  const stage = findById(stages, student.stageId);
  const index = stages.findIndex(s => s.id === student.stageId);
  if(!stage || index < 0) return null;

  if(Number(student.level) > Number(stage.start)){
    return {stageId:stage.id, level:Number(student.level)-1};
  }

  const prevStage = stages[index-1];
  if(prevStage){
    return {stageId:prevStage.id, level:Number(prevStage.end)};
  }

  return null;
}

/* =========================================================
   2. WRITE LOGIC
   ========================================================= */
function addPoints(studentId, amount, reason){
  const value = Number(amount) || 0;
  state.points[studentId] = (Number(state.points[studentId]) || 0) + value;
  state.pointLogs.push({
    id:makeId(),
    studentId,
    amount:value,
    reason,
    date:new Date().toISOString()
  });
  saveState();
  render();
}

function setAttendance(studentId,classId,date,status){
  const existing = state.attendance.find(a => a.studentId === studentId && a.classId === classId && a.date === date);
  if(existing){
    existing.status = status;
  }else{
    state.attendance.push({id:makeId(),studentId,classId,date,status});
  }

  if(status === "present"){
    state.points[studentId] = (Number(state.points[studentId]) || 0) + Number(state.settings.attendPoint || 0);
    state.pointLogs.push({
      id:makeId(),
      studentId,
      amount:Number(state.settings.attendPoint || 0),
      reason:"出席",
      date:new Date().toISOString()
    });
  }

  saveState();
  render();
}

function attendanceStatus(studentId,classId,date){
  return state.attendance.find(a => a.studentId === studentId && a.classId === classId && a.date === date)?.status || "";
}

function saveCourseNote(classId,date,content){
  const existing = state.courseNotes.find(n => n.classId === classId && n.date === date);
  if(existing){
    existing.content = content;
  }else{
    state.courseNotes.push({id:makeId(),classId,date,content});
  }
  saveState();
}

function passExam(studentId,comment){
  const student = findById(state.students,studentId);
  if(!student) return alert("找不到學生");

  const target = nextLevel(student);
  if(!target) return alert("已經是最高等級");

  const from = {stageId:student.stageId,level:Number(student.level)};
  student.stageId = target.stageId;
  student.level = target.level;

  const reward = Number(state.settings.upgradeReward || 0);
  state.points[studentId] = (Number(state.points[studentId]) || 0) + reward;
  state.pointLogs.push({
    id:makeId(),
    studentId,
    amount:reward,
    reason:"升級獎勵",
    date:new Date().toISOString()
  });

  state.examLogs.push({
    id:makeId(),
    studentId,
    type:"pass",
    from,
    to:target,
    comment,
    date:new Date().toISOString()
  });

  saveState();
  render();
  alert(`升級成功，已加 ${reward} 點`);
}

function failExam(studentId,comment){
  if(!studentId) return;
  state.examLogs.push({
    id:makeId(),
    studentId,
    type:"fail",
    comment,
    date:new Date().toISOString()
  });
  saveState();
  render();
}

function downgradeStudent(studentId,comment){
  const student = findById(state.students,studentId);
  if(!student) return alert("找不到學生");

  const target = previousLevel(student);
  if(!target) return alert("已經是最低等級");

  const from = {stageId:student.stageId,level:Number(student.level)};
  student.stageId = target.stageId;
  student.level = target.level;
  state.examLogs.push({
    id:makeId(),
    studentId,
    type:"down",
    from,
    to:target,
    comment,
    date:new Date().toISOString()
  });

  saveState();
  render();
}

/* =========================================================
   3. UI STATE
   ========================================================= */
let currentPage = "classroom";
let settingsTab = "basic";

let classContext = {
  schoolId:null,
  classId:null,
  date:today()
};

let examContext = {
  schoolId:null,
  classId:null,
  studentId:null
};

function ensureClassContext(){
  const school = activeSchools()[0];
  if(!classContext.schoolId && school) classContext.schoolId = school.id;

  const classes = classesBySchool(classContext.schoolId);
  if(!classes.some(c => c.id === classContext.classId)){
    classContext.classId = classes[0]?.id || null;
  }
}

function ensureExamContext(){
  const school = activeSchools()[0];
  if(!examContext.schoolId && school) examContext.schoolId = school.id;

  const classes = classesBySchool(examContext.schoolId);
  if(!classes.some(c => c.id === examContext.classId)){
    examContext.classId = classes[0]?.id || null;
  }

  const students = studentsByClass(examContext.classId);
  if(!students.some(s => s.id === examContext.studentId)){
    examContext.studentId = students[0]?.id || null;
  }
}

/* =========================================================
   4. SMALL UI HELPERS
   ========================================================= */
function optionList(items, selectedId, labelFn = item => item.name){
  return items.map(item => `<option value="${item.id}" ${item.id === selectedId ? "selected" : ""}>${labelFn(item)}</option>`).join("");
}
function statusText(status){
  return {present:"出席",absent:"缺席",late:"遲到",leave:"請假"}[status] || "尚未點名";
}
function statusClass(status){
  return {present:"status-present",absent:"status-absent",late:"status-late",leave:"status-leave"}[status] || "";
}
function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[s]));
}

/* =========================================================
   5. RENDER ROOT
   ========================================================= */
document.querySelectorAll(".nav button").forEach(button=>{
  button.addEventListener("click",()=>{
    currentPage = button.dataset.page;
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    button.classList.add("active");
    render();
  });
});

function render(){
  document.getElementById("logoTitle").textContent = "🎵 " + (state.settings.systemName || "教學管理系統");
  document.getElementById("pageTitle").textContent = {
    classroom:"上課介面",
    exam:"升級考試",
    settings:"設定中心"
  }[currentPage];

  if(currentPage === "classroom") renderClassroom();
  if(currentPage === "exam") renderExam();
  if(currentPage === "settings") renderSettings();
}

/* =========================================================
   6. CLASSROOM
   ========================================================= */
function renderClassroom(){
  ensureClassContext();

  const note = courseNoteFor(classContext.classId,classContext.date);
  const previousNotes = previousCourseNotes(classContext.classId,classContext.date,5);
  const students = studentsByClass(classContext.classId);

  document.getElementById("app").innerHTML = `
    <div class="grid">
      <section class="card col-12">
        <div class="row">
          <div class="f4">
            <label>學校</label>
            <select onchange="classContext.schoolId=this.value; classContext.classId=null; render()">
              ${optionList(activeSchools(),classContext.schoolId)}
            </select>
          </div>
          <div class="f4">
            <label>課程單位</label>
            <select onchange="classContext.classId=this.value; render()">
              ${optionList(classesBySchool(classContext.schoolId),classContext.classId)}
            </select>
          </div>
          <div class="f4">
            <label>日期</label>
            <input type="date" value="${classContext.date}" onchange="classContext.date=this.value; render()">
          </div>
        </div>
      </section>

      <section class="card col-12">
        <h3>🔁 上週回顧 / 最近課程紀錄</h3>
        ${previousNotes.length ? previousNotes.map((n,index)=>`
          <div class="note" style="${index>0 ? 'opacity:.82' : ''}">
            <b>${escapeHtml(n.date)}</b><br>${escapeHtml(n.content).replace(/\n/g,"<br>")}
          </div>
        `).join("") : `<div class="note">尚無更早的課程紀錄。儲存今日紀錄後，下次上同一課程時會自動出現在這裡。</div>`}
      </section>

      <section class="col-12" id="studentCards"></section>

      <section class="card col-12">

function renderExam(){

  const next = student ? nextLevel(student) : null;

  document.getElementById("app").innerHTML = `
    <div class="grid">
      <section class="card col-6">
        <h3>🎓 升級考試</h3>
        <div class="note">升級不放在上課介面，改由這裡依分級制度檢核。通過後會自動升級、加點，並留下紀錄。</div>
        <div class="row">
          <div class="f6">
            <label>學校</label>
            <select onchange="examContext.schoolId=this.value; examContext.classId=null; examContext.studentId=null; render()">
              ${optionList(activeSchools(),examContext.schoolId)}
            </select>
          </div>
          <div class="f6">
            <label>課程單位</label>
            <select onchange="examContext.classId=this.value; examContext.studentId=null; render()">
              ${optionList(classesBySchool(examContext.schoolId),examContext.classId)}
            </select>
          </div>
          <div class="f12">
            <label>學生</label>
            <select onchange="examContext.studentId=this.value; render()">
              ${optionList(students,examContext.studentId,s=>`${s.name}（${s.seat || "-"}號）`)}
            </select>
          </div>
        </div>

        ${student ? `
          <div class="note">
            <b>${escapeHtml(student.name)}</b><br>
            目前：${escapeHtml(levelLabel(student))}<br>
            目標：${next ? escapeHtml(`${targetStage.name}第${next.level}${targetStage.unit || "級"}`) : "已達最高等級"}
          </div>
        ` : `<div class="note">目前沒有可考試的學生。</div>`}

        <label>老師評語 / 考試紀錄</label>
        <textarea id="examComment" placeholder="例：節奏穩定，音準可再集中。"></textarea>

        <button class="btn primary" onclick="passExam('${student?.id || ""}',document.getElementById('examComment').value)">通過升級</button>
        <button class="btn ghost" onclick="failExam('${student?.id || ""}',document.getElementById('examComment').value)">未通過</button>
        <button class="btn red" onclick="downgradeStudent('${student?.id || ""}',document.getElementById('examComment').value)">降級</button>
      </section>

      <section class="card col-6">
        <h3>📘 目標等級能力指標</h3>
        ${next ? renderLevelContentPreview(content) : `<div class="note">已達最高等級。</div>`}
      </section>

      <section class="card col-12">
        <h3>📒 考試紀錄</h3>
        ${renderExamLogs(student?.id)}
      </section>
    </div>
  `;
}

function renderLevelContentPreview(content){
  return state.levelFields
    .filter(field => field.active !== false)
    .sort((a,b)=>(Number(a.order)||0)-(Number(b.order)||0))
    .map(field => `
      <div style="margin-bottom:12px">
        <span class="status-pill">${escapeHtml(field.name)}</span>
        <div class="note">${escapeHtml(content[field.id] || "尚未設定")}</div>
      </div>
    `).join("");
}

function renderExamLogs(studentId){
  const logs = state.examLogs
    .filter(log => !studentId || log.studentId === studentId)
    .slice()
    .reverse();

  if(!logs.length) return `<div class="note">尚無考試紀錄。</div>`;

  return `
    <table class="table">
      <tr><th>日期</th><th>學生</th><th>結果</th><th>評語</th></tr>
      ${logs.map(log=>{
        const student = findById(state.students,log.studentId);
        const text = log.type === "pass" ? "通過升級" : log.type === "down" ? "降級" : "未通過";
        return `<tr>
          <td>${escapeHtml(log.date.slice(0,10))}</td>
          <td>${escapeHtml(student?.name || "")}</td>
          <td>${text}</td>
          <td>${escapeHtml(log.comment || "")}</td>
        </tr>`;
      }).join("")}
    </table>
  `;
}

function addStudent(){
  const name = document.getElementById("newStudentName").value.trim();
  if(!name) return;

  const id = makeId();
  const stageId = document.getElementById("newStudentStage").value;
  const level = Number(document.getElementById("newStudentLevel").value) || 1;

  state.students.push({
    id,
    name,
    seat:document.getElementById("newStudentSeat").value.trim(),
    stageId,
    level,
    active:true
  });
  state.points[id] = 0;

  document.querySelectorAll(".newStudentClass:checked").forEach(input=>{
    state.enrollments.push({studentId:id,classId:input.value});
  });

  saveState();
  render();
}

function deleteStudent(id){
  if(!confirm("確定刪除此學生？")) return;
  state.students = state.students.filter(s=>s.id!==id);
  state.enrollments = state.enrollments.filter(e=>e.studentId!==id);
  state.attendance = state.attendance.filter(a=>a.studentId!==id);
  state.examLogs = state.examLogs.filter(l=>l.studentId!==id);
  delete state.points[id];
  saveState();
  render();
}
function toggleEnrollment(studentId,classId,checked){
  const exists = state.enrollments.some(e => e.studentId === studentId && e.classId === classId);
  if(checked && !exists){
    state.enrollments.push({studentId,classId});
  }
  if(!checked && exists){
    state.enrollments = state.enrollments.filter(e => !(e.studentId === studentId && e.classId === classId));
  }
  saveState();
  render();
}

function addStage(){
  const name = document.getElementById("stageName").value.trim();
  if(!name) return;
  state.levelStages.push({
    id:makeId(),
    name,
    start:Number(document.getElementById("stageStart").value)||1,
    end:Number(document.getElementById("stageEnd").value)||1,
    unit:document.getElementById("stageUnit").value.trim() || "級",
    order:state.levelStages.length+1
  });
  saveState();
  render();
}

function buildLevelOptions(selectedKey){
  let html = "";
  stageList().forEach(stage=>{
    for(let i=Number(stage.start); i<=Number(stage.end); i++){
      const key = `${stage.id}_${i}`;
      html += `<option value="${key}" ${selectedKey === key ? "selected" : ""}>${escapeHtml(stage.name)}第${i}${escapeHtml(stage.unit || "級")}</option>`;
    }
  });
  return html;
}

function renderLevelContentEditor(){
  const select = document.getElementById("levelEditorSelect");
  const body = document.getElementById("levelEditorBody");
  if(!select || !body) return;
  const [stageId,levelRaw] = select.value.split("_");
  const level = Number(levelRaw);
  const content = levelContent(stageId,level);

  body.innerHTML = state.levelFields
    .filter(field => field.active !== false)
    .sort((a,b)=>(Number(a.order)||0)-(Number(b.order)||0))
    .map(field=>`
      <label>${escapeHtml(field.name)}</label>
      <textarea onchange="setLevelFieldContent('${stageId}',${level},'${field.id}',this.value)">${escapeHtml(content[field.id] || "")}</textarea>
    `).join("");
}

function setLevelFieldContent(stageId,level,fieldId,value){
  const key = levelKey(stageId,level);
  if(!state.levelContents[key]) state.levelContents[key] = {};
  state.levelContents[key][fieldId] = value;
  saveState();
}

      <hr>
      <label>匯入備份 JSON</label>
      <input type="file" accept=".json,application/json" onchange="importBackup(this.files[0])">
    </section>
  `;
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `教學系統備份_${today()}.json`;
  link.click();
  URL.revokeObjectURL(link.href);
}

function importBackup(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      state = migrateState(JSON.parse(reader.result));
      saveState();
      alert("匯入完成");
      render();
    }catch(err){
      alert("匯入失敗，請確認檔案格式");
    }
  };
  reader.readAsText(file);
}

/* =========================================================
   INIT
   ========================================================= */
render();
</script>
</body>
