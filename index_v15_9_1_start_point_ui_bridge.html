/* =========================================================
   V14.0 ST150 SAVECORE
   自動備份 / 版本標記 / 安全還原 / 防覆蓋
   ========================================================= */
const ST150_SaveCore = {
  version:"14.0",
  snapshotPrefix:"ST150_SNAPSHOT_",
  latestKey:"ST150_LATEST_SNAPSHOT",
  maxSnapshots:30,
  autoBackupMs:30000,
  lastSnapshotAt:0,
  lastStateHash:"",
  installed:false,

  nowLabel(){
    const d = new Date();
    const pad = n => String(n).padStart(2,"0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
  },

  safeClone(obj){
    try{ return JSON.parse(JSON.stringify(obj || {})); }
    catch(e){ return {}; }
  },

  hashState(obj){
    try{
      const s = JSON.stringify(obj || {});
      let h = 0;
      for(let i=0;i<s.length;i++){
        h = ((h<<5)-h) + s.charCodeAt(i);
        h |= 0;
      }
      return String(h);
    }catch(e){
      return String(Date.now());
    }
  },

  currentPayload(reason="manual"){
    const cloned = this.safeClone(window.state || {});
    cloned.__saveCore = {
      version:this.version,
      reason,
      createdAt:new Date().toISOString(),
      pageVersion:"v15.0",
      url:location.href
    };
    cloned.__textareaCache = {
      st136: window.__ST136_TEXTAREA_CACHE__ || {},
      st141: window.__ST141_TEXTAREA_CACHE__ || {}
    };
    return cloned;
  },

  snapshot(reason="manual", force=false){
    try{
      const payload = this.currentPayload(reason);
      const hash = this.hashState(payload);
      if(!force && hash === this.lastStateHash) return false;

      const key = `${this.snapshotPrefix}${this.nowLabel()}`;
      localStorage.setItem(key, JSON.stringify(payload));
      localStorage.setItem(this.latestKey, key);
      this.lastSnapshotAt = Date.now();
      this.lastStateHash = hash;
      this.prune();

      console.log(`ST150 snapshot saved: ${key} (${reason})`);
      return key;
    }catch(e){
      console.warn("ST150 snapshot failed",e);
      return false;
    }
  },

  prune(){
    try{
      const keys = Object.keys(localStorage)
        .filter(k=>k.startsWith(this.snapshotPrefix))
        .sort();
      while(keys.length > this.maxSnapshots){
        const old = keys.shift();
        localStorage.removeItem(old);
      }
    }catch(e){}
  },

  listSnapshots(){
    try{
      return Object.keys(localStorage)
        .filter(k=>k.startsWith(this.snapshotPrefix))
        .sort()
        .reverse();
    }catch(e){
      return [];
    }
  },

  restore(key){
    try{
      key = key || localStorage.getItem(this.latestKey);
      if(!key) return alert("目前沒有可還原的備份");
      const raw = localStorage.getItem(key);
      if(!raw) return alert("找不到備份內容");

      const payload = JSON.parse(raw);
      const textCache = payload.__textareaCache || {};

      delete payload.__saveCore;
      delete payload.__textareaCache;

      window.state = payload;

      if(textCache.st136) window.__ST136_TEXTAREA_CACHE__ = textCache.st136;
      if(textCache.st141) window.__ST141_TEXTAREA_CACHE__ = textCache.st141;

      try{ saveState?.(); }catch(e){}
      try{ renderStartClassMode?.(); }catch(e){}
      alert(`已還原備份：${key}`);
      return true;
    }catch(e){
      console.warn("ST150 restore failed",e);
      alert("還原失敗，請看 console。");
      return false;
    }
  },

  exportLatest(){
    try{
      const key = localStorage.getItem(this.latestKey);
      if(!key) return alert("目前沒有備份可匯出");
      const raw = localStorage.getItem(key);
      const blob = new Blob([raw], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${key}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    }catch(e){
      console.warn("ST150 export failed",e);
    }
  },

  migrate(){
    if(!window.state) window.state = {};
    state.__schemaVersion = state.__schemaVersion || this.version;
    state.__lastOpenedVersion = this.version;
    state.__lastOpenedAt = new Date().toISOString();

    if(!Array.isArray(state.classTempoNotes)) state.classTempoNotes = state.classTempoNotes || [];
    if(!state.lessonRecords) state.lessonRecords = state.lessonRecords || {};
    if(!state.__dataProtection) state.__dataProtection = {};
    state.__dataProtection.saveCore = this.version;

    try{ saveState?.(); }catch(e){}
  },

  protectSaveState(){
    if(typeof saveState !== "function" || window.__ST150_SAVE_GUARD__) return;
    window.__ST150_SAVE_GUARD__ = true;
    const oldSaveState = saveState;
    saveState = function(){
      try{ ST150_SaveCore.snapshot("before-save"); }catch(e){}
      const result = oldSaveState.apply(this,arguments);
      try{ ST150_SaveCore.snapshot("after-save", true); }catch(e){}
      return result;
    };
  },

  protectRender(){
    if(typeof renderStartClassMode !== "function" || window.__ST150_RENDER_GUARD__) return;
    window.__ST150_RENDER_GUARD__ = true;
    const oldRender = renderStartClassMode;
    renderStartClassMode = function(){
      try{ ST150_SaveCore.snapshot("before-render"); }catch(e){}
      return oldRender.apply(this,arguments);
    };
  },

  installAutoBackup(){
    if(window.__ST150_AUTO_BACKUP__) return;
    window.__ST150_AUTO_BACKUP__ = true;
    setInterval(()=>{
      try{ ST150_SaveCore.snapshot("auto-30s"); }catch(e){}
    }, this.autoBackupMs);
    window.addEventListener("beforeunload",()=>{
      try{ ST150_SaveCore.snapshot("before-unload", true); }catch(e){}
    });
  },

  panelHtml(){
    const latest = localStorage.getItem(this.latestKey);
    const count = this.listSnapshots().length;
    return `
      <div class="st150-savecore-panel">
        🛡️ SaveCore：自動備份已啟用｜備份數：${count}${latest ? `<br>最近備份：${latest.replace(this.snapshotPrefix,"")}` : ""}
        <div class="st150-savecore-actions">
          <button class="st150-savecore-btn primary" onclick="ST150_SaveCore.snapshot('manual', true); alert('已建立手動備份')">立即備份</button>
          <button class="st150-savecore-btn" onclick="ST150_SaveCore.restore()">還原最近備份</button>
          <button class="st150-savecore-btn" onclick="ST150_SaveCore.exportLatest()">匯出最近備份</button>
        </div>
      </div>
    `;
  },

  injectPanel(){
    if(!window.ST131_TaskRenderer || window.__ST150_PANEL_INSTALLED__) return;
    window.__ST150_PANEL_INSTALLED__ = true;
    const oldRenderLeft = ST131_TaskRenderer.renderLeftFlow.bind(ST131_TaskRenderer);
    ST131_TaskRenderer.renderLeftFlow = function(){
      const out = oldRenderLeft();
      if(out.includes("st150-savecore-panel")) return out;
      return out.replace("<h2>📅 今日課堂</h2>", `<h2>📅 今日課堂</h2>${ST150_SaveCore.panelHtml()}`);
    };
  },

  install(){
    if(this.installed) return;
    this.installed = true;
    this.migrate();
    this.snapshot("install", true);
    this.protectSaveState();
    this.protectRender();
    this.installAutoBackup();
    this.injectPanel();
    console.log("ST150 SaveCore installed.");
  }
};

ST150_SaveCore.install();



/* =========================================================
   V14.1 ST160 STATEGUARD
   目的：
   - schema validation：檢查 state 基本資料形狀
   - dirty flag：有改才存
   - patch：統一受控修改 state
   - undo：現場點錯可回退
   ========================================================= */

const ST160_StateGuard = {
  version:"14.1",
  maxUndo:20,
  undoStack:[],
  installed:false,

  clone(obj){
    try{ return JSON.parse(JSON.stringify(obj || {})); }
    catch(e){ return {}; }
  },

  ensureState(){
    if(!window.state || typeof window.state !== "object"){
      window.state = {};
    }

    state.__schemaVersion = state.__schemaVersion || this.version;
    state.__lastGuardVersion = this.version;
    state.__lastGuardAt = new Date().toISOString();

    if(!Array.isArray(state.students)){
      if(Array.isArray(window.students)){
        state.students = window.students;
      }else if(!state.students){
        state.students = [];
      }else{
        state.students = [];
      }
    }

    if(!state.lessonRecords || typeof state.lessonRecords !== "object"){
      state.lessonRecords = {};
    }

    if(!Array.isArray(state.classTempoNotes)){
      state.classTempoNotes = [];
    }

    if(!state.__dirtyMeta || typeof state.__dirtyMeta !== "object"){
      state.__dirtyMeta = {
        dirty:false,
        lastReason:"",
        updatedAt:null
      };
    }

    if(!state.__st160 || typeof state.__st160 !== "object"){
      state.__st160 = {
        undoCount:0,
        lastValidation:"ok"
      };
    }

    return state;
  },

  validate(target=window.state){
    const errors = [];
    const warnings = [];

    if(!target || typeof target !== "object"){
      errors.push("state 不是物件");
      return {ok:false,errors,warnings};
    }

    if(!Array.isArray(target.students)){
      warnings.push("students 不是陣列");
    }

    if(!target.lessonRecords || typeof target.lessonRecords !== "object"){
      warnings.push("lessonRecords 不是物件");
    }

    if(target.classTempoNotes && !Array.isArray(target.classTempoNotes)){
      warnings.push("classTempoNotes 不是陣列");
    }

    if(Array.isArray(target.students)){
      target.students.forEach((s,idx)=>{
        if(!s || typeof s !== "object"){
          warnings.push(`students[${idx}] 不是物件`);
          return;
        }
        if(!("id" in s)) warnings.push(`students[${idx}] 缺少 id`);
        if(s.xp !== undefined && typeof s.xp !== "number"){
          const n = Number(s.xp);
          if(Number.isFinite(n)) s.xp = n;
          else warnings.push(`students[${idx}] xp 不是數字`);
        }
        if(s.points !== undefined && typeof s.points !== "number"){
          const n = Number(s.points);
          if(Number.isFinite(n)) s.points = n;
          else warnings.push(`students[${idx}] points 不是數字`);
        }
      });
    }

    return {ok:errors.length===0,errors,warnings};
  },

  repair(){
    this.ensureState();

    if(!Array.isArray(state.students)){
      state.students = [];
    }
    if(!state.lessonRecords || typeof state.lessonRecords !== "object"){
      state.lessonRecords = {};
    }
    if(!Array.isArray(state.classTempoNotes)){
      state.classTempoNotes = [];
    }

    const result = this.validate(state);
    state.__st160 = state.__st160 || {};
    state.__st160.lastValidation = result.ok ? "ok" : "error";
    state.__st160.lastWarnings = result.warnings.slice(-10);
    state.__st160.lastCheckedAt = new Date().toISOString();
    return result;
  },

  markDirty(reason="unknown"){
    this.ensureState();
    state.__dirtyMeta = state.__dirtyMeta || {};
    state.__dirtyMeta.dirty = true;
    state.__dirtyMeta.lastReason = reason;
    state.__dirtyMeta.updatedAt = new Date().toISOString();
  },

  clearDirty(){
    this.ensureState();
    state.__dirtyMeta.dirty = false;
    state.__dirtyMeta.savedAt = new Date().toISOString();
  },

  isDirty(){
    return !!(window.state && state.__dirtyMeta && state.__dirtyMeta.dirty);
  },

  pushUndo(reason="patch"){
    try{
      this.ensureState();
      const snapshot = this.clone(state);
      this.undoStack.push({
        reason,
        createdAt:new Date().toISOString(),
        state:snapshot
      });
      while(this.undoStack.length > this.maxUndo){
        this.undoStack.shift();
      }
      state.__st160 = state.__st160 || {};
      state.__st160.undoCount = this.undoStack.length;
    }catch(e){
      console.warn("ST160 pushUndo failed",e);
    }
  },

  patch(reason, updater, options={}){
    this.ensureState();
    const before = this.clone(state);

    if(!options.noUndo){
      this.undoStack.push({
        reason,
        createdAt:new Date().toISOString(),
        state:before
      });
      while(this.undoStack.length > this.maxUndo) this.undoStack.shift();
    }

    try{
      const result = updater(state);
      const validation = this.repair();
      if(!validation.ok){
        console.warn("ST160 validation failed, rolling back", validation.errors);
        window.state = before;
        return false;
      }

      this.markDirty(reason);
      if(!options.noSave){
        this.requestSave(reason);
      }
      return result === undefined ? true : result;
    }catch(e){
      console.warn("ST160 patch failed, rolling back",e);
      window.state = before;
      return false;
    }
  },

  undo(){
    if(!this.undoStack.length){
      alert("目前沒有可復原的操作");
      return false;
    }

    const last = this.undoStack.pop();
    window.state = this.clone(last.state);
    this.repair();
    this.markDirty(`undo:${last.reason}`);
    this.requestSave("undo");

    try{ renderStartClassMode?.(); }catch(e){}
    alert(`已復原：${last.reason}`);
    return true;
  },

  requestSave(reason="dirty-save"){
    this.markDirty(reason);
    if(window.ST150_SaveCore?.snapshot){
      try{ ST150_SaveCore.snapshot(`st160-${reason}`, true); }catch(e){}
    }
    try{ saveState?.(); }catch(e){}
  },

  protectSaveCore(){
    if(!window.ST150_SaveCore || window.__ST160_SAVECORE_GUARD__) return;
    window.__ST160_SAVECORE_GUARD__ = true;

    const oldCurrentPayload = ST150_SaveCore.currentPayload?.bind(ST150_SaveCore);
    if(oldCurrentPayload){
      ST150_SaveCore.currentPayload = function(reason="manual"){
        ST160_StateGuard.repair();
        return oldCurrentPayload(reason);
      };
    }

    const oldSnapshot = ST150_SaveCore.snapshot?.bind(ST150_SaveCore);
    if(oldSnapshot){
      ST150_SaveCore.snapshot = function(reason="manual", force=false){
        ST160_StateGuard.repair();
        if(!force && !ST160_StateGuard.isDirty() && reason !== "install" && !String(reason).includes("before")){
          return false;
        }
        const key = oldSnapshot(reason,force);
        if(key) ST160_StateGuard.clearDirty();
        return key;
      };
    }

    const oldRestore = ST150_SaveCore.restore?.bind(ST150_SaveCore);
    if(oldRestore){
      ST150_SaveCore.restore = function(key){
        try{
          const snapshotKey = key || localStorage.getItem(this.latestKey);
          if(!snapshotKey){
            alert("目前沒有可還原的備份");
            return false;
          }
          const raw = localStorage.getItem(snapshotKey);
          const sandbox = JSON.parse(raw);
          const payload = {...sandbox};
          delete payload.__saveCore;
          delete payload.__textareaCache;
          const test = ST160_StateGuard.validate(payload);
          if(!test.ok){
            alert("備份資料結構不安全，已阻止還原。");
            console.warn("ST160 blocked restore",test);
            return false;
          }
          return oldRestore(key);
        }catch(e){
          alert("備份無法解析，已阻止還原。");
          console.warn("ST160 restore sandbox failed",e);
          return false;
        }
      };
    }
  },

  protectStudentActions(){
    if(!window.ST1062_StudentActions || window.__ST160_STUDENT_ACTIONS__) return;
    window.__ST160_STUDENT_ACTIONS__ = true;

    ["addXp","addPoints"].forEach(fn=>{
      if(typeof ST1062_StudentActions[fn] !== "function") return;
      const oldFn = ST1062_StudentActions[fn].bind(ST1062_StudentActions);
      ST1062_StudentActions[fn] = function(){
        ST160_StateGuard.pushUndo(fn);
        const result = oldFn.apply(this,arguments);
        ST160_StateGuard.markDirty(fn);
        return result;
      };
    });
  },

  protectPanfluteFeedback(){
    if(typeof ST140_PanfluteFeedback === "undefined" || window.__ST160_ST140__) return;
    window.__ST160_ST140__ = true;

    ["apply","applyFeedback"].forEach(fn=>{
      if(typeof ST140_PanfluteFeedback[fn] !== "function") return;
      const oldFn = ST140_PanfluteFeedback[fn].bind(ST140_PanfluteFeedback);
      ST140_PanfluteFeedback[fn] = function(){
        ST160_StateGuard.pushUndo(`ST140.${fn}`);
        const oldSave = window.saveState;
        let result;
        try{
          window.saveState = function(){
            ST160_StateGuard.markDirty(`suppressed:${fn}`);
          };
          result = oldFn.apply(this,arguments);
        }finally{
          window.saveState = oldSave;
          ST160_StateGuard.requestSave(`ST140.${fn}`);
        }
        return result;
      };
    });
  },

  protectRawSaveState(){
    if(typeof saveState !== "function" || window.__ST160_RAW_SAVE__) return;
    window.__ST160_RAW_SAVE__ = true;

    const oldSave = saveState;
    let timer = null;

    saveState = function(){
      ST160_StateGuard.repair();
      ST160_StateGuard.markDirty("raw-saveState");
      clearTimeout(timer);
      timer = setTimeout(()=>{
        const validation = ST160_StateGuard.repair();
        if(!validation.ok){
          console.warn("ST160 blocked invalid save",validation);
          return;
        }
        oldSave.apply(this,arguments);
        ST160_StateGuard.clearDirty();
      },150);
    };
  },

  panelHtml(){
    this.ensureState();
    const dirty = this.isDirty() ? "未儲存變更" : "已同步";
    const undoCount = this.undoStack.length;
    const validation = state.__st160?.lastValidation || "ok";
    return `
      <div class="st160-stateguard-panel">
        🧬 StateGuard：${dirty}｜驗證：${validation}｜可復原：${undoCount}
        <div class="st160-actions">
          <button class="st160-btn primary" onclick="ST160_StateGuard.repair(); ST160_StateGuard.requestSave('manual'); alert('已檢查並儲存')">檢查並儲存</button>
          <button class="st160-btn" onclick="ST160_StateGuard.undo()">復原上一步</button>
          <button class="st160-btn" onclick="console.log(ST160_StateGuard.validate(state)); alert('驗證結果已輸出到 console')">驗證資料</button>
        </div>
      </div>
    `;
  },

  injectPanel(){
    if(!window.ST131_TaskRenderer || window.__ST160_PANEL__) return;
    window.__ST160_PANEL__ = true;

    const oldRenderLeft = ST131_TaskRenderer.renderLeftFlow.bind(ST131_TaskRenderer);
    ST131_TaskRenderer.renderLeftFlow = function(){
      const out = oldRenderLeft();
      if(out.includes("st160-stateguard-panel")) return out;
      if(out.includes("st150-savecore-panel")){
        return out.replace(/(<div class="st150-savecore-panel"[\s\S]*?<\/div>\s*<\/div>)/, `$1${ST160_StateGuard.panelHtml()}`);
      }
      return out.replace("<h2>📅 今日課堂</h2>", `<h2>📅 今日課堂</h2>${ST160_StateGuard.panelHtml()}`);
    };
  },

  install(){
    if(this.installed) return;
    this.installed = true;

    this.ensureState();
    this.repair();
    this.protectSaveCore();
    this.protectStudentActions();
    this.protectPanfluteFeedback();
    this.protectRawSaveState();
    this.injectPanel();

    console.log("ST160 StateGuard installed.");
  }
};

ST160_StateGuard.install();



/* =========================================================
   V14.3 ST170 RUNTIME KERNEL
   目標：
   - 不再整棵 state deepFreeze / full clone
   - 學生變更採 structural sharing：只複製 students array + 單一 student
   - Undo 採 delta-based：只記錄該學生 xp / points / note 的 from/to
   - Save 交給 ST160 / ST150 單一通道
   ========================================================= */
(function(){
  console.log("ST170 RuntimeKernel loading...");

  const ST170_RuntimeKernel = {
    version:"14.3",
    undoStack:[],
    maxUndoDepth:20,
    isPatching:false,

    safeClone(obj){
      try{
        if(typeof structuredClone === "function") return structuredClone(obj);
      }catch(e){}
      try{ return JSON.parse(JSON.stringify(obj || {})); }
      catch(e){ return {}; }
    },

    raw(){
      if(window.__RAW_STATE__ && typeof window.__RAW_STATE__ === "object") return window.__RAW_STATE__;
      if(window.state && typeof window.state === "object") return window.state;
      window.state = {};
      return window.state;
    },

    publish(nextState, reason="publish"){
      window.__RAW_STATE__ = nextState;
      window.state = nextState;

      if(window.ST160_StateGuard){
        try{
          ST160_StateGuard.markDirty?.(`ST170.${reason}`);
        }catch(e){}
        try{
          ST160_StateGuard.requestSave?.(`ST170.${reason}`);
        }catch(e){}
      }else{
        try{ saveState?.(); }catch(e){}
      }
    },

    validate(nextState){
      if(!nextState || typeof nextState !== "object") return false;
      if(!Array.isArray(nextState.students)) return false;
      return true;
    },

    getStudentIndex(students, studentId){
      return students.findIndex(s=>String(s?.id) === String(studentId));
    },

    makeDelta(action, studentId, before, after){
      return {
        action,
        studentId:String(studentId),
        createdAt:new Date().toISOString(),
        from:{
          xp:Number(before?.xp || 0),
          points:Number(before?.points || 0),
          note:String(before?.note || before?.remark || "")
        },
        to:{
          xp:Number(after?.xp || 0),
          points:Number(after?.points || 0),
          note:String(after?.note || after?.remark || "")
        }
      };
    },

    changed(delta){
      return delta.from.xp !== delta.to.xp ||
        delta.from.points !== delta.to.points ||
        delta.from.note !== delta.to.note;
    },

    commitStudentPatch(studentId, actionName, updater){
      if(this.isPatching) return false;
      this.isPatching = true;

      try{
        const raw = this.raw();
        const students = Array.isArray(raw.students) ? raw.students : [];
        const idx = this.getStudentIndex(students, studentId);
        if(idx < 0){
          console.warn("ST170 student not found", studentId);
          return false;
        }

        const oldStudent = students[idx] || {};
        const draftStudent = {...oldStudent};

        updater(draftStudent);

        if(draftStudent.xp !== undefined) draftStudent.xp = Number(draftStudent.xp || 0);
        if(draftStudent.points !== undefined) draftStudent.points = Number(draftStudent.points || 0);

        const delta = this.makeDelta(actionName, studentId, oldStudent, draftStudent);
        if(!this.changed(delta)){
          return false;
        }

        const nextState = {...raw};
        nextState.students = [...students];
        nextState.students[idx] = draftStudent;
        nextState.__schemaVersion = nextState.__schemaVersion || "14.3";
        nextState.__lastKernelVersion = this.version;
        nextState.__lastKernelAt = new Date().toISOString();

        if(!this.validate(nextState)){
          console.warn("ST170 blocked invalid state");
          return false;
        }

        this.undoStack.push(delta);
        while(this.undoStack.length > this.maxUndoDepth) this.undoStack.shift();

        this.publish(nextState, actionName);
        this.refreshStudentTextarea(studentId, draftStudent);
        console.log("ST170 patch committed", actionName, delta);
        return true;

      }catch(e){
        console.warn("ST170 patch failed",e);
        return false;
      }finally{
        this.isPatching = false;
      }
    },

    undo(){
      if(!this.undoStack.length){
        alert("目前沒有可復原的操作");
        return false;
      }

      const delta = this.undoStack.pop();
      const raw = this.raw();
      const students = Array.isArray(raw.students) ? raw.students : [];
      const idx = this.getStudentIndex(students, delta.studentId);
      if(idx < 0) return false;

      const current = students[idx] || {};
      const reverted = {
        ...current,
        xp:delta.from.xp,
        points:delta.from.points,
        note:delta.from.note
      };

      const nextState = {...raw};
      nextState.students = [...students];
      nextState.students[idx] = reverted;
      nextState.__lastKernelVersion = this.version;
      nextState.__lastKernelAt = new Date().toISOString();

      this.publish(nextState, `undo:${delta.action}`);
      this.refreshStudentTextarea(delta.studentId, reverted);

      try{ renderStartClassMode?.(); }catch(e){}
      alert(`已復原：${delta.action}`);
      return true;
    },

    refreshStudentTextarea(studentId, student){
      const note = String(student?.note || student?.remark || "");
      const selectors = [
        `#st106Remark_${studentId}`,
        `textarea[data-student-id="${studentId}"]`,
        `#note-${studentId}`
      ];

      selectors.forEach(sel=>{
        document.querySelectorAll(sel).forEach(el=>{
          if(el && el.tagName === "TEXTAREA"){
            el.value = note;
            try{ el.dispatchEvent(new Event("input",{bubbles:true})); }catch(e){}
          }
        });
      });

      if(window.__ST136_TEXTAREA_CACHE__) window.__ST136_TEXTAREA_CACHE__[studentId] = note;
      if(window.__ST141_TEXTAREA_CACHE__) window.__ST141_TEXTAREA_CACHE__[studentId] = note;
    },

    installStudentActionBridge(){
      if(!window.ST1062_StudentActions || window.__ST170_STUDENT_BRIDGE__) return;
      window.__ST170_STUDENT_BRIDGE__ = true;

      if(typeof ST1062_StudentActions.addXp === "function"){
        const oldAddXp = ST1062_StudentActions.addXp.bind(ST1062_StudentActions);
        ST1062_StudentActions.addXp = function(studentId,typeId,xp,text){
          const handled = ST170_RuntimeKernel.commitStudentPatch(studentId, `addXp:${typeId}`, draft=>{
            draft.xp = Number(draft.xp || 0) + Number(xp || 0);
            const note = String(draft.note || draft.remark || "");
            if(text){
              draft.note = note ? `${note} ｜ ${text}` : text;
            }
          });

          if(!handled){
            return oldAddXp(studentId,typeId,xp,text);
          }

          try{ st116RefreshFlowOnly?.(); }catch(e){}
          return true;
        };
      }

      if(typeof ST1062_StudentActions.addPoints === "function"){
        const oldAddPoints = ST1062_StudentActions.addPoints.bind(ST1062_StudentActions);
        ST1062_StudentActions.addPoints = function(studentId,points,reason){
          const handled = ST170_RuntimeKernel.commitStudentPatch(studentId, `addPoints:${reason || ""}`, draft=>{
            draft.points = Number(draft.points || 0) + Number(points || 0);
          });

          if(!handled){
            return oldAddPoints(studentId,points,reason);
          }

          try{ st116RefreshFlowOnly?.(); }catch(e){}
          return true;
        };
      }
    },

    installPanfluteBridge(){
      if(typeof ST140_PanfluteFeedback === "undefined" || window.__ST170_ST140_BRIDGE__) return;
      window.__ST170_ST140_BRIDGE__ = true;

      const apply = function(studentId,indexOrType){
        let item = null;
        if(Array.isArray(ST140_PanfluteFeedback.presets)){
          item = ST140_PanfluteFeedback.presets[indexOrType];
        }
        if(!item && ST140_PanfluteFeedback.pool){
          item = ST140_PanfluteFeedback.pool[indexOrType];
        }
        if(!item) return false;

        const xp = Number(item.xp || 0);
        const points = Number(item.points || 0);
        const text = item.text || "";
        const kind = item.kind || (xp > 0 ? "praise" : "correction");

        ST170_RuntimeKernel.commitStudentPatch(studentId, `Panflute:${indexOrType}`, draft=>{
          if(kind === "praise" && xp > 0){
            draft.xp = Number(draft.xp || 0) + xp;
          }
          if(points){
            draft.points = Number(draft.points || 0) + points;
          }
          const note = String(draft.note || draft.remark || "");
          if(text){
            draft.note = note ? `${note} ｜ ${text}` : text;
          }
        });

        try{ st116RefreshFlowOnly?.(); }catch(e){}
        return true;
      };

      ST140_PanfluteFeedback.apply = apply;
      ST140_PanfluteFeedback.applyFeedback = apply;
    },

    panelHtml(){
      return `
        <div class="st170-kernel-panel">
          🧩 RuntimeKernel：結構共享已啟用｜差量復原：${this.undoStack.length}
          <div class="st170-actions">
            <button class="st170-btn primary" onclick="ST170_RuntimeKernel.undo()">差量復原上一步</button>
            <button class="st170-btn" onclick="console.log(ST170_RuntimeKernel.undoStack); alert('差量紀錄已輸出到 console')">查看差量</button>
          </div>
        </div>
      `;
    },

    injectPanel(){
      if(!window.ST131_TaskRenderer || window.__ST170_PANEL__) return;
      window.__ST170_PANEL__ = true;
      const oldRenderLeft = ST131_TaskRenderer.renderLeftFlow.bind(ST131_TaskRenderer);
      ST131_TaskRenderer.renderLeftFlow = function(){
        const html = oldRenderLeft();
        if(html.includes("st170-kernel-panel")) return html;
        if(html.includes("st160-stateguard-panel")){
          return html.replace(/(<div class="st160-stateguard-panel"[\s\S]*?<\/div>\s*<\/div>)/, `$1${ST170_RuntimeKernel.panelHtml()}`);
        }
        return html.replace("<h2>📅 今日課堂</h2>", `<h2>📅 今日課堂</h2>${ST170_RuntimeKernel.panelHtml()}`);
      };
    },

    install(){
      window.__RAW_STATE__ = this.raw();
      this.installStudentActionBridge();
      this.installPanfluteBridge();
      this.injectPanel();
      console.log("ST170 RuntimeKernel installed.");
    }
  };

  window.ST170_RuntimeKernel = ST170_RuntimeKernel;
  ST170_RuntimeKernel.install();
})();



/* =========================================================
   V14.4 ST180 STATIC VIEW KERNEL
   目的：
   - 不誤殺左側課堂流程 timer
   - 停用右側重複點數清洗的背景輪詢造成的閃爍
   - 快捷評語 / addXp 後只局部更新該學生卡
   - renderStartClassMode 做節流，避免背景同步連續重繪
   ========================================================= */
(function(){
  console.log("ST180 StaticViewKernel loading...");

  const ST180_StaticViewKernel = {
    version:"14.4",
    lastRenderAt:0,
    renderThrottleMs:500,

    isStartMode(){
      return document.body.classList.contains("start-class-mode");
    },

    isRightSideElement(el){
      if(!el) return false;
      return !!el.closest?.("#start-class-right-panel,.st106-start-right,.student-list,.start931-student-card,.student-card,.st106-card,.st111-card");
    },

    silenceLegacyCleaners(){
      /*
        不 clearInterval，避免誤殺左側流程 timer。
        改成把右側清洗器降級為「手動一次性、無 DOM 抽動」。
      */
      if(window.ST142_RightPanelFix && !window.__ST180_ST142_SILENCED__){
        window.__ST180_ST142_SILENCED__ = true;

        const oldClean = ST142_RightPanelFix.cleanDuplicatePointBlocks?.bind(ST142_RightPanelFix);
        ST142_RightPanelFix.cleanDuplicatePointBlocks = function(root=document){
          if(!ST180_StaticViewKernel.isStartMode()) return oldClean ? oldClean(root) : undefined;

          /*
            開始上課模式下，不反覆拔 DOM。
            只在 panel render 當下處理；若被背景 interval 呼叫，直接靜音。
          */
          if(root === document){
            return false;
          }
          return oldClean ? oldClean(root) : undefined;
        };

        ST142_RightPanelFix.installPanelCleaner = function(){
          console.log("ST180: ST142 interval cleaner disabled in start-class mode.");
        };
      }

      if(window.ST143_AntiFlickerCompact && !window.__ST180_ST143_SILENCED__){
        window.__ST180_ST143_SILENCED__ = true;
        const oldClean143 = ST143_AntiFlickerCompact.cleanDuplicatePointBlocks?.bind(ST143_AntiFlickerCompact);
        ST143_AntiFlickerCompact.cleanDuplicatePointBlocks = function(root=document){
          if(ST180_StaticViewKernel.isStartMode() && root === document) return false;
          return oldClean143 ? oldClean143(root) : undefined;
        };
      }
    },

    findStudentCard(studentId){
      const selectors = [
        `[data-student-id="${studentId}"]`,
        `[data-id="${studentId}"]`,
        `#student-${studentId}`,
        `.student-card[data-id="${studentId}"]`,
        `.start931-student-card[data-id="${studentId}"]`,
        `.st106-card[data-id="${studentId}"]`,
        `.st111-card[data-id="${studentId}"]`
      ];

      for(const sel of selectors){
        const el = document.querySelector(sel);
        if(el) return el;
      }

      const remark = document.getElementById(`st106Remark_${studentId}`);
      if(remark) return remark.closest(".student-card,.start931-student-card,.st106-card,.st111-card,[data-student-id],[data-id]");

      return null;
    },

    getStudent(studentId){
      const raw = window.__RAW_STATE__ || window.state || {};
      const students = Array.isArray(raw.students) ? raw.students : [];
      return students.find(s=>String(s?.id) === String(studentId));
    },

    updateStudentCard(studentId){
      const st = this.getStudent(studentId);
      if(!st) return false;

      const card = this.findStudentCard(studentId);
      if(!card) return false;

      const xp = Number(st.xp || 0);
      const points = Number(st.points || 0);
      const note = String(st.note || st.remark || "");

      const xpTargets = card.querySelectorAll(".student-xp,.xp-text,.st111-xp-value,[data-field='xp']");
      xpTargets.forEach(el=>{ el.textContent = xp; });

      const pointTargets = card.querySelectorAll(".student-points,.points-text,.st111-points-value,[data-field='points']");
      pointTargets.forEach(el=>{ el.textContent = points; });

      /*
        若舊 UI 只有一個綜合 badge，就只更新同一卡片裡的文字。
      */
      const badge = card.querySelector(".st111-xp-badge,.st106-points-display");
      if(badge && (badge.textContent.includes("XP") || badge.textContent.includes("點數"))){
        badge.textContent = `🎁 禮物點數：${points}｜✨ XP：${xp}`;
      }

      const textarea = card.querySelector(`#st106Remark_${studentId}, textarea[data-student-id="${studentId}"], #note-${studentId}, textarea`);
      if(textarea && textarea.tagName === "TEXTAREA"){
        const active = document.activeElement === textarea;
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        textarea.value = note;
        if(active){
          textarea.focus();
          try{
            textarea.setSelectionRange(
              Math.min(start ?? textarea.value.length, textarea.value.length),
              Math.min(end ?? textarea.value.length, textarea.value.length)
            );
          }catch(e){}
        }
      }

      if(window.__ST136_TEXTAREA_CACHE__) window.__ST136_TEXTAREA_CACHE__[studentId] = note;
      if(window.__ST141_TEXTAREA_CACHE__) window.__ST141_TEXTAREA_CACHE__[studentId] = note;

      return true;
    },

    suppressGlobalRenderDuring(fn){
      const oldRender = window.renderStartClassMode;
      if(typeof oldRender !== "function") return fn();

      window.renderStartClassMode = function(){
        console.log("ST180: blocked global render during targeted update.");
        return true;
      };

      try{
        return fn();
      }finally{
        setTimeout(()=>{ window.renderStartClassMode = oldRender; },30);
      }
    },

    patchPanfluteFeedback(){
      if(typeof ST140_PanfluteFeedback === "undefined" || window.__ST180_ST140_PATCHED__) return;
      window.__ST180_ST140_PATCHED__ = true;

      const apply = function(studentId,indexOrType){
        return ST180_StaticViewKernel.suppressGlobalRenderDuring(()=>{
          let item = null;
          if(Array.isArray(ST140_PanfluteFeedback.presets)){
            item = ST140_PanfluteFeedback.presets[indexOrType];
          }
          if(!item && ST140_PanfluteFeedback.pool){
            item = ST140_PanfluteFeedback.pool[indexOrType];
          }
          if(!item) return false;

          if(window.ST170_RuntimeKernel?.commitStudentPatch){
            ST170_RuntimeKernel.commitStudentPatch(studentId, `Panflute:${indexOrType}`, draft=>{
              const xp = Number(item.xp || 0);
              const points = Number(item.points || 0);
              const kind = item.kind || (xp > 0 ? "praise" : "correction");

              if(kind === "praise" && xp > 0) draft.xp = Number(draft.xp || 0) + xp;
              if(points) draft.points = Number(draft.points || 0) + points;

              const note = String(draft.note || draft.remark || "");
              if(item.text){
                draft.note = note ? `${note} ｜ ${item.text}` : item.text;
              }
            });
          }

          ST180_StaticViewKernel.updateStudentCard(studentId);
          try{ st116RefreshFlowOnly?.(); }catch(e){}
          return true;
        });
      };

      ST140_PanfluteFeedback.apply = apply;
      ST140_PanfluteFeedback.applyFeedback = apply;
    },

    patchStudentActions(){
      if(!window.ST1062_StudentActions || window.__ST180_STUDENT_ACTIONS__) return;
      window.__ST180_STUDENT_ACTIONS__ = true;

      ["addXp","addPoints"].forEach(fn=>{
        if(typeof ST1062_StudentActions[fn] !== "function") return;
        const oldFn = ST1062_StudentActions[fn].bind(ST1062_StudentActions);

        ST1062_StudentActions[fn] = function(studentId){
          return ST180_StaticViewKernel.suppressGlobalRenderDuring(()=>{
            const result = oldFn.apply(this,arguments);
            ST180_StaticViewKernel.updateStudentCard(studentId);
            try{ st116RefreshFlowOnly?.(); }catch(e){}
            return result;
          });
        };
      });
    },

    throttleRenderStart(){
      if(typeof renderStartClassMode !== "function" || window.__ST180_RENDER_THROTTLED__) return;
      window.__ST180_RENDER_THROTTLED__ = true;

      const oldRender = renderStartClassMode;
      renderStartClassMode = function(){
        const now = Date.now();
        const active = document.activeElement;

        /*
          正在右側輸入、或背景 500ms 內連續要求 render 時，阻擋整區重繪。
          左側流程由 st116RefreshFlowOnly / ST132 liveUpdate 處理，不依賴這個大 render。
        */
        if(ST180_StaticViewKernel.isStartMode()){
          if(ST180_StaticViewKernel.isRightSideElement(active)){
            return true;
          }
          if(now - ST180_StaticViewKernel.lastRenderAt < ST180_StaticViewKernel.renderThrottleMs){
            console.log("ST180: throttled frequent renderStartClassMode.");
            return true;
          }
        }

        ST180_StaticViewKernel.lastRenderAt = now;
        return oldRender.apply(this,arguments);
      };
    },

    panelHtml(){
      return `
        <div class="st180-viewkernel-panel">
          🧊 StaticViewKernel：右側局部更新已啟用｜背景清洗器已靜音
        </div>
      `;
    },

    injectPanel(){
      if(!window.ST131_TaskRenderer || window.__ST180_PANEL__) return;
      window.__ST180_PANEL__ = true;
      const oldRenderLeft = ST131_TaskRenderer.renderLeftFlow.bind(ST131_TaskRenderer);
      ST131_TaskRenderer.renderLeftFlow = function(){
        const html = oldRenderLeft();
        if(html.includes("st180-viewkernel-panel")) return html;
        if(html.includes("st170-kernel-panel")){
          return html.replace(/(<div class="st170-kernel-panel"[\s\S]*?<\/div>\s*<\/div>)/, `$1${ST180_StaticViewKernel.panelHtml()}`);
        }
        return html.replace("<h2>📅 今日課堂</h2>", `<h2>📅 今日課堂</h2>${ST180_StaticViewKernel.panelHtml()}`);
      };
    },

    install(){
      this.silenceLegacyCleaners();
      this.patchPanfluteFeedback();
      this.patchStudentActions();
      this.throttleRenderStart();
      this.injectPanel();

      console.log("ST180 StaticViewKernel installed.");
    }
  };

  window.ST180_StaticViewKernel = ST180_StaticViewKernel;
  ST180_StaticViewKernel.install();
})();

      const textarea = this.findTextarea(studentId) || card.querySelector("textarea");
      if(textarea && textarea.tagName === "TEXTAREA"){

        const start = textarea.selectionStart;

        textarea.value = note;
        if(active){

              Math.min(end ?? note.length,note.length)
            );

        try{ textarea.dispatchEvent(new Event("input",{bubbles:true})); }catch(e){}

      if(window.__ST136_TEXTAREA_CACHE__) window.__ST136_TEXTAREA_CACHE__[studentId] = note;

        if(Array.isArray(ST140_PanfluteFeedback.presets)){
          item = ST140_PanfluteFeedback.presets[indexOrType];
        }
        if(!item && ST140_PanfluteFeedback.pool){
          item = ST140_PanfluteFeedback.pool[indexOrType];

      if(window.ST170_RuntimeKernel?.commitStudentPatch){
        ST170_RuntimeKernel.commitStudentPatch(studentId, `Panflute:${indexOrType}`, draft=>{

          if(points){

      }else if(window.ST1062_StudentActions?.addXp && Number(item.xp || 0) > 0){

      return true;
    },

    installPanfluteBridge(){

      window.__ST181_ST140__ = true;

      const apply = function(studentId,indexOrType){

          window.renderStartClassMode = function(){
            console.log("ST181: blocked global render during panflute local update.");
            return true;
          };

        try{
          ST181_ViewRefinement.commitPanflute(studentId,indexOrType);
          const ok = ST181_ViewRefinement.updateCard(studentId);

          /*

            保持畫面穩定，下一次使用者切換或手動刷新時再重繪。
