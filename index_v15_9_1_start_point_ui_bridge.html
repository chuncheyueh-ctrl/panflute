function undoRedeem(logId){
  const log = findById(state.redeemLogs,logId);
  if(!log) return alert("找不到兌換紀錄");

  const student = findById(state.students,log.studentId);
  const reward = findById(state.rewards,log.rewardId);

  if(!student) return alert("找不到學生，無法取消兌換");
  if(!confirm(`確定取消「${student.name}」兌換「${log.rewardName || reward?.name || "獎品"}」嗎？\n\n系統會還原點數與庫存。`)) return;

  const cost = Number(log.cost || 0);
  state.points[student.id] = (Number(state.points[student.id]) || 0) + cost;

  if(reward && reward.stock !== "" && reward.stock !== null && typeof reward.stock !== "undefined"){
    reward.stock = Number(reward.stock || 0) + 1;
  }

  state.redeemLogs = state.redeemLogs.filter(item => item.id !== logId);
  state.pointLogs.push({
    id:makeId(),
    studentId:student.id,
    amount:cost,
    reason:`取消兌換：${log.rewardName || reward?.name || "獎品"}`,
    date:new Date().toISOString()
  });
  recordActivity("redeem", `${student.name} 取消兌換：${log.rewardName || reward?.name || "獎品"}（+${cost}）`, {studentId:student.id,rewardId:log.rewardId,cost});

  saveState();
  render();
}

function redeemReward(studentId,rewardId){
  const student = findById(state.students,studentId);
  const reward = findById(state.rewards,rewardId);
  if(!student || !reward) return;

  const cost = Number(reward.cost || 0);
  const points = Number(state.points[studentId] || 0);

  if(points < cost) return alert("點數不足");
  if(reward.stock !== "" && reward.stock !== null && typeof reward.stock !== "undefined" && Number(reward.stock) <= 0){
    return alert("庫存不足");
  }

  if(!confirm(`確定讓 ${student.name} 兌換「${reward.name}」？`)) return;

  state.points[studentId] = points - cost;
  if(reward.stock !== "" && reward.stock !== null && typeof reward.stock !== "undefined"){
    reward.stock = Number(reward.stock) - 1;
  }

  state.redeemLogs.push({
    id:makeId(),
    studentId,
    rewardId,
    rewardName:reward.name,
    cost,
    date:new Date().toISOString()
  });

  state.pointLogs.push({
    id:makeId(),
    studentId,
    amount:-cost,
    reason:`兌換：${reward.name}`,
    date:new Date().toISOString()
  });
  recordActivity("redeem", `${student.name} 兌換：${reward.name}（-${cost}）`, {studentId,rewardId,cost});

  saveState();
  render();
}

function addPointAction(){
  const name = document.getElementById("newPointActionName").value.trim();
  const amount = Number(document.getElementById("newPointActionAmount").value);
  const order = Number(document.getElementById("newPointActionOrder").value) || (state.pointActions || []).length + 1;
  if(!name) return alert("請輸入按鈕名稱");
  if(!state.pointActions) state.pointActions = [];
  state.pointActions.push({id:makeId(),name,amount,order,active:true});
  saveState();
  render();
}

function togglePointAction(id){
  const action = findById(state.pointActions,id);
  if(!action) return;
  action.active = action.active === false ? true : false;
  saveState();
  render();
}

function deletePointAction(id){
  const action = findById(state.pointActions,id);
  if(!action) return;
  if(!confirm("確定刪除「" + action.name + "」這個上課點數按鈕？")) return;
  state.pointActions = state.pointActions.filter(a => a.id !== id);
  saveState();
  render();
}

function addSchool(){
  const input = document.getElementById("newSchoolName");
  const name = input.value.trim();

  state.schools.push({id:makeId(),name,active:true});
  saveState();
  render();

function toggleSchool(id){
  const school = findById(state.schools,id);
  if(!school) return;
  school.active = !school.active;
  saveState();
  render();
}

function deleteSchoolForever(id){
  const school = findById(state.schools,id);
  if(!school) return;
  const relatedClasses = state.classes.filter(c => c.schoolId === id);
  const hasStudents = relatedClasses.some(c => state.enrollments.some(e => e.classId === c.id));
  let msg = "確定要永久刪除「" + school.name + "」嗎？\\n\\n這會一併刪除該學校底下的課程與課程歸屬。";
  if(hasStudents){
    msg += "\\n\\n注意：已有學生加入此學校課程，刪除後學生本身與點數會保留，但會從這些課程名單移除。";
  }
  if(!confirm(msg)) return;

  const classIds = relatedClasses.map(c => c.id);
  state.schools = state.schools.filter(s => s.id !== id);
  state.classes = state.classes.filter(c => c.schoolId !== id);
  state.enrollments = state.enrollments.filter(e => !classIds.includes(e.classId));
  state.attendance = state.attendance.filter(a => !classIds.includes(a.classId));
  state.courseNotes = state.courseNotes.filter(n => !classIds.includes(n.classId));

  if(classContext.schoolId === id){ classContext.schoolId = null; classContext.classId = null; }
  if(examContext.schoolId === id){ examContext.schoolId = null; examContext.classId = null; examContext.studentId = null; }
  if(historyContext.schoolId === id){ historyContext.schoolId = null; historyContext.classId = null; historyContext.studentId = null; }
  if(rewardContext.schoolId === id){ rewardContext.schoolId = null; rewardContext.classId = null; rewardContext.studentId = null; }

  saveState();
  render();
}

function promoteClassRoster(){
  const fromTerm = document.getElementById("promoteFromTerm").value;
  const toTerm = document.getElementById("promoteToTerm").value;
  const schoolId = document.getElementById("promoteSchool").value;
  const fromClassId = document.getElementById("promoteFromClass").value;
  const newClassName = document.getElementById("promoteNewClassName").value.trim();
  const newOrder = Number(document.getElementById("promoteNewClassOrder").value) || 1;
  if(!schoolId || !fromClassId || !newClassName) return alert("請選擇學校、來源課程，並輸入新課程名稱。");

  let targetClass = state.classes.find(c => c.schoolId === schoolId && c.name === newClassName);
  if(!targetClass){
    targetClass = {id:makeId(),schoolId,name:newClassName,order:newOrder,active:true};
    state.classes.push(targetClass);
  }

  const rosterStudentIds = state.enrollments.filter(e => e.classId === fromClassId).map(e => e.studentId);
  rosterStudentIds.forEach(studentId=>{
    if(!state.enrollments.some(e => e.studentId === studentId && e.classId === targetClass.id)){
      state.enrollments.push({studentId,classId:targetClass.id});
    }
  });

  saveState();
  alert(`已將 ${rosterStudentIds.length} 位學生複製到「${newClassName}」。\\n來源：${termName(fromTerm)}\\n目標：${termName(toTerm)}`);
  settingsTab = "classes";
  window.classSettingSchoolId = schoolId;
  render();
}

function gasUrl(){
  return (state.cloudConfig?.gasUrl || "").trim();
}
function gasUrlWithParams(params={}){
  const url = gasUrl();
  const query = new URLSearchParams(params).toString();
  return url + (url.includes("?") ? "&" : "?") + query;
}
function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}
function gasJsonp(action){
  return new Promise((resolve,reject)=>{
    const url = gasUrl();
    if(!url) return reject(new Error("請先貼上 Google Apps Script Web App URL。"));

    // 強制清除舊 JSONP script，避免 iPhone/iPad 快取或舊回呼卡住。
    document.querySelectorAll("script[data-gas-jsonp='1']").forEach(node=>{
      try{ node.remove(); }catch(e){}
    });

    const callbackName = "jsonp_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    script.id = callbackName;
    script.async = true;
    script.setAttribute("data-gas-jsonp","1");

    const timer = setTimeout(()=>{
      cleanup();
      reject(new Error("JSONP 讀取逾時：請確認 Apps Script URL、部署權限，或手機網路是否阻擋 Google Script。"));
    }, 45000);

    function cleanup(){
      clearTimeout(timer);
      try{ delete window[callbackName]; }catch(e){ window[callbackName] = undefined; }
      const el = document.getElementById(callbackName);
      if(el) el.remove();
    }

    window[callbackName] = function(response){
      cleanup();
      resolve(response);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP script 載入失敗：請確認 URL 是 /exec，且 Apps Script 部署權限為任何人。"));
    };

    // 重要：讀取一律走 GET + callback，不使用 fetch，避免 iPad/iPhone CORS/redirect 問題。
    script.src = gasUrlWithParams({
      action,
      callback: callbackName,
      t: Date.now(),
      r: Math.random().toString(36).slice(2)
    });

    document.body.appendChild(script);
  });
}

async function gasPostNoCors(action,data,version="v4.1.2"){
  const url = gasUrl();
  if(!url) throw new Error("請先貼上 Google Apps Script Web App URL。");

  const form = new FormData();
  form.append("payload", JSON.stringify({
    action,
    data,
    savedAt:localDateTimeString(),
    version
  }));

  await fetch(url,{method:"POST",mode:"no-cors",body:form});
  await sleep(1200);
  return {ok:true};
}

/* =========================================================
   CLEAN CORE: DATE / DISPLAY UTILITIES
   ========================================================= */
function daysAgoText(dateValue){
  if(!dateValue) return "尚未備份";
  const d = new Date(dateValue);
  if(Number.isNaN(d.getTime())) return String(dateValue);

  const now = new Date();
  const diffMs = now.getTime() - d.getTime();
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  if(diffDays <= 0) return "0 天前";
  if(diffDays === 1) return "1 天前";
  return `${diffDays} 天前`;
}

function safeFormatDateTime(value){
  if(!value) return "尚未紀錄";
  try{
    return formatDateTime(value);
  }catch(e){
    return String(value);
  }
}

function exportBackup(){
  if(!state.backupMeta) state.backupMeta = {};
  state.backupMeta.lastExportAt = new Date().toISOString();
  saveState();
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `教學系統備份_${today()}.json`;
  link.click();
  URL.revokeObjectURL(link.href);
}

function importBackup(file){
  if(!file) return;
  if(!confirm("匯入會覆蓋目前資料。系統會先自動下載一份目前資料備份，確定繼續？")) return;
  exportBackup();
  const reader = new FileReader();
  reader.onload = () => {
    try{
      state = migrateState(JSON.parse(reader.result));
      saveState();
      alert("匯入完成");
      render();
    }catch(err){
      alert("匯入失敗，請確認檔案格式");
    }
  };
  reader.readAsText(file);
}

function start933Distribution(studentId){
  const logs = (state.growthLogs || []).filter(l=>l.studentId===studentId);
  const map = {};
  let total = 0;
  logs.forEach(l=>{
    const xp = Math.max(0, Number(l.xp || l.points || 0) || 0);
    if(!xp) return;
    const key = l.type || l.title || "未分類";
    map[key] = (map[key] || 0) + xp;
    total += xp;
  });
  return {map,total};
}

/* =========================================================
   V9.3.9 START CLASS CLEAN CORE

   ========================================================= */
let sc939Mode = window.sc939Mode || "xp";
let sc939Attendance = window.sc939Attendance || {};
let sc939Timer = window.sc939Timer || null;

function sc939Esc(v){
  return typeof escapeHtml === "function" ? escapeHtml(v) : String(v ?? "").replace(/[&<>"']/g, s=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[s]));
}

function sc939Id(){
  return typeof makeId === "function" ? makeId() : `id_${Date.now()}_${Math.random().toString(16).slice(2)}`;
}

function sc939DateTime(){
  return typeof localIsoLikeString === "function" ? localIsoLikeString() : new Date().toISOString();
}

function sc939FormatDateTime(v){
  return typeof formatDateTime === "function" ? formatDateTime(v) : String(v || "");
}

function sc939Main(){
  try{ return typeof getWeeklyMainline === "function" ? getWeeklyMainline() : {}; }
  catch(e){ return {}; }
}

function sc939SplitTasks(raw){
  if(Array.isArray(raw)) return raw.map(x=>String(x).trim()).filter(Boolean);
  return String(raw || "").split(/\n/).map(x=>x.trim()).filter(Boolean);
}

function sc939TaskItems(){
  const main = sc939Main();
  const titles = sc939SplitTasks(main.tasks || "");
  const mins = Array.isArray(main.taskMinutes) ? main.taskMinutes : [];
  const fallback = titles.length ? Math.max(1, Math.floor(40/titles.length)) : 10;
  const items = titles.map((title,idx)=>({
    title,
    minutes:Math.max(1, Number(mins[idx] || fallback || 10))
  }));
  return items.length ? items : [
    {title:"暖身", minutes:5},
    {title:"本週主線", minutes:15},
    {title:"個別檢查", minutes:15},
    {title:"收尾回饋", minutes:5}
  ];
}

function sc939GrowthTypes(){
  try{
    if(typeof giEnsureSettings === "function") giEnsureSettings();
    if(typeof growthTypes === "function") return growthTypes().filter(t=>Number(t.defaultXp||t.xp||0)>0);
  }catch(e){}
  return [
    {id:"breath",name:"氣息",defaultXp:10,color:"#2fb37b"},
    {id:"tone",name:"音色",defaultXp:10,color:"#4b8df8"},
    {id:"rhythm",name:"節奏",defaultXp:10,color:"#f2a93b"},
    {id:"reading",name:"視譜",defaultXp:10,color:"#8b6cf6"},
    {id:"ensemble",name:"合奏",defaultXp:10,color:"#22a6b3"},
    {id:"help",name:"幫助同學",defaultXp:15,color:"#d4a017"}
  ];
}

function sc939Color(typeId){
  try{ if(typeof giColor === "function") return giColor(typeId); }catch(e){}
  const t = sc939GrowthTypes().find(x=>x.id===typeId || x.name===typeId);
  return t?.color || "#7fc8a9";
}

function sc939Name(typeId){
  try{ if(typeof giName === "function") return giName(typeId); }catch(e){}
  const t = sc939GrowthTypes().find(x=>x.id===typeId || x.name===typeId);
  return t?.name || typeId || "成長紀錄";
}

function sc939StudentXp(studentId){
  try{ if(typeof startClassStudentXp === "function") return startClassStudentXp(studentId); }catch(e){}
  return (state.growthLogs || []).filter(l=>l.studentId===studentId).reduce((s,l)=>s+(Number(l.xp||0)||0),0);
}

function sc939StudentPoints(studentId){
  const earned = (state.pointLogs || []).filter(l=>l.studentId===studentId).reduce((s,l)=>s+(Number(l.points ?? l.amount ?? 0)||0),0);
  const spent = (state.redeemLogs || []).filter(l=>l.studentId===studentId).reduce((s,l)=>s+(Number(l.cost ?? l.points ?? 0)||0),0);
  return earned - spent;
}

function sc939TimeToMin(t){
  const [h,m] = String(t || "10:30").split(":").map(n=>Number(n)||0);
  return h*60+m;
}

function sc939MinToTime(total){
  total = ((Number(total)||0)+1440)%1440;
  const h = Math.floor(total/60);
  const m = total%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function sc939NowMin(){
  const d = new Date();
  return d.getHours()*60+d.getMinutes();
}

function sc939StartTime(){
  return localStorage.getItem("battle_start_class_time") || "10:30";
}

function sc939SetStartTime(v){
  localStorage.setItem("battle_start_class_time", v || "10:30");
  renderStartClassMode();
}

function sc939Ranges(){
  let cur = sc939TimeToMin(sc939StartTime());
  return sc939TaskItems().map((item,idx)=>{
    const start = cur;
    const minutes = Math.max(1, Number(item.minutes||1));
    const end = start + minutes;
    cur = end;
    return {idx,title:item.title,minutes,start,end};
  });
}

function sc939Progress(){
  const ranges = sc939Ranges();
  if(!ranges.length) return 0;
  const start = ranges[0].start;
  const end = ranges[ranges.length-1].end;
  const now = sc939NowMin();
  if(now <= start) return 0;
  if(now >= end) return 100;
  return Math.round((now-start)/(end-start)*100);
}

function sc939ActiveName(){
  const now = sc939NowMin();
  const ranges = sc939Ranges();
  const active = ranges.find(r=>now>=r.start && now<r.end);
  if(active) return active.title;
  if(ranges.length && now >= ranges[ranges.length-1].end) return "本堂課已完成";
  return "尚未開始";
}

function sc939RenderFlow(){
  const ranges = sc939Ranges();
  const now = sc939NowMin();
  const total = ranges.reduce((s,r)=>s+r.minutes,0);
  return `
    <h3>本堂流程</h3>
    <div class="sc939-time-row">
      <div>
        <label>上課開始時間</label>
        <input type="time" value="${sc939Esc(sc939StartTime())}" onchange="sc939SetStartTime(this.value)">
      </div>
      <div>
        <label>總分鐘</label>
        <input value="${total}" readonly>
      </div>
    </div>
    <div class="sc939-hint">任務內容與分鐘數請到「課程紀錄／本週主線」編輯；這裡只作為上課時的時間提醒。</div>
    <div class="sc939-progress-title"><span>現在：${sc939Esc(sc939ActiveName())}</span><span>${sc939Progress()}%</span></div>
    <div class="sc939-progress"><div class="sc939-progress-fill" style="width:${sc939Progress()}%"></div></div>
    <div class="sc939-flow">
      ${ranges.map(r=>{
        const cls = now>=r.end ? "done" : (now>=r.start && now<r.end ? "active" : "upcoming");
        return `
          <div class="sc939-flow-card ${cls}">
            <span class="sc939-dot"></span>
            <div>
              <div class="sc939-flow-title">${sc939Esc(r.title)} <span class="sc939-badge">${r.minutes} 分鐘</span></div>
              <div class="sc939-flow-time">${sc939MinToTime(r.start)} - ${sc939MinToTime(r.end)}</div>
            </div>
          </div>

      }).join("")}

function sc939Distribution(studentId){
  const logs = (state.growthLogs || []).filter(l=>l.studentId===studentId);
  const map = {};
  let total = 0;
  logs.forEach(l=>{
    const xp = Math.max(0, Number(l.xp || 0) || 0);
    if(!xp) return;
    const key = l.type || "未分類";
    map[key] = (map[key] || 0) + xp;
    total += xp;
  });
  return {map,total};
}

  const {map,total} = sc939Distribution(studentId);
  const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);

    return `<div class="sc939-insight"><div class="sc939-insight-title">能力洞察 ⓘ</div><div class="sc939-hint">尚無成長資料</div></div>`;

  return `<div class="sc939-insight">

}

function v940SplitTasks(raw){

}

function v940WeeklyTaskTitles(){
  try{
    const main = typeof getWeeklyMainline === "function" ? getWeeklyMainline() : {};
    const arr = v940SplitTasks(main.tasks || "");
    if(arr.length) return arr;
  }catch(e){}
  return ["暖身", "本週主線", "個別檢查", "收尾回饋"];
}

function v940DefaultTasks(){
  const titles = v940WeeklyTaskTitles();
  const fallback = titles.length ? Math.max(1, Math.floor(40 / titles.length)) : 10;
  return titles.map((title,idx)=>({
    title,
    minutes: idx === titles.length - 1 ? Math.max(1, 40 - fallback * (titles.length - 1)) : fallback
  }));
}

  const key = v940ClassKey();
  if(!state.todayClassFlows[key]){

  }
  if(!state.todayClassFlows[key].startTime){
    state.todayClassFlows[key].startTime = localStorage.getItem("battle_start_class_time") || "10:30";

function v940MinutesToTime(total){
  total = ((Number(total)||0)+1440)%1440;
  const h = Math.floor(total/60);
  const m = total%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function v941FindTodayPanel(){

   4. 成長亮點：讀取冒險分數/點數/成長紀錄，只顯示

function lesson101Lines(raw){
  if(Array.isArray(raw)) return raw.map(x=>String(x).trim()).filter(Boolean);
  return String(raw || "").split(/\n/).map(x=>x.trim()).filter(Boolean);
}

function lesson101TaskTextFromWeeklyPlan(plan){
  if(!plan) return "";
  if(typeof plan.taskText === "string") return plan.taskText;
  if(Array.isArray(plan.tasks)) return plan.tasks.map(t=>typeof t === "string" ? t : t.title).filter(Boolean).join("\n");
  if(typeof plan.tasks === "string") return plan.tasks;
  return "";
}

function lesson101TaskTitlesFromText(){
  return lesson101Lines(document.getElementById("lessonWeeklyTaskText")?.value || "");
}

function lesson101MergeTasksIntoTodayFlow(titles){
  const rec = lessonRecord();
  const oldTasks = Array.isArray(rec.todayFlow.tasks) ? rec.todayFlow.tasks : [];
  const fallback = titles.length ? Math.max(1, Math.floor(40 / titles.length)) : 10;

  rec.todayFlow.tasks = titles.map((title,idx)=>{
    const old = oldTasks.find(t=>t.title === title) || oldTasks[idx];
    return {
      title,
      minutes: Math.max(1, Number(old?.minutes || fallback || 10)),
      done: !!old?.done
    };
  });
}

function lesson101MasterCurriculumText(){
  const candidates = [
    state.masterCurriculum,
    state.curriculumMaster,
    state.fixedCurriculum,
    state.curriculumText,
    state.settings?.masterCurriculum,
    state.settings?.fixedCurriculum,
    state.settings?.curriculumText,
    state.appSettings?.masterCurriculum,
    state.appSettings?.fixedCurriculum,
  ];

  for(const item of candidates){
    if(!item) continue;
    if(typeof item === "string" && item.trim()) return item.trim();
    if(typeof item === "object"){
      if(typeof item.text === "string" && item.text.trim()) return item.text.trim();
      if(typeof item.content === "string" && item.content.trim()) return item.content.trim();
      if(Array.isArray(item.items) && item.items.length) return item.items.map(x=>typeof x==="string"?x:(x.title||x.name||JSON.stringify(x))).join("\n");
    }
  }

  // Try class/course level curriculum if exists.
  try{
    const cls = findById?.(state.classes, classContext?.classId);
    if(cls?.curriculum) return typeof cls.curriculum === "string" ? cls.curriculum : JSON.stringify(cls.curriculum,null,2);
  }catch(e){}

  return "";
}

}

/* =========================================================
   V10.4 START CLASS CLOCK PRECISION FIX
   More precise update: align refresh to the device clock second boundary.
   ========================================================= */
function sc104ClearTimers(){
  if(window.sc939Timer) {
    try{ clearInterval(window.sc939Timer); }catch(e){}
    window.sc939Timer = null;
  }
  if(window.sc104Timer) {
    try{ clearTimeout(window.sc104Timer); }catch(e){}
    window.sc104Timer = null;
  }
}

function sc104SchedulePreciseTick(){
  if(!document.body.classList.contains("start-class-mode")) return;

  const now = new Date();
  const msToNextSecond = 1000 - now.getMilliseconds() + 20;

  window.sc104Timer = setTimeout(()=>{
    if(document.body.classList.contains("start-class-mode")){
      try{
        renderStartClassMode();
      }catch(e){
        console.warn(e);
      }
    }
    sc104SchedulePreciseTick();
  }, msToNextSecond);
}

const __sc104RenderStartClassMode = typeof renderStartClassMode === "function" ? renderStartClassMode : null;
if(__sc104RenderStartClassMode){
  renderStartClassMode = function(){
    const result = __sc104RenderStartClassMode.apply(this, arguments);

    // Replace older 30-second timer with precise 1-second clock-aligned timer.
    if(document.body.classList.contains("start-class-mode")){
      if(!window.sc104PreciseStarted){
        window.sc104PreciseStarted = true;
        sc104ClearTimers();
        sc104SchedulePreciseTick();
      }
    }

    return result;
  };
}

const __sc104ExitStartClassMode = typeof exitStartClassMode === "function" ? exitStartClassMode : null;
if(__sc104ExitStartClassMode){
  exitStartClassMode = function(){
    window.sc104PreciseStarted = false;
    sc104ClearTimers();
    return __sc104ExitStartClassMode.apply(this, arguments);
  };
}

/* Improve active-state calculation by considering seconds, not only minutes. */
function sc104TimeToSeconds(t){
  const parts = String(t || "10:30").split(":").map(n=>Number(n)||0);
  return (parts[0]||0)*3600 + (parts[1]||0)*60 + (parts[2]||0);
}

function sc104NowSeconds(){
  const d = new Date();
  return d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
}

function sc939Ranges(){
  let cur = sc104TimeToSeconds(sc939StartTime());
  return sc939TaskItems().map((item,idx)=>{
    const start = cur;
    const minutes = Math.max(1, Number(item.minutes||1));
    const end = start + minutes*60;
    cur = end;
    return {idx,title:item.title,minutes,start,end};
  });
}

function sc939Progress(){
  const ranges = sc939Ranges();
  if(!ranges.length) return 0;
  const start = ranges[0].start;
  const end = ranges[ranges.length-1].end;
  const now = sc104NowSeconds();
  if(now <= start) return 0;
  if(now >= end) return 100;
  return Math.round((now-start)/(end-start)*100);
}

function sc939ActiveName(){
  const now = sc104NowSeconds();
  const ranges = sc939Ranges();
  const active = ranges.find(r=>now>=r.start && now<r.end);
  if(active) return active.title;
  if(ranges.length && now >= ranges[ranges.length-1].end) return "本堂課已完成";
  return "尚未開始";
}

function sc939MinToTime(totalSeconds){
  totalSeconds = ((Number(totalSeconds)||0)+86400)%86400;
  const h = Math.floor(totalSeconds/3600);
  const m = Math.floor((totalSeconds%3600)/60);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function sc1041MinToTime(v){

  const total = ((Number(v)||0)+86400)%86400;
  const h = Math.floor(total/3600);

function sc1041FlowRanges(){

function sc1041LessonTasks(){

function sc1041RenderFlowCards(){
  const ranges = sc1041FlowRanges();

  const nextIdx = ranges.findIndex(r => now < r.start);

    const task = tasks[r.idx] || {};
    const isCurrent = now >= r.start && now < r.end;
    const isPast = now >= r.end;
    const isNext = !isCurrent && !isPast && r.idx === nextIdx;
    const isDone = !!task.done;
    const cls = ["v942-start-flow-card",isCurrent?"v1041-task-current":"",isNext?"v1041-task-next":"",isPast?"v1041-task-past":"",isDone?"v1041-task-done":""].filter(Boolean).join(" ");
    const badge = isCurrent ? `<span class="v1041-now-badge">現在</span>` : (isNext ? `<span class="v1041-next-badge">下一個</span>` : "");
    return `
      <div class="${cls}">
        <input class="v942-start-check" type="checkbox" ${isDone ? "checked" : ""} onchange="sc939ToggleTask(${r.idx},this.checked);renderStartClassMode()">

/* =========================================================
   V10.6.1 FULL-CARD BACKGROUND PROGRESS
   Override only task card rendering:
   - remove duplicate carry badge
   - add full-card fill percentage for current task
   ========================================================= */
function st1061CurrentFillPercent(range){
  const now = st106NowSeconds();
  if(now <= range.start) return 0;
  if(now >= range.end) return 100;
  return Math.max(0, Math.min(100, Math.round((now - range.start) / (range.end - range.start) * 100)));
}

function st106TaskCard(r,tasks,now,nextIdx,activeOverdueIdx){
  const task = tasks[r.idx] || {};
  const status = st106Status(task);
  const isCurrent = now>=r.start && now<r.end;
  const isPast = now>=r.end;
  const isNext = !isCurrent && !isPast && r.idx===nextIdx;
  const overdueSec = st106OverdueSeconds(r,task);
  const overdueLevel = st106OverdueLevel(r,task);
  const activeOverdue = r.idx===activeOverdueIdx;
  const fill = isCurrent ? st1061CurrentFillPercent(r) : 0;

  const cls = [
    "st106-task",
    isCurrent?"current":"",
    isNext?"next":"",
    isPast && status==="pending" && overdueLevel==="none"?"past":"",
    status==="done"?"done":"",
    status==="carry"?"carry":"",
    overdueLevel==="soft"?"overdue-soft":"",
    overdueLevel==="hard"?"overdue-hard":"",
    activeOverdue?"active-overdue":""
  ].filter(Boolean).join(" ");

  const badges = [
    isCurrent?`<span class="st106-badge now">現在</span>`:"",
    isNext?`<span class="st106-badge next">下一個</span>`:"",
    // 保留狀態由卡片右上角紫色標籤呈現，這裡不再重複顯示
    overdueLevel!=="none"?`<span class="st106-badge overdue-${overdueLevel}">${Math.floor(overdueSec/60)>0?`超時 ${Math.floor(overdueSec/60)} 分`:"超時中"}</span>`:""
  ].join("");

  const suggestion = overdueLevel==="soft"
    ? `<div class="st106-suggestion">已超時，可完成、保留至下次或繼續觀察。</div>`
    : (overdueLevel==="hard"
      ? `<div class="st106-suggestion hard">已落後 ${Math.floor(overdueSec/60)} 分鐘，建議保留部分任務或縮短後面流程。</div>`
      : "");

  return `
    <div class="${cls}" style="--st106-task-fill:${fill}%">
      <button class="st106-status-btn ${status}" onclick="st106CycleStatus(${r.idx})" title="${st106Esc(st106Label(status))}">
        ${st106Icon(status)}
      </button>
      <div>
        <div class="st106-task-title">${st106Esc(r.title)} <span class="st106-badge">${r.minutes} 分鐘</span>${badges}</div>
        <div class="st106-task-meta">${st106SecondsToTime(r.start)} - ${st106SecondsToTime(r.end)}｜${st106Esc(st106Label(status))}</div>
        ${suggestion}
      </div>
    </div>
  `;
}



/* =========================================================
   V10.6.2 START CLASS MODULE CONSOLIDATION
   不改 UI / 不改資料結構，只整理開始上課內部責任分層：
   1. Task Engine
   2. Task Card Renderer
   3. Timer Loop
   4. Student Interaction Layer
   ========================================================= */

/* ---------- 1. Task Engine ---------- */
const ST1062_TaskEngine = {
  nowSeconds(){
    const d = new Date();
    return d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
  },
  timeToSeconds(t){
    const p = String(t || "10:30").split(":").map(n=>Number(n)||0);
    return (p[0]||0)*3600 + (p[1]||0)*60 + (p[2]||0);
  },
  secondsToTime(total){
    total = ((Number(total)||0)+86400)%86400;
    const h = Math.floor(total/3600);
    const m = Math.floor((total%3600)/60);
    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  },
  normalizeTask(task){
    if(!task) return task;
    task.title = task.title || "未命名任務";
    task.minutes = Math.max(1, Number(task.minutes || 1));
    if(!task.status) task.status = task.done ? "done" : "pending";
    task.done = task.status === "done";
    return task;
  },
  status(task){
    this.normalizeTask(task);
    return task?.status || "pending";
  },
  statusLabel(status){
    if(status === "done") return "已完成";
    if(status === "carry") return "保留至下次";
    return "未完成";
  },
  statusIcon(status){
    if(status === "done") return "✓";
    if(status === "carry") return "↷";
    return "○";
  },
  nextStatus(status){
    if(status === "pending") return "done";
    if(status === "done") return "carry";
    return "pending";
  },
  ranges(tasks,startTime){
    let cur = this.timeToSeconds(startTime);
    return (tasks || []).map((task,idx)=>{
      const t = this.normalizeTask(task);
      const start = cur;
      const end = start + t.minutes*60;
      cur = end;
      return {idx,title:t.title,minutes:t.minutes,start,end};
    });
  },
  fillPercent(range, now){
    if(!range) return 0;
    if(now <= range.start) return 0;
    if(now >= range.end) return 100;
    return Math.max(0, Math.min(100, Math.round((now - range.start)/(range.end - range.start)*100)));
  },
  progress(ranges, now){
    if(!ranges?.length) return 0;
    const start = ranges[0].start;
    const end = ranges[ranges.length-1].end;
    if(now <= start) return 0;
    if(now >= end) return 100;
    return Math.round((now-start)/(end-start)*100);
  },
  activeName(ranges, now){
    const active = (ranges || []).find(r=>now>=r.start && now<r.end);
    if(active) return active.title;
    if(ranges?.length && now >= ranges[ranges.length-1].end) return "本堂課已完成";
    return "尚未開始";
  },
  overdueSeconds(range, task, now){
    if(this.status(task) !== "pending") return 0;
    return Math.max(0, now - range.end);
  },
  overdueLevel(range, task, now){
    const sec = this.overdueSeconds(range, task, now);
    if(sec <= 0) return "none";
    if(sec >= 180) return "hard";
    return "soft";
  },
  runtime(range, task, ctx){
    const status = this.status(task);
    const now = ctx.now;
    const current = now >= range.start && now < range.end;
    const past = now >= range.end;
    const next = !current && !past && range.idx === ctx.nextIdx;
    const overdueSec = this.overdueSeconds(range, task, now);
    const overdue = this.overdueLevel(range, task, now);
    const activeOverdue = range.idx === ctx.activeOverdueIdx;
    return {
      idx:range.idx,
      title:range.title,
      minutes:range.minutes,
      start:range.start,
      end:range.end,
      status,
      label:this.statusLabel(status),
      icon:this.statusIcon(status),
      current,
      past,
      next,
      done:status === "done",
      carry:status === "carry",
      overdue,
      overdueSec,
      activeOverdue,
      fill:current ? this.fillPercent(range, now) : 0
    };
  },
  firstOverdueIndex(ranges,tasks,now){
    for(const r of ranges || []){
      if(this.overdueLevel(r, tasks[r.idx], now) !== "none") return r.idx;
    }
    return -1;
  },
  summary(tasks){
    const total = tasks.length;
    const done = tasks.filter(t=>this.status(t)==="done").length;
    const carry = tasks.filter(t=>this.status(t)==="carry").length;
    return {total,done,carry,rate:total ? Math.round(done/total*100) : 0};
  }
};

/* ---------- 2. Task Card Renderer ---------- */
const ST1062_TaskCardRenderer = {
  badge(kind,text){
    return `<span class="st106-badge ${kind}">${text}</span>`;
  },
  classes(state){
    return [
      "st106-task",
      state.current ? "current" : "",
      state.next ? "next" : "",
      state.past && state.status === "pending" && state.overdue === "none" ? "past" : "",
      state.done ? "done" : "",
      state.carry ? "carry" : "",
      state.overdue === "soft" ? "overdue-soft" : "",
      state.overdue === "hard" ? "overdue-hard" : "",
      state.activeOverdue ? "active-overdue" : ""
    ].filter(Boolean).join(" ");
  },
  badges(state){
    return [
      state.current ? this.badge("now","現在") : "",
      state.next ? this.badge("next","下一個") : "",
      // 保留狀態只用卡片右上角標籤，不重複 badge
      state.overdue !== "none"
        ? this.badge(`overdue-${state.overdue}`, Math.floor(state.overdueSec/60)>0 ? `超時 ${Math.floor(state.overdueSec/60)} 分` : "超時中")
        : ""
    ].join("");
  },
  suggestion(state){
    if(state.overdue === "soft"){
      return `<div class="st106-suggestion">已超時，可完成、保留至下次或繼續觀察。</div>`;
    }
    if(state.overdue === "hard"){
      return `<div class="st106-suggestion hard">已落後 ${Math.floor(state.overdueSec/60)} 分鐘，建議保留部分任務或縮短後面流程。</div>`;
    }
    return "";
  },
  render(state){
    return `
      <div class="${this.classes(state)}" style="--st106-task-fill:${state.fill}%">
        <button class="st106-status-btn ${state.status}" onclick="ST1062_TaskActions.cycle(${state.idx})" title="${st106Esc(state.label)}">
          ${state.icon}
        </button>
        <div>
          <div class="st106-task-title">${st106Esc(state.title)} <span class="st106-badge">${state.minutes} 分鐘</span>${this.badges(state)}</div>
          <div class="st106-task-meta">${ST1062_TaskEngine.secondsToTime(state.start)} - ${ST1062_TaskEngine.secondsToTime(state.end)}｜${st106Esc(state.label)}</div>
          ${this.suggestion(state)}
        </div>
      </div>
    `;
  }
};

/* ---------- 3. Timer Loop ---------- */
const ST1062_TimerLoop = {
  timer:null,
  start(){
    this.stop();
    if(!document.body.classList.contains("start-class-mode")) return;
    const now = new Date();
    const delay = 1000 - now.getMilliseconds() + 20;
    this.timer = setTimeout(()=>{
      if(document.body.classList.contains("start-class-mode")){
        try{ renderStartClassMode(); }catch(e){ console.warn(e); }
        this.start();
      }
    }, delay);
  },
  stop(){
    if(this.timer) clearTimeout(this.timer);
    this.timer = null;
  }
};

/* ---------- 4. Student Interaction Layer ---------- */
const ST1062_StudentActions = {
  setMode(mode){
    st106Mode = mode;
    window.st106Mode = mode;
    renderStartClassMode();
  },
  setAttendance(id,value){
    st106Attendance[id] = value;
    window.st106Attendance = st106Attendance;
    renderStartClassMode();
  },

const ST1062_TaskActions = {
  cycle(idx){

  setStatus(idx,status){
    const tasks = st106Tasks();

};

/* =========================================================
   V10.6.4 START CLASS EXPANSION BASE

function st1064RuntimeStats(){
  const tasks = st106Tasks();
  const ranges = st106Ranges();
  const now = ST1062_TaskEngine.nowSeconds();
  const summary = ST1062_TaskEngine.summary(tasks);
  const current = ranges.find(r=>now>=r.start && now<r.end);
  const activeName = ST1062_TaskEngine.activeName(ranges,now);

  const overdue = ranges.map(r=>{
    const task = tasks[r.idx];
    const level = ST1062_TaskEngine.overdueLevel(r,task,now);
    const sec = ST1062_TaskEngine.overdueSeconds(r,task,now);
    return {range:r,task,level,sec};
  }).filter(x=>x.level!=="none");

  const hard = overdue.filter(x=>x.level==="hard");
  const soft = overdue.filter(x=>x.level==="soft");
  const carry = tasks.filter(t=>ST1062_TaskEngine.status(t)==="carry");

  return {tasks,ranges,now,summary,current,activeName,overdue,hard,soft,carry};
}

function st1064CopilotItems(){
  const s = st1064RuntimeStats();
  const items = [];

  if(s.hard.length){
    items.push({
      type:"danger",
      text:`已嚴重落後 ${s.hard.length} 個任務，建議將部分任務標記為「保留至下次」，或縮短後面流程。`
    });
  }else if(s.soft.length){
    items.push({
      type:"warn",
      text:`目前有 ${s.soft.length} 個任務超時，可完成、保留至下次，或繼續觀察。`
    });
  }

  if(s.carry.length){
    items.push({
      type:"carry",
      text:`本堂目前有 ${s.carry.length} 個任務保留至下次，系統會同步到提醒事項。`
    });
  }

  if(s.summary.total && s.summary.rate >= 80){
    items.push({
      type:"good",
      text:`本堂完成率已達 ${s.summary.rate}%，可以準備收尾回饋或整理回家功課。`
    });
  }

  if(s.current){
    const fill = ST1062_TaskEngine.fillPercent(s.current,s.now);
    if(fill >= 80 && fill < 100){
      items.push({
        type:"warn",
        text:`目前任務已進行 ${fill}%，可以提醒自己準備切到下一個流程。`
      });
    }
  }

  if(!items.length){
    items.push({
      type:"good",
      text:"目前課堂節奏正常，照流程進行即可。"
    });
  }

  return items;
}

function st107AnalyzeRhythm(){
  const stats = st1064RuntimeStats ? st1064RuntimeStats() : null;
  if(!stats) return [];
  const items = [];

  const remaining = stats.tasks.filter(t=>ST1062_TaskEngine.status(t)==="pending").length;
  const now = ST1062_TaskEngine.nowSeconds();
  const ranges = stats.ranges;
  const end = ranges.length ? ranges[ranges.length-1].end : now;
  const minutesLeft = Math.max(0, Math.floor((end-now)/60));

  if(remaining >= 3 && minutesLeft <= 8){
    items.push({
      type:"danger",
      text:`剩約 ${minutesLeft} 分鐘，但還有 ${remaining} 個任務未完成，建議保留部分任務。`
    });
  }

  if(stats.hard.length){
    items.push({
      type:"danger",
      text:`嚴重超時任務：${stats.hard.map(x=>x.range.title).join("、")}。`
    });
  }

  if(stats.carry.length >= 2){
    items.push({
      type:"carry",
      text:`本堂保留任務較多，結束後建議檢查下次流程是否需要補課。`
    });
  }

  if(stats.summary.rate === 0 && ST1062_TaskEngine.progress(ranges,now) > 50){
    items.push({
      type:"warn",
      text:`時間進度已過半，但尚未勾選完成任務，提醒記錄真實上課進度。`
    });
  }

  if(!items.length){
    items.push({type:"good",text:"目前節奏穩定，維持現在流程即可。"});
  }
  return items;
}

function st109TagsFor(studentId){
  st109EnsureStores();
  const key = st109TagKey(studentId);

const ST109_TAGS = [
  {id:"check_next", label:"下次先檢查", cls:""},
  {id:"good_today", label:"今天狀態好", cls:"good"},
  {id:"needs_reminder", label:"需要提醒", cls:"warn"},
  {id:"challenge_ready", label:"可挑戰", cls:"challenge"}
];

function st109ToggleTag(studentId, tagId){
  st109EnsureStores();
  const key = st109TagKey(studentId);
  const arr = st109TagsFor(studentId);
  const idx = arr.indexOf(tagId);
  if(idx >= 0) arr.splice(idx,1);
  else arr.push(tagId);
  state.studentQuickTags[key] = arr;

  const st = (state.students || []).find(s=>s.id===studentId);
  const tag = ST109_TAGS.find(t=>t.id===tagId);
  ST108.replay.log("tag", `${st?.name || "學生"} 標記：${tag?.label || tagId}`);

  try{ saveState(); }catch(e){}
  renderStartClassMode();
}

function st109GenerateNextSuggestions(){
  const tasks = st106Tasks();
  const ranges = st106Ranges();
  const now = ST1062_TaskEngine.nowSeconds();

  const carry = tasks.filter(t=>ST1062_TaskEngine.status(t)==="carry").map(t=>`補上：${t.title}`);
  const pendingOverdue = ranges
    .map(r=>({r, task:tasks[r.idx], sec:ST1062_TaskEngine.overdueSeconds(r,tasks[r.idx],now)}))
    .filter(x=>x.sec>0 && ST1062_TaskEngine.status(x.task)==="pending")
    .map(x=>`檢查是否需要調整時間：${x.r.title}（本堂超時 ${Math.floor(x.sec/60)} 分）`);

  const tagSuggestions = [];
  st106Students().forEach(st=>{
    const tags = st109TagsFor(st.id);
    if(tags.includes("check_next")) tagSuggestions.push(`下次先檢查：${st.name}`);
    if(tags.includes("needs_reminder")) tagSuggestions.push(`下次提醒：${st.name}`);
    if(tags.includes("challenge_ready")) tagSuggestions.push(`可安排挑戰：${st.name}`);
  });

  const tips = [...carry, ...pendingOverdue, ...tagSuggestions];
  if(!tips.length) tips.push("下次可依原流程繼續進行。");
  return tips;
}

function st109SaveNextSuggestions(){
  st109EnsureStores();
  const suggestions = st109GenerateNextSuggestions();
  const sessionKey = st109SessionKey();
  const old = state.nextClassSuggestions.filter(x=>x.sessionKey!==sessionKey);
  old.push({
    id:st106Id(),
    sessionKey,
    courseKey:st106CourseKey(),
    date:classContext?.date || new Date().toISOString().slice(0,10),
    createdAt:new Date().toISOString(),
    suggestions
  });
  state.nextClassSuggestions = old.slice(-100);
  try{ saveState(); }catch(e){}
  return suggestions;
}

}

function st110MageById(id){
  return ST110_MAGE_TYPES.find(m=>m.id===id) || ST110_MAGE_TYPES[0];
}

function st110StudentLogs(studentId){
  return (state.growthLogs || []).filter(l=>l.studentId===studentId);
}

function st110LogMageId(log){
  const raw = `${log.type || ""} ${typeof st106TypeName==="function" ? st106TypeName(log.type) : ""} ${log.feedback || ""}`.toLowerCase();
  for(const mage of ST110_MAGE_TYPES){
    if(mage.id==="grand") continue;
    if(mage.keys.some(k=>raw.includes(String(k).toLowerCase()))){
      return mage.id;
    }
  }
  return "unknown";
}

function st110MageProfile(studentId){
  const logs = st110StudentLogs(studentId);
  const totalXp = logs.reduce((s,l)=>s+(Number(l.xp||0)||0),0);
  const score = {};
  logs.forEach(l=>{
    const xp = Math.max(0,Number(l.xp || 0) || 0);
    const id = st110LogMageId(l);
    if(id !== "unknown") score[id] = (score[id] || 0) + xp;
  });

  const entries = Object.entries(score).sort((a,b)=>b[1]-a[1]);
  const activeValues = entries.map(e=>e[1]).filter(v=>v>0);
  let isBalanced = false;
  if(activeValues.length >= 4 && totalXp >= 120){
    const max = Math.max(...activeValues);
    const min = Math.min(...activeValues);
    isBalanced = min >= max * 0.45;
  }

  const mage = isBalanced ? st110MageById("grand") : st110MageById(entries[0]?.[0] || "wind");
  const roleXp = isBalanced ? totalXp : (entries[0]?.[1] || 0);
  const mageLevel = Math.max(1, Math.floor(roleXp / 60) + 1);
  const globalLevel = Math.max(1, Math.floor(totalXp / 100) + 1);
  const second = entries[1] ? st110MageById(entries[1][0]) : null;

  return {
    mage,
    score,
    entries,
    totalXp,
    roleXp,
    mageLevel,
    globalLevel,
    second,
    isBalanced
  };
}

function st111AbilityScores(studentId){
  const logs = (state.growthLogs || []).filter(l=>l.studentId===studentId);
  const scores = {};
  ST111_ABILITIES.forEach(a=>scores[a.id]=0);

  logs.forEach(l=>{
    const raw = `${l.type || ""} ${typeof st106TypeName==="function" ? st106TypeName(l.type) : ""} ${l.feedback || ""}`.toLowerCase();
    const xp = Math.max(0, Number(l.xp || 0) || 0);
    let matched = false;
    for(const a of ST111_ABILITIES){
      if(a.keys.some(k=>raw.includes(String(k).toLowerCase()))){
        scores[a.id] += xp;
        matched = true;
      }
    }
    if(!matched && xp>0) scores.practice += Math.round(xp*.6);
  });

  return scores;
}

function st111AbilityPercentages(studentId){
  const scores = st111AbilityScores(studentId);

  ST111_ABILITIES.forEach(a=>{
    const raw = scores[a.id] || 0;
    result[a.id] = Math.max(raw>0 ? 18 : 0, Math.min(100, Math.round(raw / max * 100)));
  });
  return result;
}

const ST114 = {
  version:"11.4",

  /* 1. 課堂流程模組 */
  ClassFlowSystem:{
    getTasks(){
      return typeof st106Tasks==="function" ? st106Tasks() : [];
    },
    getRanges(){
      return typeof st106Ranges==="function" ? st106Ranges() : [];
    },
    getNow(){
      return window.ST1062_TaskEngine?.nowSeconds?.() || 0;
    },
    getSummary(){
      return window.ST1062_TaskEngine?.summary?.(this.getTasks()) || {total:0,done:0,carry:0,rate:0};
    },
    getContext(){
      const tasks = this.getTasks();
      const ranges = this.getRanges();
      const now = this.getNow();
      const nextIdx = ranges.findIndex(r=>now<r.start);
      const activeOverdueIdx = window.ST1062_TaskEngine?.firstOverdueIndex?.(ranges,tasks,now) ?? -1;
      const total = ranges.reduce((s,r)=>s+(Number(r.minutes)||0),0);
      return {tasks,ranges,now,nextIdx,activeOverdueIdx,total,summary:this.getSummary()};
    },
    render(){
      if(typeof st108RenderFlow==="function"){
        return st108RenderFlow();
      }
      if(typeof st106Flow==="function"){
        return st106Flow();
      }
      return "";
    },
    setTaskStatus(idx,status){
      return window.ST1062_TaskActions?.setStatus?.(idx,status);
    },
    cycleTaskStatus(idx){

const ST124_LeftFlow = {
  tasks(){
    const tasks = typeof st120Tasks === "function"
      ? st120Tasks()
      : (typeof st106Tasks === "function" ? st106Tasks() : []);
    return tasks || [];
  },
  startTime(){

  },
  now(){
    return window.ST1062_TaskEngine?.nowSeconds?.() || (()=>{const d=new Date();return d.getHours()*3600+d.getMinutes()*60+d.getSeconds();})();
  },
  ranges(){
    const tasks = this.tasks();
    if(window.ST1062_TaskEngine?.ranges){
      return ST1062_TaskEngine.ranges(tasks,this.startTime());
    }
    if(typeof st106Ranges === "function") return st106Ranges();
    return [];
  },
  status(task){
    return window.ST1062_TaskEngine?.status?.(task) || task?.status || (task?.done ? "done" : "pending");
  },
  progress(ranges,now){
    if(window.ST1062_TaskEngine?.progress) return ST1062_TaskEngine.progress(ranges,now);
    if(!ranges.length) return 0;
    const start = ranges[0].start;
    const end = ranges[ranges.length-1].end;
    if(now<=start) return 0;
    if(now>=end) return 100;
    return Math.round((now-start)/(end-start)*100);
  },
  activeName(ranges,now){
    if(window.ST1062_TaskEngine?.activeName) return ST1062_TaskEngine.activeName(ranges,now);
    const active = ranges.find(r=>now>=r.start && now<r.end);
    if(active) return active.title;
    if(ranges.length && now>=ranges[ranges.length-1].end) return "本堂課已完成";
    return "尚未開始";
  },
  summary(tasks){
    if(window.ST1062_TaskEngine?.summary) return ST1062_TaskEngine.summary(tasks);
    const total = tasks.length;
    const done = tasks.filter(t=>this.status(t)==="done").length;
    const carry = tasks.filter(t=>this.status(t)==="carry").length;
    return {total,done,carry,rate:total?Math.round(done/total*100):0};
  },
  fill(range,now){
    if(window.ST1062_TaskEngine?.fillPercent) return ST1062_TaskEngine.fillPercent(range,now);
    const total = Math.max(1,range.end-range.start);
    return Math.max(0,Math.min(100,Math.round((now-range.start)/total*100)));
  },
  overdueSec(range,task,now){
    if(window.ST1062_TaskEngine?.overdueSeconds) return ST1062_TaskEngine.overdueSeconds(range,task,now);

  renderTimeHeader(ctx){
    return `

        <div class="st106-field">
          <label>上課開始時間</label>
          <input type="time" value="${st106Esc(this.startTime())}" onchange="st106SetStartTime(this.value)">

    `;
  },
  renderMagicQuest(ctx){

  taskState(range,ctx){
    const task = ctx.tasks[range.idx] || {};
    const status = this.status(task);
    const isCurrent = ctx.now>=range.start && ctx.now<range.end;
    const isPast = ctx.now>=range.end;

    const overdueSec = this.overdueSec(range,task,ctx.now);

          ${suggestion}

  findContainer(){

    return candidates.find(el=>{

    }) || null;

  liveUpdate(){

      const spans = head.querySelectorAll("span");
      if(spans[0]) spans[0].textContent = `現在：${ctx.activeName}`;

/* Done => jump to next pending task */
function st124SecondsToHHMM(totalSeconds){
  totalSeconds = ((Math.floor(totalSeconds)%86400)+86400)%86400;
  const h = Math.floor(totalSeconds/3600);
  const m = Math.floor((totalSeconds%3600)/60);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function st124JumpToNextPending(doneIdx){
  try{
    const tasks = ST124_LeftFlow.tasks();
    const nextIdx = tasks.findIndex((t,i)=>i>doneIdx && ST124_LeftFlow.status(t)==="pending");
    if(nextIdx<0) return;
    const minutesBefore = tasks.slice(0,nextIdx).reduce((s,t)=>s+(Number(t.minutes)||0),0);
    const newStart = st124SecondsToHHMM(ST124_LeftFlow.now() - minutesBefore*60);
    if(typeof st106SetStartTime==="function") st106SetStartTime(newStart);
  }catch(e){ console.warn("st124JumpToNextPending failed",e); }
}

/* Tempo analysis */
function st124EnsureTempoStore(){
  if(!Array.isArray(state.classTempoNotes)) state.classTempoNotes = [];
}
function st124SessionKey(){
  try{ return `${st106CourseKey()}__${classContext?.date || new Date().toISOString().slice(0,10)}`; }
  catch(e){ return `session__${new Date().toISOString().slice(0,10)}`; }
}
function st124RecordTempo(idx){
  try{
    st124EnsureTempoStore();
    const tasks = ST124_LeftFlow.tasks();
    const ranges = ST124_LeftFlow.ranges();
    const now = ST124_LeftFlow.now();
    const r = ranges.find(x=>x.idx===idx);
    const t = tasks[idx];
    if(!r || !t) return;
    const lateSec = Math.max(0,now-r.end);
    if(lateSec>=60){
      state.classTempoNotes.push({
        id: typeof st106Id==="function" ? st106Id() : String(Date.now()),
        sessionKey: st124SessionKey(),
        date: classContext?.date || new Date().toISOString().slice(0,10),
        taskTitle: t.title || "未命名任務",
        plannedMin: Number(t.minutes || r.minutes || 0)||0,
        lateMin: Math.ceil(lateSec/60),
        createdAt: new Date().toISOString()
      });

function st124TempoSuggestions(){

  notes.forEach(n=>{

    if(!by[k]) by[k] = {taskTitle:k,plannedMin:n.plannedMin||0,maxLate:0};

    by[k].maxLate = Math.max(by[k].maxLate,Number(n.lateMin||0));
  });
  return Object.values(by).filter(x=>x.maxLate>0).sort((a,b)=>b.maxLate-a.maxLate).map(x=>{
    const add = Math.max(2,Math.ceil(x.maxLate/2)*2);
    const newMin = x.plannedMin + add;
    if(x.maxLate>=6) return `「${x.taskTitle}」嚴重超時約 ${x.maxLate} 分鐘，建議下次延長到 ${newMin} 分鐘，或拆成兩個小任務。`;

/* =========================================================
   V13.0 ST130 LEFT FLOW MODULE SYSTEM

   ST130_TaskEngine    純任務狀態邏輯，不碰 HTML
   ST131_TaskRenderer  純畫面渲染
   ST132_TaskAnimation 純動畫與即時視覺更新
   ST133_TaskSummary   純摘要與教學節奏分析
   ========================================================= */

const ST130_TaskEngine = {
  tasks(){
    const tasks = typeof st120Tasks === "function"
      ? st120Tasks()
      : (typeof st106Tasks === "function" ? st106Tasks() : []);
    return tasks || [];
  },
  startTime(){
    return typeof st106StartTime === "function" ? st106StartTime() : "10:30";
  },
  now(){
    if(window.ST1062_TaskEngine?.nowSeconds) return ST1062_TaskEngine.nowSeconds();
    const d = new Date();
    return d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
  },
  ranges(tasks=this.tasks(), startTime=this.startTime()){
    if(window.ST1062_TaskEngine?.ranges) return ST1062_TaskEngine.ranges(tasks,startTime);
    if(typeof st106Ranges === "function") return st106Ranges();
    let cur = this.timeToSeconds(startTime);
    return tasks.map((t,idx)=>{
      const start = cur;
      const min = Math.max(1,Number(t.minutes||1));
      const end = start + min*60;
      cur = end;
      return {idx,title:t.title||"未命名任務",minutes:min,start,end};
    });
  },
  timeToSeconds(t){
    if(window.ST1062_TaskEngine?.timeToSeconds) return ST1062_TaskEngine.timeToSeconds(t);
    const p = String(t || "10:30").split(":").map(n=>Number(n)||0);
    return (p[0]||0)*3600 + (p[1]||0)*60 + (p[2]||0);
  },
  secondsToTime(sec){
    if(window.ST1062_TaskEngine?.secondsToTime) return ST1062_TaskEngine.secondsToTime(sec);
    sec = ((Number(sec)||0)+86400)%86400;
    const h = Math.floor(sec/3600);
    const m = Math.floor((sec%3600)/60);
    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  },
  timeRange(range){
    return `${this.secondsToTime(range.start)} - ${this.secondsToTime(range.end)}`;
  },
  status(task){
    return window.ST1062_TaskEngine?.status?.(task) || task?.status || (task?.done ? "done" : "pending");
  },
  statusLabel(status){
    return window.ST1062_TaskEngine?.statusLabel?.(status)
      || (status==="done" ? "已完成" : status==="carry" ? "保留至下次" : "未完成");
  },
  statusIcon(status){
    return window.ST1062_TaskEngine?.statusIcon?.(status)
      || (status==="done" ? "✓" : status==="carry" ? "↷" : "○");
  },
  progress(ranges=this.ranges(), now=this.now()){
    if(window.ST1062_TaskEngine?.progress) return ST1062_TaskEngine.progress(ranges,now);
    if(!ranges.length) return 0;
    const start = ranges[0].start;
    const end = ranges[ranges.length-1].end;
    if(now<=start) return 0;
    if(now>=end) return 100;
    return Math.round((now-start)/(end-start)*100);
  },
  activeName(ranges=this.ranges(), now=this.now()){
    if(window.ST1062_TaskEngine?.activeName) return ST1062_TaskEngine.activeName(ranges,now);
    const active = ranges.find(r=>now>=r.start && now<r.end);
    if(active) return active.title;
    if(ranges.length && now>=ranges[ranges.length-1].end) return "本堂課已完成";
    return "尚未開始";
  },
  fill(range, now=this.now()){
    if(window.ST1062_TaskEngine?.fillPercent) return ST1062_TaskEngine.fillPercent(range,now);
    const total = Math.max(1,range.end-range.start);
    return Math.max(0,Math.min(100,Math.round((now-range.start)/total*100)));
  },
  overdueSeconds(range,task,now=this.now()){
    if(window.ST1062_TaskEngine?.overdueSeconds) return ST1062_TaskEngine.overdueSeconds(range,task,now);
    if(this.status(task)!=="pending") return 0;
    return Math.max(0,now-range.end);
  },
  overdueLevel(range,task,now=this.now()){
    if(window.ST1062_TaskEngine?.overdueLevel) return ST1062_TaskEngine.overdueLevel(range,task,now);
    const sec = this.overdueSeconds(range,task,now);
    if(sec>=180) return "hard";
    if(sec>0) return "soft";
    return "none";
  },
  summary(tasks=this.tasks()){
    if(window.ST1062_TaskEngine?.summary) return ST1062_TaskEngine.summary(tasks);
    const total = tasks.length;
    const done = tasks.filter(t=>this.status(t)==="done").length;
    const carry = tasks.filter(t=>this.status(t)==="carry").length;
    return {total,done,carry,rate:total?Math.round(done/total*100):0};
  },
  attr(task){
    if(typeof st120AttrById==="function"){
      const id = task?.magicAttr || (typeof st120InferAttr==="function" ? st120InferAttr(task) : "none");
      return st120AttrById(id);
    }
    return {id:"none",label:"一般任務",emoji:"✨",color:"#7fc8a9"};
  },
  context(){
    const tasks = this.tasks();
    const ranges = this.ranges(tasks,this.startTime());
    const now = this.now();
    const nextIdx = ranges.findIndex(r=>now<r.start);
    const activeOverdueIdx = window.ST1062_TaskEngine?.firstOverdueIndex?.(ranges,tasks,now) ?? -1;
    const total = ranges.reduce((s,r)=>s+(Number(r.minutes)||0),0);
    const progress = this.progress(ranges,now);
    const activeName = this.activeName(ranges,now);
    const summary = this.summary(tasks);
    return {tasks,ranges,now,nextIdx,activeOverdueIdx,total,progress,activeName,summary};
  },
  taskState(range,ctx=this.context()){
    const task = ctx.tasks[range.idx] || {};
    const status = this.status(task);
    const current = ctx.now>=range.start && ctx.now<range.end;
    const past = ctx.now>=range.end;
    const next = !current && !past && range.idx===ctx.nextIdx;
    const overdueSec = this.overdueSeconds(range,task,ctx.now);
    const overdueLevel = this.overdueLevel(range,task,ctx.now);
    const fill = current ? this.fill(range,ctx.now) : 0;
    return {task,status,current,past,next,overdueSec,overdueLevel,fill};
  },
  isTyping(){
    const el = document.activeElement;
    if(!el) return false;
    const tag = (el.tagName || "").toLowerCase();
    return document.body.classList.contains("start-class-mode") &&
      (tag==="textarea" || tag==="input" || tag==="select" || el.isContentEditable);
  }
};

const ST133_TaskSummary = {
  renderCompletion(summary){
    return `<div class="st106-completion">本堂完成率：${summary.done}/${summary.total}（${summary.rate}%）｜保留至下次：${summary.carry}</div>`;
  },
  ensureTempoStore(){
    if(!Array.isArray(state.classTempoNotes)) state.classTempoNotes = [];
  },
  sessionKey(){
    try{ return `${st106CourseKey()}__${classContext?.date || new Date().toISOString().slice(0,10)}`; }
    catch(e){ return `session__${new Date().toISOString().slice(0,10)}`; }
  },
  recordTempo(idx){
    try{
      this.ensureTempoStore();
      const ctx = ST130_TaskEngine.context();
      const range = ctx.ranges.find(r=>r.idx===idx);
      const task = ctx.tasks[idx];
      if(!range || !task) return;
      const lateSec = Math.max(0,ctx.now-range.end);
      if(lateSec>=60){
        state.classTempoNotes.push({
          id: typeof st106Id==="function" ? st106Id() : String(Date.now()),
          sessionKey:this.sessionKey(),
          date:classContext?.date || new Date().toISOString().slice(0,10),
          taskTitle:task.title || "未命名任務",
          plannedMin:Number(task.minutes || range.minutes || 0)||0,
          lateMin:Math.ceil(lateSec/60),
          createdAt:new Date().toISOString()
        });
        state.classTempoNotes = state.classTempoNotes.slice(-300);
      }
    }catch(e){ console.warn("ST133 recordTempo failed",e); }
  },
  suggestions(){
    this.ensureTempoStore();
    const key = this.sessionKey();
    const notes = state.classTempoNotes.filter(n=>n.sessionKey===key);
    const by = {};
    notes.forEach(n=>{
      const k = n.taskTitle || "未命名任務";
      if(!by[k]) by[k] = {taskTitle:k,plannedMin:n.plannedMin||0,maxLate:0};
      by[k].plannedMin = Math.max(by[k].plannedMin,Number(n.plannedMin||0));
      by[k].maxLate = Math.max(by[k].maxLate,Number(n.lateMin||0));
    });
    return Object.values(by).filter(x=>x.maxLate>0).sort((a,b)=>b.maxLate-a.maxLate).map(x=>{
      const add = Math.max(2,Math.ceil(x.maxLate/2)*2);
      const newMin = x.plannedMin + add;
      if(x.maxLate>=6) return `「${x.taskTitle}」嚴重超時約 ${x.maxLate} 分鐘，建議下次延長到 ${newMin} 分鐘，或拆成兩個小任務。`;
      return `「${x.taskTitle}」超時約 ${x.maxLate} 分鐘，建議下次增加 ${add} 分鐘。`;
    });
  },
  tempoBoxHtml(){
    const list = this.suggestions();
    if(!list.length) return "";
    return `<div class="st124-tempo-box"><b>⏱️ 教學節奏建議</b><br>${list.map(s=>`• ${st106Esc(s)}`).join("<br>")}</div>`;
  }
};

    const candidates = Array.from(document.querySelectorAll(".st106-start-left,.st106-left,.start-left,.st106-panel,section,div"));
    return candidates.find(el=>{
      const txt = (el.textContent || "").slice(0,500);
      return txt.includes("今日課堂") && txt.includes("本堂流程") && !txt.includes("學生名單");
    }) || null;
  },
  fullRefresh(){
    if(!document.body.classList.contains("start-class-mode")) return false;
    const box = this.findLeftContainer();
    if(!box) return false;
    const oldScroll = box.scrollTop;
    box.innerHTML = this.renderLeftFlow();
    box.scrollTop = oldScroll;
    ST132_TaskAnimation.ensureLayers();
    return true;
  }

const ST132_TaskAnimation = {
  ensureLayers(){
    document.querySelectorAll(".st106-task.current, .st106-task.st1252-task").forEach(card=>{
      card.classList.add("st1252-task");
      if(!card.querySelector(".st1252-fill-layer")){
        const fill = document.createElement("div");
        fill.className = "st1252-fill-layer";
        card.insertBefore(fill, card.firstChild);
      }
      if(!card.querySelector(".st1252-breath-layer")){
        const breath = document.createElement("div");
        breath.className = "st1252-breath-layer";
        const ref = card.querySelector(".st1252-fill-layer")?.nextSibling || card.firstChild;
        card.insertBefore(breath, ref);
      }
    });
  },
  liveUpdate(){
    if(!document.body.classList.contains("start-class-mode")) return false;
    const ctx = ST130_TaskEngine.context();
    const head = document.querySelector(".st106-progress-head");
    if(head){
      const spans = head.querySelectorAll("span");
      if(spans[0]) spans[0].textContent = `現在：${ctx.activeName}`;
      if(spans[1]) spans[1].textContent = `${ctx.progress}%`;
    }
    const fill = document.querySelector(".st106-progress-fill");
    if(fill) fill.style.width = `${ctx.progress}%`;
    const completion = document.querySelector(".st106-completion");
    if(completion){
      completion.textContent = `本堂完成率：${ctx.summary.done}/${ctx.summary.total}（${ctx.summary.rate}%）｜保留至下次：${ctx.summary.carry}`;
    }
    ctx.ranges.forEach(r=>{
      const card = document.querySelector(`[data-st130-task="${r.idx}"]`);
      if(!card) return;
      const s = ST130_TaskEngine.taskState(r,ctx);
      card.classList.toggle("current",s.current);
      card.classList.toggle("next",s.next);
      card.classList.toggle("past",s.past && s.status==="pending" && s.overdueLevel==="none");
      card.classList.toggle("done",s.status==="done");
      card.classList.toggle("carry",s.status==="carry");
      card.classList.toggle("overdue-soft",s.overdueLevel==="soft");
      card.classList.toggle("overdue-hard",s.overdueLevel==="hard");
      card.classList.toggle("active-overdue",r.idx===ctx.activeOverdueIdx);
      card.style.setProperty("--st106-task-fill",`${s.fill}%`);
      card.style.setProperty("--st1252-fill",`${s.fill}%`);
      const meta = card.querySelector(".st106-task-meta");
      if(meta) meta.textContent = `${ST130_TaskEngine.timeRange(r)}｜${ST130_TaskEngine.statusLabel(s.status)}`;
    });
    this.ensureLayers();
    return true;
  }
};

function st130SecondsToHHMM(totalSeconds){
  totalSeconds = ((Math.floor(totalSeconds)%86400)+86400)%86400;
  const h = Math.floor(totalSeconds/3600);
  const m = Math.floor((totalSeconds%3600)/60);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}
function st130JumpToNextPending(doneIdx){
  try{
    const tasks = ST130_TaskEngine.tasks();
    const nextIdx = tasks.findIndex((t,i)=>i>doneIdx && ST130_TaskEngine.status(t)==="pending");
    if(nextIdx<0) return;
    const minutesBefore = tasks.slice(0,nextIdx).reduce((s,t)=>s+(Number(t.minutes)||0),0);
    const newStart = st130SecondsToHHMM(ST130_TaskEngine.now() - minutesBefore*60);
    if(typeof st106SetStartTime==="function") st106SetStartTime(newStart);
  }catch(e){ console.warn("st130JumpToNextPending failed",e); }
}

/* ---------- ST134：真實課堂時間軸 ---------- */
const ST134_RealClassTimeline = {
  ensure(){
    if(typeof state.todayTimelineShiftMin !== "number") state.todayTimelineShiftMin = 0;
  },
  shift(min){
    this.ensure();
    state.todayTimelineShiftMin += Number(min)||0;
    try{ saveState?.(); }catch(e){}
    try{ st116RefreshFlowOnly?.(); }catch(e){}
  },
  reset(){
    state.todayTimelineShiftMin = 0;
    try{ saveState?.(); }catch(e){}
    try{ st116RefreshFlowOnly?.(); }catch(e){}
  },
  setNowAsStart(){
    this.ensure();
    const originalSec = ST130_TaskEngine.timeToSeconds(ST130_TaskEngine.rawStartTime ? ST130_TaskEngine.rawStartTime() : (typeof st106StartTime==="function" ? st106StartTime() : "10:30"));
    const nowSec = ST130_TaskEngine.now();
    state.todayTimelineShiftMin = Math.round((nowSec - originalSec) / 60);
    try{ saveState?.(); }catch(e){}
    try{ st116RefreshFlowOnly?.(); }catch(e){}
  },
  shiftedStartTime(){
    this.ensure();
    const raw = ST130_TaskEngine.rawStartTime ? ST130_TaskEngine.rawStartTime() : (typeof st106StartTime==="function" ? st106StartTime() : "10:30");
    const sec = ST130_TaskEngine.timeToSeconds(raw);
    return ST130_TaskEngine.secondsToTime(sec + state.todayTimelineShiftMin * 60);
  },
  label(){
    this.ensure();
    const m = state.todayTimelineShiftMin || 0;
    if(m === 0) return "準時開始";
    return m > 0 ? `延後 ${m} 分鐘` : `提前 ${Math.abs(m)} 分鐘`;
  },
  html(){
    return `
      <div class="st132-timeline-box">
        <div class="st132-timeline-title">
          <span>⏱️ 真實課堂時間軸</span>
          <span>${st106Esc(this.label())}</span>
        </div>
        <div class="st132-timeline-buttons">
          <button class="st132-timeline-btn" onclick="ST134_RealClassTimeline.shift(-5)">提前 5 分</button>
          <button class="st132-timeline-btn" onclick="ST134_RealClassTimeline.shift(5)">延後 5 分</button>
          <button class="st132-timeline-btn" onclick="ST134_RealClassTimeline.shift(10)">延後 10 分</button>
          <button class="st132-timeline-btn primary" onclick="ST134_RealClassTimeline.setNowAsStart()">現在才正式開始</button>
          <button class="st132-timeline-btn" onclick="ST134_RealClassTimeline.reset()">重設</button>
        </div>
      </div>
    `;
  }
};

/* =========================================================
   V13.3 TASK CARD CLASS STANDARDIZATION
   目的：
   - 任務卡主要 class 統一為 task-card
   - JS 只負責 classList.toggle("current"/"next"/...)
   - CSS 動畫層優先使用 .task-card.current
   ========================================================= */

const ST135_TaskCardClass = {
  classList(state){
    return [
      "st106-task",
      "st1252-task",
      "task-card",
      state.current ? "current" : "",
      state.next ? "next" : "",
      state.past && state.status==="pending" && state.overdueLevel==="none" ? "past" : "",
      state.status==="done" ? "done" : "",
      state.status==="carry" ? "carry" : "",
      state.overdueLevel==="soft" ? "overdue-soft" : "",
      state.overdueLevel==="hard" ? "overdue-hard" : "",
      state.activeOverdue ? "active-overdue" : ""
    ].filter(Boolean).join(" ");
  },
  ensureLayers(card){
    if(!card) return;
    card.classList.add("task-card","st1252-task");

    if(!card.querySelector(".task-fill-layer") && !card.querySelector(".st1252-fill-layer")){
      const fill = document.createElement("div");
      fill.className = "task-fill-layer";
      card.insertBefore(fill, card.firstChild);
    }

    if(!card.querySelector(".task-breath-layer") && !card.querySelector(".st1252-breath-layer")){
      const breath = document.createElement("div");
      breath.className = "task-breath-layer";
      const ref = card.querySelector(".task-fill-layer")?.nextSibling || card.firstChild;
      card.insertBefore(breath, ref);
    }
  },
  sync(card,state){
    if(!card) return;

    card.classList.add("task-card","st1252-task");

    card.classList.toggle("current",!!state.current);
    card.classList.toggle("next",!!state.next);
    card.classList.toggle("past",!!(state.past && state.status==="pending" && state.overdueLevel==="none"));
    card.classList.toggle("done",state.status==="done");
    card.classList.toggle("carry",state.status==="carry");
    card.classList.toggle("overdue-soft",state.overdueLevel==="soft");
    card.classList.toggle("overdue-hard",state.overdueLevel==="hard");
    card.classList.toggle("active-overdue",!!state.activeOverdue);

    const fill = Number(state.fill || 0);
    card.style.setProperty("--task-fill",`${fill}%`);
    card.style.setProperty("--st106-task-fill",`${fill}%`);
    card.style.setProperty("--st1252-fill",`${fill}%`);

    this.ensureLayers(card);
  }
};

      next:s.next,
      past:s.past,
      status:s.status,
      overdueLevel:s.overdueLevel,
      activeOverdue:range.idx===ctx.activeOverdueIdx
    });

    const badges = [
      `<span class="st106-badge">${Number(s.task.minutes || range.minutes || 0)} 分鐘</span>`,
      s.current ? `<span class="st106-badge now">現在</span>` : "",
      s.next ? `<span class="st106-badge next">下一個</span>` : "",
      s.status==="carry" ? `<span class="st106-badge carry">保留</span>` : "",
      attr.id && attr.id!=="none" ? `<span class="st120-task-attr" style="background:${attr.color}">${attr.emoji} ${attr.label}</span>` : "",
      s.overdueLevel!=="none" ? `<span class="st106-badge overdue-${s.overdueLevel}">${Math.floor(s.overdueSec/60)>0 ? `超時 ${Math.floor(s.overdueSec/60)} 分` : "超時中"}</span>` : ""
    ].join("");

      : (s.overdueLevel==="hard"

        : "");

    return `
      <div class="${cls}" data-st130-task="${range.idx}" data-task-card="${range.idx}" style="--task-fill:${s.fill}%;--st106-task-fill:${s.fill}%;--st1252-fill:${s.fill}%">

/* =========================================================
   V13.4 ST141 INPUT PROTECTION
   目的：
   1. textarea 內容即時快取
   2. renderStartClassMode 若被迫觸發，還原焦點與游標
   3. ST140 排笛快捷評語不再強制整頁 render
   4. 快捷評語直接寫入該學生備註欄與快取
   ========================================================= */

const ST141_InputProtection = {
  cache: window.__ST141_TEXTAREA_CACHE__ || {},
  lastFocus:null,

  init(){
    window.__ST141_TEXTAREA_CACHE__ = this.cache;

    document.addEventListener("input",(e)=>{
      const el = e.target;
      if(!this.isRemarkTextarea(el)) return;
      this.cache[this.studentIdFromTextarea(el)] = el.value;
    },true);

    document.addEventListener("focusin",(e)=>{
      const el = e.target;
      if(!this.isRemarkTextarea(el)) return;
      this.saveFocus(el);
      el.classList.add("st141-focus-guard");
    },true);

    document.addEventListener("focusout",(e)=>{
      const el = e.target;
      if(this.isRemarkTextarea(el)){
        el.classList.remove("st141-focus-guard");
      }
    },true);
  },

  isRemarkTextarea(el){
    return !!el && el.tagName === "TEXTAREA" && /^st106Remark_/.test(el.id || "");
  },

  studentIdFromTextarea(el){
    return String(el.id || "").replace(/^st106Remark_/,"");
  },

  saveFocus(el=document.activeElement){
    if(!this.isRemarkTextarea(el)) return null;
    this.lastFocus = {
      id:el.id,
      studentId:this.studentIdFromTextarea(el),
      start:typeof el.selectionStart==="number" ? el.selectionStart : null,
      end:typeof el.selectionEnd==="number" ? el.selectionEnd : null,
      value:el.value
    };
    this.cache[this.lastFocus.studentId] = el.value;
    return this.lastFocus;
  },

  restoreFocus(snapshot=this.lastFocus){
    if(!snapshot || !snapshot.id) return;
    setTimeout(()=>{
      const el = document.getElementById(snapshot.id);
      if(!el) return;
      const saved = this.cache[snapshot.studentId];
      if(typeof saved === "string") el.value = saved;
      el.focus();
      if(typeof snapshot.start === "number" && typeof snapshot.end === "number"){
        const len = el.value.length;
        el.setSelectionRange(Math.min(snapshot.start,len), Math.min(snapshot.end,len));
      }
    },0);
  },

  get(studentId,fallback=""){
    const v = this.cache[studentId];
    return typeof v === "string" ? v : fallback;
  },

  set(studentId,value){
    this.cache[studentId] = value || "";
    const el = document.getElementById(`st106Remark_${studentId}`);
    if(el) el.value = this.cache[studentId];
  },

  append(studentId,text){
    const current = this.get(studentId,"").trim();
    const next = current ? `${current}\n${text}` : text;
    this.set(studentId,next);
  },

  injectTextareaBinding(html){
    return String(html).replace(
      /<textarea([^>]*?)id="st106Remark_([^"]+)"([^>]*)>([\s\S]*?)<\/textarea>/g,
      (match,a,id,b,inner)=>{
        const saved = this.get(id, String(inner || "").trim());
        const attrs = `${a} id="st106Remark_${id}" ${b}`;
        const cleanAttrs = attrs.replace(/\s+oninput="[^"]*"/g,"");
        return `<textarea${cleanAttrs} oninput="ST141_InputProtection.cache['${id}']=this.value">${st106Esc(saved)}</textarea>`;
      }
    );
  }
};

        start: typeof el.selectionStart === "number" ? el.selectionStart : null,
        end: typeof el.selectionEnd === "number" ? el.selectionEnd : null
      };
    },

    restoreFocus(snapshot){
      if(!snapshot || !snapshot.id) return;
      setTimeout(()=>{
        const el = document.getElementById(snapshot.id);
        if(!el) return;
        if(typeof this.cache[snapshot.id] === "string") el.value = this.cache[snapshot.id];
        el.focus();
        el.classList.add("st136-left-focus-guard");
        if(typeof snapshot.start === "number" && typeof snapshot.end === "number"){
          const len = el.value.length;
          el.setSelectionRange(Math.min(snapshot.start,len), Math.min(snapshot.end,len));
        }
      },0);
    },

    bindDom(){
      document.addEventListener("input",(e)=>{
        if(!this.isLeftTextarea(e.target)) return;
        this.cache[e.target.id] = e.target.value;
      },true);

      document.addEventListener("focusin",(e)=>{
        if(!this.isLeftTextarea(e.target)) return;
        this.cache[e.target.id] = e.target.value;
        e.target.classList.add("st136-left-focus-guard");
      },true);

      document.addEventListener("focusout",(e)=>{
        if(!this.isLeftTextarea(e.target)) return;
        e.target.classList.remove("st136-left-focus-guard");
      },true);
    },

    injectIntoHtml(html){
      return String(html).replace(
        /<textarea([^>]*?)id="(startClassMemo|startClassHomework|st106_class_remark|st106_homework)"([^>]*)>([\s\S]*?)<\/textarea>/g,
        (match,a,id,b,inner)=>{
          const saved = typeof this.cache[id] === "string" ? this.cache[id] : String(inner || "").trim();
          const attrs = `${a} id="${id}" ${b}`.replace(/\s+oninput="[^"]*"/g,"");
          return `<textarea${attrs} oninput="window.__ST136_TEXTAREA_CACHE__['${id}']=this.value;window.__ST141_TEXTAREA_CACHE__['${id}']=this.value">${st106Esc(saved)}</textarea>`;
        }
      );
    },

    isTypingLeft(){
      return this.isLeftTextarea(document.activeElement);
    }
  };

  window.ST136_LeftInputGuard = ST136_LeftInputGuard;
  ST136_LeftInputGuard.bindDom();

  /* 攔截 st106Notes：讓課堂備註 / 回家功課 HTML 自帶快取 */
  if(typeof st106Notes === "function" && !window.__ST136_LEFT_NOTES_INSTALLED__){
    window.__ST136_LEFT_NOTES_INSTALLED__ = true;
    const oldNotes = st106Notes;
    st106Notes = function(){
      return ST136_LeftInputGuard.injectIntoHtml(oldNotes.apply(this,arguments));
    };
  }

  /* 攔截 ST131 左側整體 render：若包含 notes，也注入快取 */
  if(window.ST131_TaskRenderer && !window.__ST136_LEFT_RENDER_INSTALLED__){
    window.__ST136_LEFT_RENDER_INSTALLED__ = true;
    const oldRenderLeft = ST131_TaskRenderer.renderLeftFlow.bind(ST131_TaskRenderer);
    ST131_TaskRenderer.renderLeftFlow = function(){
      return ST136_LeftInputGuard.injectIntoHtml(oldRenderLeft());
    };
  }

  /* 左側打字時：絕不 fullRefresh，只 liveUpdate 任務狀態 */
  if(typeof st116RefreshFlowOnly === "function" && !window.__ST136_LEFT_REFRESH_GUARD__){
    window.__ST136_LEFT_REFRESH_GUARD__ = true;
    const oldRefresh = st116RefreshFlowOnly;
    st116RefreshFlowOnly = function(){
      if(ST136_LeftInputGuard.isTypingLeft()){
        ST136_LeftInputGuard.saveVisible();
        if(window.ST132_TaskAnimation?.liveUpdate){
          ST132_TaskAnimation.liveUpdate();
        }
        return true;
      }
      return oldRefresh.apply(this,arguments);
    };
  }

  /* 若全頁 render 不可避免，還原左側焦點 */
  if(typeof renderStartClassMode === "function" && !window.__ST136_LEFT_RENDERSTART_GUARD__){
    window.__ST136_LEFT_RENDERSTART_GUARD__ = true;
    const oldRenderStart = renderStartClassMode;
    renderStartClassMode = function(){
      const snapshot = ST136_LeftInputGuard.saveFocus();
      ST136_LeftInputGuard.saveVisible();
      const result = oldRenderStart.apply(this,arguments);
      ST136_LeftInputGuard.restoreVisible();
      if(snapshot) ST136_LeftInputGuard.restoreFocus(snapshot);
      return result;
    };
  }

  /* 保險：每次 liveUpdate 後確保 current 卡不被 overflow hidden 鎖住 */
  const unlockGlow = ()=>{
    document.querySelectorAll(".task-card.current,[data-st130-task].current,[data-st124-task].current,.st106-task.current").forEach(card=>{
      card.style.overflow = "visible";
      card.style.zIndex = "3";
    });
  };

  const oldLive = window.ST132_TaskAnimation?.liveUpdate?.bind(window.ST132_TaskAnimation);
  if(oldLive && !window.__ST136_GLOW_LIVE_INSTALLED__){
    window.__ST136_GLOW_LIVE_INSTALLED__ = true;
    ST132_TaskAnimation.liveUpdate = function(){
      const r = oldLive.apply(this,arguments);
      unlockGlow();
      return r;
    };
  }

  setInterval(()=>{
    if(document.body.classList.contains("start-class-mode")){
      unlockGlow();
    }
  },1000);

  console.log("ST136 Left Inputs + Premium Glow Fix installed.");
})();
