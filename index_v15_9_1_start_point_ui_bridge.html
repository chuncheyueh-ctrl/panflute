/* =========================================================
   V14.6 ST181 CORE SYNC FIX
   目的：
   - ST181 局部 DOM 更新後，確保 state 會落地保存
   - 不呼叫右側全區 renderStartClassMode
   - 若有 Firebase / cloud sync 函式，延後非同步推送
   - 避免 st116RefreshFlowOnly 過度干擾左側 timer，只在必要時輕量呼叫
   ========================================================= */
(function(){
  console.log("ST181 CoreSyncFix v14.6 loading...");

  const ST181_CoreSyncFix = {
    version:"14.6",
    syncTimer:null,
    saveTimer:null,

    markChanged(reason){
      try{
        if(window.ST160_StateGuard?.markDirty){
          ST160_StateGuard.markDirty(reason);
        }else if(window.state){
          state.__dirtyMeta = state.__dirtyMeta || {};
          state.__dirtyMeta.dirty = true;
          state.__dirtyMeta.lastReason = reason;
          state.__dirtyMeta.updatedAt = new Date().toISOString();
        }
      }catch(e){
        console.warn("ST181 markChanged failed",e);
      }
    },

    save(reason="local-update"){
      this.markChanged(reason);

      clearTimeout(this.saveTimer);
      this.saveTimer = setTimeout(()=>{
        try{
          if(window.ST150_SaveCore?.snapshot){
            ST150_SaveCore.snapshot(`st181-${reason}`, true);
          }
        }catch(e){
          console.warn("ST181 SaveCore snapshot failed",e);
        }

        try{
          if(typeof saveState === "function"){
            saveState();
          }
        }catch(e){
          console.warn("ST181 saveState failed",e);
        }
      },120);
    },

    cloudSync(reason="local-update"){
      clearTimeout(this.syncTimer);
      this.syncTimer = setTimeout(()=>{
        try{
          if(typeof firebaseUploadAll === "function"){
            console.log("ST181: firebaseUploadAll async sync",reason);
            firebaseUploadAll();
          }else if(typeof syncToCloud === "function"){
            console.log("ST181: syncToCloud async sync",reason);
            syncToCloud();
          }else if(window.ST150_SaveCore?.snapshot){
            /* 沒有雲端函式時至少保留本機 snapshot */
            ST150_SaveCore.snapshot(`st181-cloud-fallback-${reason}`, true);
          }
        }catch(e){
          console.warn("ST181 cloud sync failed",e);
        }
      },350);
    },

    afterLocalMutation(studentId,reason){
      try{
        if(window.ST181_ViewRefinement?.updateCard){
          ST181_ViewRefinement.updateCard(studentId);
        }else if(window.ST180_StaticViewKernel?.updateStudentCard){
          ST180_StaticViewKernel.updateStudentCard(studentId);
        }
      }catch(e){
        console.warn("ST181 card update failed",e);
      }

      this.save(reason);
      this.cloudSync(reason);

      /*
        左側流程只做 liveUpdate，不做 full render。
        避免干擾倒數與左側 textarea。
      */
      try{
        if(window.ST132_TaskAnimation?.liveUpdate){
          ST132_TaskAnimation.liveUpdate();
        }
      }catch(e){}
    },

    wrapPanflute(){
      if(typeof ST140_PanfluteFeedback === "undefined" || window.__ST181_V146_ST140__) return;
      window.__ST181_V146_ST140__ = true;

      const oldApply = ST140_PanfluteFeedback.apply?.bind(ST140_PanfluteFeedback);
      const oldApplyFeedback = ST140_PanfluteFeedback.applyFeedback?.bind(ST140_PanfluteFeedback);

      const safeApply = function(studentId,indexOrType){
        const oldRender = window.renderStartClassMode;
        if(typeof oldRender === "function"){
          window.renderStartClassMode = function(){
            console.log("ST181 v14.6: blocked global render during panflute sync.");
            return true;
          };
        }

        try{
          let result = false;

          /*
            優先走 ST181 的 commit + local update。
            若 ST181 不存在，才降級呼叫舊 apply。
          */
          if(window.ST181_ViewRefinement?.commitPanflute){
            result = ST181_ViewRefinement.commitPanflute(studentId,indexOrType);
            ST181_ViewRefinement.updateCard(studentId);
          }else if(oldApply){
            result = oldApply(studentId,indexOrType);
          }else if(oldApplyFeedback){
            result = oldApplyFeedback(studentId,indexOrType);
          }

          ST181_CoreSyncFix.afterLocalMutation(studentId,`panflute:${indexOrType}`);
          return result;
        }finally{
          if(typeof oldRender === "function"){
            setTimeout(()=>{ window.renderStartClassMode = oldRender; },50);
          }
        }
      };

      ST140_PanfluteFeedback.apply = safeApply;
      ST140_PanfluteFeedback.applyFeedback = safeApply;
    },

    wrapStudentActions(){
      if(!window.ST1062_StudentActions || window.__ST181_V146_ACTIONS__) return;
      window.__ST181_V146_ACTIONS__ = true;

      ["addXp","addPoints"].forEach(fn=>{
        if(typeof ST1062_StudentActions[fn] !== "function") return;
        const oldFn = ST1062_StudentActions[fn].bind(ST1062_StudentActions);

        ST1062_StudentActions[fn] = function(studentId){
          const oldRender = window.renderStartClassMode;
          if(typeof oldRender === "function"){
            window.renderStartClassMode = function(){ return true; };
          }

          try{
            const result = oldFn.apply(this,arguments);
            ST181_CoreSyncFix.afterLocalMutation(studentId,fn);
            return result;
          }finally{
            if(typeof oldRender === "function"){
              setTimeout(()=>{ window.renderStartClassMode = oldRender; },50);
            }
          }
        };
      });
    },

    install(){
      this.wrapPanflute();
      this.wrapStudentActions();
      console.log("ST181 CoreSyncFix v14.6 installed.");
    }
  };

  window.ST181_CoreSyncFix = ST181_CoreSyncFix;
  ST181_CoreSyncFix.install();
})();



/* =========================================================
   V15.0 CLEAN CORE RUNTIME
   核心規則：
   1. DataKernel：只改 state，不碰 DOM
   2. ViewRenderer：只改 DOM，不碰 state
   3. ActionLayer：只協調 patch → view → save
   4. BackgroundServices：只排程 save / snapshot / cloud sync
   ========================================================= */
(function(){
  console.log("V15 Clean Core Runtime loading...");

  const ST190_CleanCore = {
    version:"15.0",

    /* -----------------------------
       Layer 1：Data Kernel
       ----------------------------- */
    DataKernel:{
      undoStack:[],
      maxUndo:30,

      raw(){
        if(window.__RAW_STATE__ && typeof window.__RAW_STATE__ === "object") return window.__RAW_STATE__;
        if(window.state && typeof window.state === "object") return window.state;
        window.state = {};
        return window.state;
      },

      publish(nextState, reason="publish"){
        nextState.__schemaVersion = nextState.__schemaVersion || "15.0";
        nextState.__lastCleanCoreVersion = "15.0";
        nextState.__lastCleanCoreAt = new Date().toISOString();

        window.__RAW_STATE__ = nextState;
        window.state = nextState;

        if(window.ST160_StateGuard?.markDirty){
          try{ ST160_StateGuard.markDirty(`ST190.${reason}`); }catch(e){}
        }else{
          state.__dirtyMeta = state.__dirtyMeta || {};
          state.__dirtyMeta.dirty = true;
          state.__dirtyMeta.lastReason = `ST190.${reason}`;
          state.__dirtyMeta.updatedAt = new Date().toISOString();
        }
      },

      students(){
        const raw = this.raw();
        return Array.isArray(raw.students) ? raw.students : [];
      },

      findStudent(studentId){
        return this.students().find(s=>String(s?.id) === String(studentId));
      },

      studentPatch(studentId, actionName, updater){
        const raw = this.raw();
        const students = Array.isArray(raw.students) ? raw.students : [];
        const idx = students.findIndex(s=>String(s?.id) === String(studentId));
        if(idx < 0){
          console.warn("ST190 DataKernel: student not found", studentId);
          return false;
        }

        const before = students[idx] || {};
        const draft = {...before};

        try{
          updater(draft);
          if(draft.xp !== undefined) draft.xp = Number(draft.xp || 0);
          if(draft.points !== undefined) draft.points = Number(draft.points || 0);

          const delta = {
            action:actionName,
            studentId:String(studentId),
            createdAt:new Date().toISOString(),
            from:{
              xp:Number(before.xp || 0),
              points:Number(before.points || 0),
              note:String(before.note || before.remark || "")
            },
            to:{
              xp:Number(draft.xp || 0),
              points:Number(draft.points || 0),
              note:String(draft.note || draft.remark || "")
            }
          };

          const changed = delta.from.xp !== delta.to.xp ||
            delta.from.points !== delta.to.points ||
            delta.from.note !== delta.to.note;

          if(!changed) return false;

          const nextState = {...raw};
          nextState.students = [...students];
          nextState.students[idx] = draft;

          this.undoStack.push(delta);
          while(this.undoStack.length > this.maxUndo) this.undoStack.shift();

          this.publish(nextState, actionName);
          return {student:draft,delta};
        }catch(e){
          console.warn("ST190 DataKernel patch failed",e);
          return false;
        }
      },

      undo(){
        const delta = this.undoStack.pop();
        if(!delta){
          alert("目前沒有可復原的操作");
          return false;
        }

        const raw = this.raw();
        const students = Array.isArray(raw.students) ? raw.students : [];
        const idx = students.findIndex(s=>String(s?.id) === String(delta.studentId));
        if(idx < 0) return false;

        const current = students[idx] || {};
        const reverted = {
          ...current,
          xp:delta.from.xp,
          points:delta.from.points,
          note:delta.from.note
        };

        const nextState = {...raw};
        nextState.students = [...students];
        nextState.students[idx] = reverted;

        this.publish(nextState, `undo:${delta.action}`);
        return {student:reverted,delta};
      }
    },

    /* -----------------------------
       Layer 2：View Renderer
       ----------------------------- */
    ViewRenderer:{
      findTextarea(studentId){
        const selectors = [
          `#st106Remark_${studentId}`,
          `textarea[data-student-id="${studentId}"]`,
          `#note-${studentId}`,
          `textarea[id*="${studentId}"]`
        ];
        for(const sel of selectors){
          const el = document.querySelector(sel);
          if(el) return el;
        }
        return null;
      },

      findCard(studentId){
        const selectors = [
          `[data-student-id="${studentId}"]`,
          `[data-id="${studentId}"]`,
          `#student-${studentId}`,
          `.student-card[data-id="${studentId}"]`,
          `.start931-student-card[data-id="${studentId}"]`,
          `.st106-card[data-id="${studentId}"]`,
          `.st111-card[data-id="${studentId}"]`
        ];

        for(const sel of selectors){
          const el = document.querySelector(sel);
          if(el){
            return el.closest?.(".student-card,.start931-student-card,.st106-card,.st111-card,[data-student-id],[data-id],section,li,article") || el;
          }
        }

        const textarea = this.findTextarea(studentId);
        if(textarea){
          return textarea.closest(".student-card,.start931-student-card,.st106-card,.st111-card,[data-student-id],[data-id],section,li,article") || textarea.parentElement;
        }

        return null;
      },

      updateStudent(studentId, student){
        const st = student || ST190_CleanCore.DataKernel.findStudent(studentId);
        if(!st) return false;

        const card = this.findCard(studentId);
        if(!card) return false;

        const xp = Number(st.xp || 0);
        const points = Number(st.points || 0);
        const note = String(st.note || st.remark || "");

        card.querySelectorAll(".st111-xp-value,.student-xp,.xp-text,[data-field='xp']").forEach(el=>{
          el.textContent = String(xp);
        });
        card.querySelectorAll(".st111-points-value,.student-points,.points-text,[data-field='points']").forEach(el=>{
          el.textContent = String(points);
        });

        let badge = card.querySelector(".st111-xp-badge,.xp-badge,.st106-points-display");
        if(!badge){
          badge = Array.from(card.querySelectorAll("span,div,p")).find(el=>{
            const t = el.textContent || "";
            return (t.includes("XP") || t.includes("🎁") || t.includes("點數")) && t.length < 100;
          });
        }
        if(badge){
          badge.textContent = `🎁 禮物點數: ${points} | XP: ${xp}`;
        }

        const textarea = this.findTextarea(studentId) || card.querySelector("textarea");
        if(textarea && textarea.tagName === "TEXTAREA"){
          const active = document.activeElement === textarea;
          const start = textarea.selectionStart;
          const end = textarea.selectionEnd;
          textarea.value = note;

          if(active){
            textarea.focus();
            try{
              textarea.setSelectionRange(
                Math.min(start ?? note.length,note.length),
                Math.min(end ?? note.length,note.length)
              );
            }catch(e){}
          }

          try{ textarea.dispatchEvent(new Event("input",{bubbles:true})); }catch(e){}
        }

        if(window.__ST136_TEXTAREA_CACHE__) window.__ST136_TEXTAREA_CACHE__[studentId] = note;
        if(window.__ST141_TEXTAREA_CACHE__) window.__ST141_TEXTAREA_CACHE__[studentId] = note;

        return true;
      },

      updateFlowOnly(){
        try{
          if(window.ST132_TaskAnimation?.liveUpdate){
            return ST132_TaskAnimation.liveUpdate();
          }
        }catch(e){}
        return true;
      }
    },

    /* -----------------------------
       Layer 3：Action Layer
       ----------------------------- */
    ActionLayer:{
      feedbackItem(indexOrType){
        if(typeof ST140_PanfluteFeedback === "undefined") return null;
        if(Array.isArray(ST140_PanfluteFeedback.presets)){
          const item = ST140_PanfluteFeedback.presets[indexOrType];
          if(item) return item;
        }
        if(ST140_PanfluteFeedback.pool){
          return ST140_PanfluteFeedback.pool[indexOrType] || null;
        }
        return null;
      },

      runStudentMutation(studentId, actionName, updater){
        return ST190_CleanCore.BackgroundServices.suppressGlobalRender(()=>{
          const result = ST190_CleanCore.DataKernel.studentPatch(studentId,actionName,updater);
          if(result && result.student){
            ST190_CleanCore.ViewRenderer.updateStudent(studentId,result.student);
            ST190_CleanCore.ViewRenderer.updateFlowOnly();
            ST190_CleanCore.BackgroundServices.queueSave(actionName);
            ST190_CleanCore.BackgroundServices.queueCloud(actionName);
          }
          return result;
        });
      },

      addXp(studentId,typeId,xp,text){
        return this.runStudentMutation(studentId,`addXp:${typeId}`,draft=>{
          draft.xp = Number(draft.xp || 0) + Number(xp || 0);
          if(text){
            const note = String(draft.note || draft.remark || "");
            draft.note = note ? `${note} ｜ ${text}` : text;
          }
        });
      },

      addPoints(studentId,points,reason){
        return this.runStudentMutation(studentId,`addPoints:${reason || ""}`,draft=>{
          draft.points = Number(draft.points || 0) + Number(points || 0);
        });
      },

      panflute(studentId,indexOrType){
        const item = this.feedbackItem(indexOrType);
        if(!item) return false;

        return this.runStudentMutation(studentId,`panflute:${indexOrType}`,draft=>{
          const xp = Number(item.xp || 0);
          const points = Number(item.points || 0);
          const kind = item.kind || (xp > 0 ? "praise" : "correction");

          if(kind === "praise" && xp > 0){
            draft.xp = Number(draft.xp || 0) + xp;
          }
          if(points){
            draft.points = Number(draft.points || 0) + points;
          }

          if(item.text){
            const note = String(draft.note || draft.remark || "");
            draft.note = note ? `${note} ｜ ${item.text}` : item.text;
          }
        });
      },

      undo(){
        const result = ST190_CleanCore.DataKernel.undo();
        if(result && result.student){
          ST190_CleanCore.ViewRenderer.updateStudent(result.delta.studentId,result.student);
          ST190_CleanCore.BackgroundServices.queueSave("undo");
          ST190_CleanCore.BackgroundServices.queueCloud("undo");
          alert(`已復原：${result.delta.action}`);
          return true;
        }
        return false;
      }
    },

    /* -----------------------------
       Layer 4：Background Services
       ----------------------------- */
    BackgroundServices:{
      saveTimer:null,
      cloudTimer:null,

      suppressGlobalRender(fn){
        const oldRender = window.renderStartClassMode;
        if(typeof oldRender === "function"){
          window.renderStartClassMode = function(){
            console.log("ST190: blocked global render during clean-core local action.");
            return true;
          };
        }

        try{
          return fn();
        }finally{
          if(typeof oldRender === "function"){
            setTimeout(()=>{ window.renderStartClassMode = oldRender; },50);
          }
        }
      },

      queueSave(reason="clean-core"){
        clearTimeout(this.saveTimer);
        this.saveTimer = setTimeout(()=>{
          try{
            if(window.ST150_SaveCore?.snapshot){
              ST150_SaveCore.snapshot(`st190-${reason}`, true);
            }
          }catch(e){ console.warn("ST190 snapshot failed",e); }

          try{
            if(window.ST160_StateGuard?.requestSave){
              ST160_StateGuard.requestSave(`st190-${reason}`);
            }else if(typeof saveState === "function"){
              saveState();
            }
          }catch(e){ console.warn("ST190 save failed",e); }
        },150);
      },

      queueCloud(reason="clean-core"){
        clearTimeout(this.cloudTimer);
        this.cloudTimer = setTimeout(()=>{
          try{
            if(typeof firebaseUploadAll === "function"){
              firebaseUploadAll();
            }else if(typeof syncToCloud === "function"){
              syncToCloud();
            }
          }catch(e){
            console.warn("ST190 cloud sync failed",e);
          }
        },500);
      }
    },

    patchLegacyEntrypoints(){
      if(typeof ST140_PanfluteFeedback !== "undefined"){
        ST140_PanfluteFeedback.apply = function(studentId,indexOrType){
          return ST190_CleanCore.ActionLayer.panflute(studentId,indexOrType);
        };
        ST140_PanfluteFeedback.applyFeedback = function(studentId,indexOrType){
          return ST190_CleanCore.ActionLayer.panflute(studentId,indexOrType);
        };
      }

      if(window.ST1062_StudentActions){
        ST1062_StudentActions.addXp = function(studentId,typeId,xp,text){
          return ST190_CleanCore.ActionLayer.addXp(studentId,typeId,xp,text);
        };
        ST1062_StudentActions.addPoints = function(studentId,points,reason){
          return ST190_CleanCore.ActionLayer.addPoints(studentId,points,reason);
        };
      }
    },

    panelHtml(){
      return `
        <div class="st190-clean-core-panel">
          🧠 Clean Core Runtime：Data / View / Action / Background 已分層
          <div class="st190-clean-core-actions">
            <button class="st190-btn primary" onclick="ST190_CleanCore.ActionLayer.undo()">Clean Undo</button>
            <button class="st190-btn" onclick="console.log(ST190_CleanCore.DataKernel.undoStack); alert('Clean Core undo stack 已輸出到 console')">查看 Undo</button>
          </div>
        </div>
      `;
    },

    injectPanel(){
      if(!window.ST131_TaskRenderer || window.__ST190_PANEL__) return;
      window.__ST190_PANEL__ = true;
      const oldRenderLeft = ST131_TaskRenderer.renderLeftFlow.bind(ST131_TaskRenderer);
      ST131_TaskRenderer.renderLeftFlow = function(){
        const html = oldRenderLeft();
        if(html.includes("st190-clean-core-panel")) return html;
        if(html.includes("st180-viewkernel-panel")){
          return html.replace(/(<div class="st180-viewkernel-panel"[\s\S]*?<\/div>)/, `$1${ST190_CleanCore.panelHtml()}`);
        }
        return html.replace("<h2>📅 今日課堂</h2>", `<h2>📅 今日課堂</h2>${ST190_CleanCore.panelHtml()}`);
      };
    },

    install(){
      window.__RAW_STATE__ = this.DataKernel.raw();
      this.patchLegacyEntrypoints();
      this.injectPanel();
      console.log("V15 Clean Core Runtime installed.");
    }
  };

  window.ST190_CleanCore = ST190_CleanCore;
  ST190_CleanCore.install();
})();

</script>


<script id="v15-3-point-sync-fix">
/* =========================================================
   V15.3 POINT SYNC FIX
   目標：
   1. 開始上課的禮物點數 +1/+3/+5/+10，統一寫入 state.points
   2. 同步保留 state.pointLogs 紀錄
   3. 上課介面與開始上課讀取一致
   4. 提供點數探針 v153PointProbe()
   ========================================================= */
(function(){
  function nowText(){
    try{
      if(typeof localIsoLikeString === "function") return localIsoLikeString();
    }catch(e){}
    return new Date().toISOString();
  }

  function uid(){
    try{
      if(typeof makeId === "function") return makeId();
    }catch(e){}
    try{
      if(typeof st106Id === "function") return st106Id();
    }catch(e){}
    return "pt_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,8);
  }

  function getStudent(studentId){
    return (window.state?.students || []).find(s => s.id === studentId) || null;
  }

  function normalize(){
    if(!window.state || typeof window.state !== "object") return false;
    if(!state.points || typeof state.points !== "object" || Array.isArray(state.points)) state.points = {};
    if(!Array.isArray(state.pointLogs)) state.pointLogs = [];
    return true;
  }

  function getLogTotal(studentId){
    if(!normalize()) return 0;
    return (state.pointLogs || [])
      .filter(l => l && l.studentId === studentId)
      .reduce((sum,l)=>sum + (Number(l.amount ?? l.points ?? 0) || 0), 0);
  }

  function getStatePoint(studentId){
    if(!normalize()) return 0;
    return Number(state.points?.[studentId] || 0) || 0;
  }

  function renderAfterPointChange(){
    try{
      if(typeof startClassMode !== "undefined" && startClassMode && typeof renderStartClassMode === "function"){
        renderStartClassMode();
        return;
      }
    }catch(e){}
    try{
      if(typeof render === "function"){
        render();
        return;
      }
    }catch(e){}
  }

  window.v153AddGiftPoints = function(studentId, amount, reason){
    if(!normalize()) return false;

    const value = Number(amount) || 0;
    const before = getStatePoint(studentId);
    const after = before + value;
    const student = getStudent(studentId);
    const finalReason = reason || `開始上課禮物點數：${value >= 0 ? "+" : ""}${value}`;

    state.points[studentId] = after;

    state.pointLogs.push({
      id: uid(),
      studentId,
      classId: window.classContext?.classId || "",
      schoolId: window.classContext?.schoolId || "",
      amount: value,
      points: value,
      reason: finalReason,
      date: nowText(),
      source: "v15.3_start_class_gift"
    });

    try{
      if(typeof recordActivity === "function"){
        recordActivity(
          "points",
          `${student?.name || "學生"} ${value >= 0 ? "+" : ""}${value}｜${finalReason}`,
          {studentId, amount:value, reason:finalReason, source:"v15.3"}
        );
      }
    }catch(e){}

    try{ if(typeof markDirty === "function") markDirty(`V15.3 禮物點數同步：${value >= 0 ? "+" : ""}${value}`); }catch(e){}
    try{ if(typeof saveState === "function") saveState(); }catch(e){ console.error("V15.3 saveState failed", e); }

    console.log(
      `V15.3 point sync: ${student?.name || studentId} ${value >= 0 ? "+" : ""}${value}，state.points ${before} → ${after}，logTotal=${getLogTotal(studentId)}`
    );

    renderAfterPointChange();
    return true;
  };

  /* 開始上課歷代入口全部導向同一個資料來源 */
  window.st115AddGiftPoints = function(studentId, amount){
    return window.v153AddGiftPoints(studentId, amount, `開始上課禮物點數：+${Number(amount)||0}`);
  };

  window.st112AddGiftPoints = function(studentId, amount){
    return window.v153AddGiftPoints(studentId, amount, `開始上課禮物點數：+${Number(amount)||0}`);
  };

  window.st106AddPoints = function(studentId, points){
    return window.v153AddGiftPoints(studentId, points, `開始上課點數調整：${Number(points)>0?"+":""}${Number(points)||0}`);
  };

  window.sc939AddPoints = function(studentId, points){
    return window.v153AddGiftPoints(studentId, points, `開始上課點數調整：${Number(points)>0?"+":""}${Number(points)||0}`);
  };

  window.start933AddPoints = function(studentId, points){
    return window.v153AddGiftPoints(studentId, points, `開始上課點數調整：${Number(points)>0?"+":""}${Number(points)||0}`);
  };

  try{
    if(window.ST1062_StudentActions){
      window.ST1062_StudentActions.addPoints = function(studentId, points){
        return window.v153AddGiftPoints(studentId, points, `開始上課點數調整：${Number(points)>0?"+":""}${Number(points)||0}`);
      };
    }
  }catch(e){
    console.warn("V15.3 ST1062 override failed", e);
  }

  /* 點數探針：可直接在 Console 打 v153PointProbe("學生姓名") */
  window.v153PointProbe = function(nameOrId){
    normalize();
    const key = String(nameOrId || "");
    const student = (state.students || []).find(s => s.id === key || String(s.name || "").includes(key));
    if(!student){
      console.warn("V15.3 point probe: 找不到學生", nameOrId);
      return null;
    }
    const logs = (state.pointLogs || []).filter(l => l.studentId === student.id);
    const result = {
      name: student.name,
      id: student.id,
      statePoints: getStatePoint(student.id),
      logTotal: getLogTotal(student.id),
      lastLogs: logs.slice(-10)
    };
    console.table([{
      name: result.name,
      id: result.id,
      statePoints: result.statePoints,
      logTotal: result.logTotal,
      diff: result.statePoints - result.logTotal,
      logCount: logs.length
    }]);
    console.log("V15.3 point probe detail:", result);
    return result;
  };

  console.info("V15.3 point sync fix loaded. Console 可用：v153PointProbe('學生姓名')");
})();
</script>


<script id="v15-5-clean-points-core">
/* =========================================================
   V15.5 CLEAN POINTS CORE
   目的：只整理「點數系統」，不重構學生、時段、Firebase、課程流程。
   原則：
   1. 唯一正式點數來源：state.points[studentId]
   2. pointLogs 只當歷史紀錄，不再當即時餘額來源
   3. 所有上課介面、開始上課、學生端、獎品兌換、統計排行都讀 getStudentPoints()
   4. 所有加點/扣點都走 adjustStudentPoints()
   ========================================================= */
(function(){
  const CORE_VERSION = "V15.5 Clean Points Core";

  function nowText(){
    try{ if(typeof localIsoLikeString === "function") return localIsoLikeString(); }catch(e){}
    return new Date().toISOString();
  }
  function uid(){
    try{ if(typeof makeId === "function") return makeId(); }catch(e){}
    try{ if(typeof st106Id === "function") return st106Id(); }catch(e){}
    return "pt_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,8);
  }
  function normalizePointsCore(){
    if(!window.state || typeof window.state !== "object") return false;
    if(!state.points || typeof state.points !== "object" || Array.isArray(state.points)) state.points = {};
    if(!Array.isArray(state.pointLogs)) state.pointLogs = [];
    if(!Array.isArray(state.redeemLogs)) state.redeemLogs = [];
    return true;
  }
  function getStudent(studentId){
    return (window.state?.students || []).find(s => s && s.id === studentId) || null;
  }
  function studentByNameOrId(nameOrId){
    const key = String(nameOrId || "");
    return (window.state?.students || []).find(s => s && (s.id === key || String(s.name || "").includes(key))) || null;
  }
  function numberPoint(v){
    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
  }
  function getStudentPointsCore(studentId){
    if(!normalizePointsCore()) return 0;
    return numberPoint(state.points?.[studentId]);
  }
  function setStudentPointsCore(studentId, value, reason){
    if(!normalizePointsCore() || !studentId) return false;
    const before = getStudentPointsCore(studentId);
    const after = numberPoint(value);
    state.points[studentId] = after;
    try{ if(typeof markDirty === "function") markDirty(reason || `設定點數：${before}→${after}`); }catch(e){}
    try{ if(typeof saveState === "function") saveState(); }catch(e){ console.error("V15.5 saveState failed", e); }
    return {studentId,before,after,diff:after-before};
  }
  function renderAfterPointChange(){
    try{
      if(typeof startClassMode !== "undefined" && startClassMode && typeof renderStartClassMode === "function"){
        renderStartClassMode();
        return;
      }
    }catch(e){}
    try{ if(typeof render === "function") render(); }catch(e){}
  }
  function adjustStudentPointsCore(studentId, amount, reason, options){
    if(!normalizePointsCore() || !studentId) return false;
    const value = numberPoint(amount);
    if(!value) return false;
    const before = getStudentPointsCore(studentId);
    const after = before + value;
    const student = getStudent(studentId);
    const finalReason = reason || `點數調整：${value >= 0 ? "+" : ""}${value}`;

    state.points[studentId] = after;

    if(options?.log !== false){
      state.pointLogs.push({
        id: uid(),
        studentId,
        classId: window.classContext?.classId || "",
        schoolId: window.classContext?.schoolId || "",
        amount: value,
        points: value,
        reason: finalReason,
        date: nowText(),
        source: "v15.5_clean_points_core"
      });
    }

    try{
      if(typeof recordActivity === "function"){
        recordActivity("points", `${student?.name || "學生"} ${value >= 0 ? "+" : ""}${value}｜${finalReason}`, {
          studentId, amount:value, reason:finalReason, source:"v15.5"
        });
      }
    }catch(e){}

    try{ if(typeof markDirty === "function") markDirty(`${CORE_VERSION}：${student?.name || studentId} ${value >= 0 ? "+" : ""}${value}`); }catch(e){}
    try{ if(typeof saveState === "function") saveState(); }catch(e){ console.error("V15.5 saveState failed", e); }

    console.log(`V15.5 points: ${student?.name || studentId} ${value >= 0 ? "+" : ""}${value}，${before} → ${after}`);
    if(options?.render !== false) renderAfterPointChange();
    return {studentId,before,after,amount:value,reason:finalReason};
  }

  /* 對外正式 API */
  window.normalizePointsCore = normalizePointsCore;
  window.getStudentPoints = getStudentPointsCore;
  window.studentPoints = getStudentPointsCore;
  window.setStudentPoints = function(studentId,value,reason){
    const result = setStudentPointsCore(studentId,value,reason || "V15.5 手動設定點數");
    renderAfterPointChange();
    return result;
  };
  window.adjustStudentPoints = adjustStudentPointsCore;

  /* 舊上課介面加點入口統一 */
  window.addPoints = function(studentId, amount, reason){
    return adjustStudentPointsCore(studentId, amount, reason || "上課介面點數調整");
  };

  /* 開始上課歷代入口統一 */
  window.v153AddGiftPoints = function(studentId, amount, reason){
    return adjustStudentPointsCore(studentId, amount, reason || `開始上課禮物點數：${numberPoint(amount) >= 0 ? "+" : ""}${numberPoint(amount)}`);
  };
  window.st115AddGiftPoints = function(studentId, amount){ return window.v153AddGiftPoints(studentId, amount, `開始上課禮物點數：+${numberPoint(amount)}`); };
  window.st113AddGiftPoints = function(studentId, amount){ return window.v153AddGiftPoints(studentId, amount, `開始上課禮物點數：+${numberPoint(amount)}`); };
  window.st112AddGiftPoints = function(studentId, amount){ return window.v153AddGiftPoints(studentId, amount, `開始上課禮物點數：+${numberPoint(amount)}`); };
  window.st106AddPoints = function(studentId, points){ return adjustStudentPointsCore(studentId, points, `開始上課點數調整：${numberPoint(points)>0?"+":""}${numberPoint(points)}`); };
  window.sc939AddPoints = function(studentId, points){ return adjustStudentPointsCore(studentId, points, `開始上課點數調整：${numberPoint(points)>0?"+":""}${numberPoint(points)}`); };
  window.start933AddPoints = function(studentId, points){ return adjustStudentPointsCore(studentId, points, `開始上課點數調整：${numberPoint(points)>0?"+":""}${numberPoint(points)}`); };

  /* 舊讀取函式全部只讀 state.points */
  window.rewardStudentPoints = getStudentPointsCore;
  window.st106Points = getStudentPointsCore;
  window.sc939StudentPoints = getStudentPointsCore;
  window.start933StudentPoints = getStudentPointsCore;

  try{
    if(window.RewardCore){
      window.RewardCore.studentPoints = getStudentPointsCore;
      window.RewardCore.redeem = function(rewardId){
        this.ensure?.();
        const reward = state.rewards.find(r=>r.id===rewardId);
        const studentId = this.selectedStudentId();
        if(!reward || !studentId) return alert("請先選擇學生。");
        const info = this.discountInfo ? this.discountInfo(reward) : {price:Number(reward.cost || reward.price || 0), label:""};
        const price = numberPoint(info.price);
        const points = getStudentPointsCore(studentId);
        const student = getStudent(studentId);
        if(Number(reward.stock ?? 0) <= 0) return alert("庫存不足，無法兌換。");
        if(points < price) return alert(`點數不足，目前 ${points} 點，需要 ${price} 點。`);
        if(!confirm(`確定讓「${student?.name || "學生"}」兌換「${reward.name}」？\n將扣除 ${price} 點。`)) return;

        adjustStudentPointsCore(studentId, -price, `兌換：${reward.name}`, {render:false});
        state.redeemLogs.push({
          id:uid(),
          studentId,
          rewardId,
          rewardName:reward.name,
          cost:price,
          originalCost:Number(reward.cost ?? reward.price ?? 0)||0,
          date:nowText(),
          categoryId:reward.categoryId || "",
          discountLabel:info.label || "",
          source:"v15.5_clean_points_core"
        });
        reward.stock = Math.max(0, Number(reward.stock ?? 0) - 1);
        try{ if(typeof saveState === "function") saveState(); }catch(e){}
        try{ if(typeof markDirty === "function") markDirty("獎品兌換"); }catch(e){}
        alert("兌換完成。");
        try{ if(typeof renderRewards === "function") renderRewards(); else renderAfterPointChange(); }catch(e){ renderAfterPointChange(); }
      };
      window.RewardCore.cancelRedeem = function(logId){
        this.ensure?.();
        const log = state.redeemLogs.find(x=>x.id===logId);
        if(!log) return alert("找不到這筆兌換紀錄。");
        const student = getStudent(log.studentId);
        if(!confirm(`確定取消「${student?.name || "未知學生"}」兌換「${log.rewardName || "獎品"}」？\n會還原點數與庫存。`)) return;
        const reward = state.rewards.find(r=>r.id===log.rewardId);
        const cost = numberPoint(log.cost ?? log.points);
        if(reward) reward.stock = Number(reward.stock || 0) + 1;
        state.redeemLogs = state.redeemLogs.filter(x=>x.id!==logId);
        adjustStudentPointsCore(log.studentId, cost, `取消兌換：${log.rewardName || reward?.name || "獎品"}`, {render:false});
        try{ if(typeof saveState === "function") saveState(); }catch(e){}
        try{ if(typeof markDirty === "function") markDirty("取消獎品兌換"); }catch(e){}
        alert("已取消兌換。");
        try{ if(typeof renderRewards === "function") renderRewards(); else renderAfterPointChange(); }catch(e){ renderAfterPointChange(); }
      };
    }
  }catch(e){ console.warn("V15.5 RewardCore patch skipped", e); }

  try{
    if(window.StudentPortal){
      window.StudentPortal.points = getStudentPointsCore;
    }
  }catch(e){ console.warn("V15.5 StudentPortal patch skipped", e); }

  try{
    if(window.ST1062_StudentActions){
      window.ST1062_StudentActions.addPoints = function(studentId, points){
        return adjustStudentPointsCore(studentId, points, `開始上課點數調整：${numberPoint(points)>0?"+":""}${numberPoint(points)}`);
      };
    }
  }catch(e){ console.warn("V15.5 ST1062 patch skipped", e); }

  /* 探針：檢查正式點數與歷史紀錄，不自動改資料 */
  window.v155PointProbe = function(nameOrId){
    if(!normalizePointsCore()) return null;
    const st = studentByNameOrId(nameOrId);
    if(!st){ console.warn("V15.5 point probe: 找不到學生", nameOrId); return null; }
    const logTotal = (state.pointLogs || [])
      .filter(l=>l && l.studentId===st.id)
      .reduce((sum,l)=>sum + numberPoint(l.amount ?? l.points),0);
    const redeemTotal = (state.redeemLogs || [])
      .filter(l=>l && l.studentId===st.id)
      .reduce((sum,l)=>sum + numberPoint(l.cost ?? l.points),0);
    const result = {
      name:st.name,
      id:st.id,
      formalPoints:getStudentPointsCore(st.id),
      pointLogsTotal:logTotal,
      redeemLogsTotal:redeemTotal,
      note:"V15.5 正式餘額只看 formalPoints/state.points；pointLogs/redeemLogs 僅供歷史稽核。",
      lastPointLogs:(state.pointLogs || []).filter(l=>l.studentId===st.id).slice(-10),
      lastRedeemLogs:(state.redeemLogs || []).filter(l=>l.studentId===st.id).slice(-10)
    };
    console.table([{name:result.name, formalPoints:result.formalPoints, pointLogsTotal:logTotal, redeemLogsTotal:redeemTotal}]);
    console.log("V15.5 point probe detail:", result);
    return result;
  };

  window.v155SetPointByName = function(nameOrId, value){
    if(!normalizePointsCore()) return null;
    const st = studentByNameOrId(nameOrId);
    if(!st){ console.warn("V15.5 set point: 找不到學生", nameOrId); return null; }
    const result = window.setStudentPoints(st.id, numberPoint(value), `V15.5 手動校正：${st.name}`);
    console.warn(`V15.5 manual set: ${st.name} ${result.before} → ${result.after}`);
    return result;
  };

  normalizePointsCore();
  console.info(`${CORE_VERSION} loaded. 可用：v155PointProbe('學生姓名') / v155SetPointByName('學生姓名', 點數)`);
})();
</script>


<script>
/* =========================================================
   V15.6 MAINLINE → TODAY FLOW SYNC CORE
   只整理「左上本週主線」同步到「右上今天課堂流程」
   不動點數、學生、Firebase、時段核心。
   ========================================================= */
(function(){
  const CORE_VERSION = "V15.6 MainLine Flow Sync";

  function v156Esc(v){
    try{ return typeof escapeHtml === "function" ? escapeHtml(v) : String(v ?? "").replace(/[&<>"']/g, s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s])); }
    catch(e){ return String(v ?? ""); }
  }

  function v156Lines(raw){
    if(Array.isArray(raw)) return raw.map(x=>String(x?.title ?? x).trim()).filter(Boolean);
    return String(raw || "").split(/\n/).map(x=>x.trim()).filter(Boolean);
  }

  function v156Toast(msg){
    try{
      const old = document.getElementById("v156Toast");
      if(old) old.remove();
      const el = document.createElement("div");
      el.id = "v156Toast";
      el.textContent = msg;
      el.style.cssText = "position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:20000;background:#fff7d6;border:1px solid #d6bd5d;border-radius:999px;padding:12px 18px;font-weight:950;box-shadow:0 10px 28px rgba(0,0,0,.16);color:#5a4300;max-width:92vw;text-align:center";
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2600);
    }catch(e){ try{ alert(msg); }catch(_){} }
  }

  function v156CurrentMainline(){
    try{ if(typeof getWeeklyMainline === "function") return getWeeklyMainline(); }catch(e){}
    if(!state.weeklyMainline) state.weeklyMainline = {};
    const key = (typeof weeklyMainlineKey === "function") ? weeklyMainlineKey(classContext?.date) : "default";
    if(!state.weeklyMainline[key]) state.weeklyMainline[key] = {title:"",goal:"",tasks:"",sideQuest:"",mode:"normal"};
    return state.weeklyMainline[key];
  }

  function v156GetLessonRecord(){
    try{ if(typeof lessonRecord === "function") return lessonRecord(); }catch(e){}
    if(!state.lessonRecords || typeof state.lessonRecords !== "object") state.lessonRecords = {};
    const key = (typeof lessonCoreKey === "function") ? lessonCoreKey() : "default";
    if(!state.lessonRecords[key]) state.lessonRecords[key] = {weeklyPlan:{},todayFlow:{tasks:[],startTime:localStorage.getItem("battle_start_class_time")||"10:30"},fixedCurriculum:{text:""},growthHighlights:{text:""}};
    return state.lessonRecords[key];
  }

  function v156CollectWeeklyFromUI(){
    const title = document.getElementById("lessonWeeklyTitle")?.value ?? document.getElementById("weeklyMainTitleInput")?.value ?? "";
    const goal = document.getElementById("lessonWeeklyGoal")?.value ?? document.getElementById("weeklyMainGoalInput")?.value ?? "";
    const sideQuest = document.getElementById("lessonWeeklySideQuest")?.value ?? document.getElementById("weeklyMainSideQuestInput")?.value ?? "";

    let taskText = "";
    if(document.getElementById("lessonWeeklyTaskText")){
      taskText = document.getElementById("lessonWeeklyTaskText")?.value || "";
    }else if(document.getElementById("weeklyMainTasksInput")){
      taskText = document.getElementById("weeklyMainTasksInput")?.value || "";
    }else if(document.querySelector("#lessonWeeklyTasks .lesson-core-row")){
      taskText = [...document.querySelectorAll("#lessonWeeklyTasks .lesson-core-row")]
        .map(row=>row.querySelector(".lesson-weekly-task-title")?.value?.trim() || "")
        .filter(Boolean)
        .join("\n");
    }

    const minutesFromRows = [...document.querySelectorAll("#lessonWeeklyTasks .lesson-core-row")]
      .map(row=>Math.max(1,Number(row.querySelector(".lesson-weekly-task-min")?.value || 0)) || null);

    if(!taskText){
      const main = v156CurrentMainline();
      taskText = typeof main.tasks === "string" ? main.tasks : v156Lines(main.tasks).join("\n");
    }

    const titles = v156Lines(taskText);
    return {
      title, goal, sideQuest,
      taskText,
      tasks: titles.map((t,i)=>({title:t, minutes: minutesFromRows[i] || 10}))
    };
  }

  function v156SaveWeeklyOnly(weekly){
    const rec = v156GetLessonRecord();
    if(!rec.weeklyPlan) rec.weeklyPlan = {};
    rec.weeklyPlan.title = weekly.title || "";
    rec.weeklyPlan.goal = weekly.goal || "";
    rec.weeklyPlan.sideQuest = weekly.sideQuest || "";
    rec.weeklyPlan.taskText = weekly.taskText || weekly.tasks.map(t=>t.title).join("\n");
    rec.weeklyPlan.tasks = weekly.tasks.map(t=>({title:t.title, minutes:Number(t.minutes)||10}));

    const main = v156CurrentMainline();
    main.title = weekly.title || "";
    main.goal = weekly.goal || "";
    main.sideQuest = weekly.sideQuest || "";
    main.tasks = weekly.taskText || weekly.tasks.map(t=>t.title).join("\n");
    main.taskMinutes = weekly.tasks.map(t=>Number(t.minutes)||10);
  }

  function v156BuildSyncedTasks(weeklyTasks, oldTasks){
    const source = weeklyTasks.filter(t=>t && String(t.title||"").trim());
    const fallback = source.length ? Math.max(1, Math.floor(40 / source.length)) : 10;
    return source.map((t,idx)=>{
      const old = (oldTasks || []).find(x=>String(x.title||"") === String(t.title||"")) || (oldTasks || [])[idx];
      return {
        title:String(t.title||"").trim(),
        minutes:Math.max(1, Number(old?.minutes || t.minutes || fallback || 10)),
        done:false
      };
    });
  }

  function v156SyncWeeklyToTodayFlow(options={}){
    const weekly = options.weekly || v156CollectWeeklyFromUI();
    v156SaveWeeklyOnly(weekly);

    const rec = v156GetLessonRecord();
    if(!rec.todayFlow) rec.todayFlow = {};
    const oldTasks = Array.isArray(rec.todayFlow.tasks) ? rec.todayFlow.tasks : [];
    const newTasks = v156BuildSyncedTasks(weekly.tasks, oldTasks);
    rec.todayFlow.startTime = rec.todayFlow.startTime || localStorage.getItem("battle_start_class_time") || "10:30";
    rec.todayFlow.tasks = newTasks;

    /* 同步到 V9.4/V9.4.2 舊資料桶：右上流程與開始上課都可能讀這裡 */
    try{
      if(typeof v942Key === "function"){
        if(!state.todayLessons || typeof state.todayLessons !== "object") state.todayLessons = {};
        const key = v942Key();
        const old = state.todayLessons[key] || {};
        state.todayLessons[key] = {
          startTime: old.startTime || rec.todayFlow.startTime,
          tasks: newTasks.map(t=>({...t})),
          reminder: old.reminder || rec.todayFlow.reminder || "",
          homework: old.homework || rec.todayFlow.homework || "",
          note: old.note || rec.todayFlow.note || ""
        };
      }
    }catch(e){ console.warn("V15.6 todayLessons sync skipped", e); }

    try{
      if(typeof v940ClassKey === "function"){
        if(!state.todayClassFlows || typeof state.todayClassFlows !== "object") state.todayClassFlows = {};
        const key = v940ClassKey();
        const old = state.todayClassFlows[key] || {};
        state.todayClassFlows[key] = {
          startTime: old.startTime || rec.todayFlow.startTime,
          tasks: newTasks.map(t=>({title:t.title, minutes:t.minutes, done:t.done}))
        };
      }
    }catch(e){ console.warn("V15.6 todayClassFlows sync skipped", e); }

    try{ localStorage.setItem("battle_start_class_time", rec.todayFlow.startTime || "10:30"); }catch(e){}
    try{ markDirty?.("本週主線同步到今天課堂流程"); }catch(e){}
    try{ saveState(); }catch(e){ console.warn("V15.6 saveState failed", e); }
    console.info("V15.6 mainline sync", {weekly, newTasks, lessonKey: typeof lessonCoreKey==='function'?lessonCoreKey():null, todayLessonKey: typeof v942Key==='function'?v942Key():null, todayFlowKey: typeof v940ClassKey==='function'?v940ClassKey():null});
    return newTasks;
  }

  /* 覆蓋舊入口：左上儲存後自動同步，避免使用者以為已同步但右上不變 */
  window.saveWeeklyMainline = function(){
    const tasks = v156SyncWeeklyToTodayFlow();
    v156Toast(`✅ 本週主線已儲存，並同步 ${tasks.length} 個任務到今天課堂流程`);
    try{ render(); }catch(e){}
  };

  /* 覆蓋 Clean Course 入口：文字欄流 → 右上流程 */
  window.lessonSaveWeeklyPlan = function(){
    const weekly = v156CollectWeeklyFromUI();
    v156SaveWeeklyOnly(weekly);
    try{ markDirty?.("本週主線"); }catch(e){}
    try{ saveState(); }catch(e){}
    v156Toast("✅ 本週主線已儲存");
    try{ render(); }catch(e){}
  };

  window.lessonSyncWeeklyToToday = function(){
    const tasks = v156SyncWeeklyToTodayFlow();
    v156Toast(`✅ 已同步 ${tasks.length} 個任務到今天課堂流程`);
    try{ render(); }catch(e){}
  };

  /* 覆蓋右上「從本週主線重建」：原本可能讀舊 getWeeklyMainline，這裡改讀最新文字欄 */
  window.v942ResetFromWeekly = function(){
    const tasks = v156SyncWeeklyToTodayFlow();
    v156Toast(`✅ 已從本週主線重建 ${tasks.length} 個課堂任務`);
    try{ render(); }catch(e){}
  };

  window.v156MainlineProbe = function(){
    const rec = v156GetLessonRecord();
    const main = v156CurrentMainline();
    const lessonKey = typeof lessonCoreKey==='function'?lessonCoreKey():null;
    const todayLessonKey = typeof v942Key==='function'?v942Key():null;
    const todayFlowKey = typeof v940ClassKey==='function'?v940ClassKey():null;
    const result = {
      lessonKey,
      todayLessonKey,
      todayFlowKey,
      weeklyMainline: main,
      lessonRecordWeeklyPlan: rec.weeklyPlan,
      lessonRecordTodayFlow: rec.todayFlow,
      todayLessons: todayLessonKey ? state.todayLessons?.[todayLessonKey] : undefined,
      todayClassFlows: todayFlowKey ? state.todayClassFlows?.[todayFlowKey] : undefined
    };
    console.log("V15.6 mainline probe", result);
    return result;
  };

  console.info(`${CORE_VERSION} loaded. 可用：v156MainlineProbe()`);
})();
</script>



<script>
/* =========================================================
   V15.9 START CLASS STATE FIX
   Base: V15.6 MainLine Flow Sync
   目的：不改版面、不改點數核心；只修「開始上課模式狀態」沒有穩定掛上的問題。
   ========================================================= */
(function(){
  const VERSION = 'V15.9 StartClass State Fixed';
  const BASE = 'V15.6 MainLine Flow Sync';
  if(window.__V159_START_STATE_FIXED__) return;
  window.__V159_START_STATE_FIXED__ = true;
  window.__V159_START_STATE__ = {
    version: VERSION,
    base: BASE,
    enterCount: 0,
    renderCount: 0,
    exitCount: 0,
    lastEnterAt: '',
    lastRenderAt: '',
    lastExitAt: '',
    lastReason: ''
  };

  function now(){
    try{ return new Date().toLocaleString(); }catch(e){ return String(Date.now()); }
  }

  function setStartActive(active, reason){
    const on = !!active;
    try{ startClassMode = on; }catch(e){}
    window.__startClassModeActive = on;
    window.__V159_START_STATE__.lastReason = reason || (on ? 'active' : 'inactive');
    try{ document.body.classList.toggle('start-class-mode', on); }catch(e){}
    return on;
  }

  function isStartActive(){
    let lexical = false;
    try{ lexical = !!startClassMode; }catch(e){}
    const body = !!document.body?.classList?.contains('start-class-mode');
    const mirrored = !!window.__startClassModeActive;
    return lexical || body || mirrored;
  }

  window.isStartClassActive = isStartActive;
  window.setStartClassActive = setStartActive;

  const oldEnter = typeof enterStartClassMode === 'function' ? enterStartClassMode : null;
  if(oldEnter && !oldEnter.__v159Wrapped){
    const wrappedEnter = function(){
      window.__V159_START_STATE__.enterCount++;
      window.__V159_START_STATE__.lastEnterAt = now();
      setStartActive(true, 'enterStartClassMode');
      const result = oldEnter.apply(this, arguments);
      setStartActive(true, 'enterStartClassMode-after');
      return result;
    };
    wrappedEnter.__v159Wrapped = true;
    window.enterStartClassMode = wrappedEnter;
    try{ enterStartClassMode = wrappedEnter; }catch(e){}
  }

  const oldRenderStart = typeof renderStartClassMode === 'function' ? renderStartClassMode : null;
  if(oldRenderStart && !oldRenderStart.__v159Wrapped){
    const wrappedRender = function(){
      window.__V159_START_STATE__.renderCount++;
      window.__V159_START_STATE__.lastRenderAt = now();
      // 關鍵：只要有任何程式直接呼叫 renderStartClassMode，也要視為已進入開始上課。
      setStartActive(true, 'renderStartClassMode');
      const result = oldRenderStart.apply(this, arguments);
      setStartActive(true, 'renderStartClassMode-after');
      return result;
    };
    wrappedRender.__v159Wrapped = true;
    window.renderStartClassMode = wrappedRender;
    try{ renderStartClassMode = wrappedRender; }catch(e){}
  }

  const oldExit = typeof exitStartClassMode === 'function' ? exitStartClassMode : null;
  if(oldExit && !oldExit.__v159Wrapped){
    const wrappedExit = function(){
      window.__V159_START_STATE__.exitCount++;
      window.__V159_START_STATE__.lastExitAt = now();
      setStartActive(false, 'exitStartClassMode-before');
      const result = oldExit.apply(this, arguments);
      setStartActive(false, 'exitStartClassMode-after');
      return result;
    };
    wrappedExit.__v159Wrapped = true;
    window.exitStartClassMode = wrappedExit;
    try{ exitStartClassMode = wrappedExit; }catch(e){}
  }

  // finishStartClass 會結束課堂，也要確保狀態卸載。
  const oldFinish = typeof finishStartClass === 'function' ? finishStartClass : null;
  if(oldFinish && !oldFinish.__v159Wrapped){
    const wrappedFinish = function(){
      const result = oldFinish.apply(this, arguments);
      setStartActive(false, 'finishStartClass-after');
      return result;
    };
    wrappedFinish.__v159Wrapped = true;
    window.finishStartClass = wrappedFinish;
    try{ finishStartClass = wrappedFinish; }catch(e){}
  }

  // 如果此補丁載入時已經在開始上課畫面，補掛狀態。
  try{
    const appText = document.getElementById('app')?.innerText || '';
    if(document.body.classList.contains('start-class-mode') || appText.includes('開始上課')){
      setStartActive(true, 'install-detected-start-screen');
    }
  }catch(e){}

  window.v159StartProbe = function(nameOrId){
    let lexical = false;
    try{ lexical = !!startClassMode; }catch(e){}
    let student = null;
    const key = String(nameOrId || '').trim();
    if(key){
      student = (window.state?.students || []).find(s => s && (s.id === key || String(s.name || '').includes(key))) || null;
    }
    const result = {
      version: VERSION,
      base: BASE,
      lexicalStartClassMode: lexical,
      windowStartClassMode: !!window.startClassMode,
      mirrorStartClassMode: !!window.__startClassModeActive,
      bodyStartClassMode: !!document.body?.classList?.contains('start-class-mode'),
      isStartClassActive: isStartActive(),
      stats: window.__V159_START_STATE__,
      student: student ? {
        id: student.id,
        name: student.name,
        officialPoints: typeof getStudentPoints === 'function' ? getStudentPoints(student.id) : Number(window.state?.points?.[student.id] || 0),
        legacyStudentPoints: Number(student.points || 0),
        cardFound: !!document.querySelector(`[data-student-id="${student.id}"], [data-id="${student.id}"]`)
      } : null,
      note: 'windowStartClassMode 常常是 false，因為原本是 let startClassMode；請以 isStartClassActive / lexicalStartClassMode / bodyStartClassMode 判斷。'
    };
    console.log('V15.9 start probe', result);
    return result;
  };

  console.info(`${VERSION} loaded. 可用：v159StartProbe('學生姓名')`);
})();
</script>


<script>
/* =========================================================
   V15.9.1 START CLASS POINT UI BRIDGE
   Base: V15.9 StartClass State Fixed
   目的：不動版面，只修「開始上課內點數 state 已增加，但卡片數字不即時更新」。
   原因：開始上課的點數顯示仍可能讀舊 st106Points / 被 ST180 render throttle 擋住。
   ========================================================= */
(function(){
  const VERSION = 'V15.9.1 StartClass Point UI Bridge';
  if(window.__V1591_START_POINT_UI__) return;
  window.__V1591_START_POINT_UI__ = true;

  function n(v){ const x = Number(v); return Number.isFinite(x) ? x : 0; }
  function officialPoints(studentId){
    try{ if(typeof window.getStudentPoints === 'function') return n(window.getStudentPoints(studentId)); }catch(e){}
    try{ if(typeof getStudentPoints === 'function') return n(getStudentPoints(studentId)); }catch(e){}
    try{ return n(window.state?.points?.[studentId]); }catch(e){}
    return 0;
  }
  function studentByNameOrId(nameOrId){
    const key = String(nameOrId || '').trim();
    return (window.state?.students || []).find(s => s && (s.id === key || String(s.name || '').includes(key))) || null;
  }

  // 讓開始上課所有舊卡片讀點數時，都回到 V15.5 正式來源 state.points。
  try{
    window.st106Points = function(studentId){ return officialPoints(studentId); };
    st106Points = window.st106Points;
  }catch(e){
    console.warn('V15.9.1 st106Points override skipped', e);
  }

  // 讓學生卡片有穩定 data-id，方便只更新該學生，不整頁重繪。
  try{
    if(typeof st106StudentCard === 'function' && !st106StudentCard.__v1591Wrapped){
      const oldCard = st106StudentCard;
      const wrappedCard = function(st){
        let html = oldCard.apply(this, arguments);
        if(st?.id && typeof html === 'string' && !html.includes('data-v1591-card')){
          html = html.replace('<article ', `<article data-v1591-card="1" data-id="${String(st.id).replace(/"/g,'&quot;')}" data-student-id="${String(st.id).replace(/"/g,'&quot;')}" `);
        }
        return html;
      };
      wrappedCard.__v1591Wrapped = true;
      window.st106StudentCard = wrappedCard;
      try{ st106StudentCard = wrappedCard; }catch(e){}
    }
  }catch(e){ console.warn('V15.9.1 card data-id patch skipped', e); }

  // 把點數數字包成可精準更新的 span。
  try{
    if(typeof st111ProfileBlock === 'function' && !st111ProfileBlock.__v1591Wrapped){
      const oldProfile = st111ProfileBlock;
      const wrappedProfile = function(st){
        let html = oldProfile.apply(this, arguments);
        const pts = officialPoints(st?.id);
        if(st?.id && typeof html === 'string' && !html.includes('v1591-start-point-num')){
          html = html.replace(/<small>🎁 點數<\/small>\s*[-]?\d+/,
            `<small>🎁 點數</small><span class="v1591-start-point-num" data-point-student-id="${String(st.id).replace(/"/g,'&quot;')}">${pts}</span>`);
        }
        return html;
      };
      wrappedProfile.__v1591Wrapped = true;
      window.st111ProfileBlock = wrappedProfile;
      try{ st111ProfileBlock = wrappedProfile; }catch(e){}
    }
  }catch(e){ console.warn('V15.9.1 profile point span patch skipped', e); }

  function updateStartPointUI(studentId){
    if(!studentId) return false;
    const pts = officialPoints(studentId);
    let touched = 0;

    // 新版精準 span
    document.querySelectorAll(`.v1591-start-point-num[data-point-student-id="${CSS.escape(studentId)}"]`).forEach(el=>{
      el.textContent = String(pts);
      touched++;
    });

    // 如果目前畫面是舊 DOM，尚未被包 span，就在學生卡片文字層做保守替換。
    const cards = document.querySelectorAll(`[data-id="${CSS.escape(studentId)}"], [data-student-id="${CSS.escape(studentId)}"]`);
    cards.forEach(card=>{
      const stats = card.querySelectorAll('.st111-stat');
      stats.forEach(stat=>{
        if((stat.textContent || '').includes('🎁') || (stat.innerHTML || '').includes('點數')){
          if(!stat.querySelector('.v1591-start-point-num')){
            stat.innerHTML = `<small>🎁 點數</small><span class="v1591-start-point-num" data-point-student-id="${studentId}">${pts}</span>`;
          }else{
            stat.querySelector('.v1591-start-point-num').textContent = String(pts);
          }
          touched++;
        }
      });
    });

    // 若卡片還沒有 data-id，但畫面文字含學生姓名，仍可盡量找。
    if(!touched){
      const st = (window.state?.students || []).find(s=>s.id===studentId);
      if(st?.name){
        document.querySelectorAll('.st106-card,.st111-card').forEach(card=>{
          if((card.textContent || '').includes(st.name)){
            const stats = card.querySelectorAll('.st111-stat');
            stats.forEach(stat=>{
              if((stat.textContent || '').includes('🎁') || (stat.innerHTML || '').includes('點數')){
                stat.innerHTML = `<small>🎁 點數</small><span class="v1591-start-point-num" data-point-student-id="${studentId}">${pts}</span>`;
                touched++;
              }
            });
          }
        });
      }
    }

    if(touched){
      console.info(`V15.9.1 start point UI updated: ${studentId} -> ${pts} (${touched})`);
      return true;
    }
    return false;
  }

  window.v1591UpdateStartPointUI = updateStartPointUI;

  function wrapPointFn(name){
    try{
      const old = window[name];
      if(typeof old !== 'function' || old.__v1591Wrapped) return;
      const wrapped = function(studentId){
        const result = old.apply(this, arguments);
        setTimeout(()=>updateStartPointUI(studentId), 0);
        setTimeout(()=>updateStartPointUI(studentId), 80);
        return result;
      };
      wrapped.__v1591Wrapped = true;
      window[name] = wrapped;
      try{ eval(name + ' = window["' + name + '"]'); }catch(e){}
    }catch(e){ console.warn('V15.9.1 wrap failed', name, e); }
  }

  ['addPoints','adjustStudentPoints','v153AddGiftPoints','st115AddGiftPoints','st113AddGiftPoints','st112AddGiftPoints','st106AddPoints','sc939AddPoints','start933AddPoints'].forEach(wrapPointFn);

  try{
    if(window.ST1062_StudentActions?.addPoints && !window.ST1062_StudentActions.addPoints.__v1591Wrapped){
      const old = window.ST1062_StudentActions.addPoints.bind(window.ST1062_StudentActions);
      const wrapped = function(studentId){
        const result = old.apply(this, arguments);
        setTimeout(()=>updateStartPointUI(studentId), 0);
        setTimeout(()=>updateStartPointUI(studentId), 80);
        return result;
      };
      wrapped.__v1591Wrapped = true;
      window.ST1062_StudentActions.addPoints = wrapped;
    }
  }catch(e){ console.warn('V15.9.1 ST1062 addPoints wrap skipped', e); }

  window.v1591StartPointProbe = function(nameOrId){
    const st = studentByNameOrId(nameOrId);
    const result = {
      version: VERSION,
      student: st ? {id:st.id,name:st.name,officialPoints:officialPoints(st.id),legacyStudentPoints:n(st.points)} : null,
      active: typeof window.isStartClassActive === 'function' ? window.isStartClassActive() : document.body.classList.contains('start-class-mode'),
      cards: st ? Array.from(document.querySelectorAll(`[data-id="${CSS.escape(st.id)}"], [data-student-id="${CSS.escape(st.id)}"]`)).map(el=>el.innerText.slice(0,160)) : [],
      pointSpans: st ? Array.from(document.querySelectorAll(`.v1591-start-point-num[data-point-student-id="${CSS.escape(st.id)}"]`)).map(el=>el.textContent) : []
    };
    console.log('V15.9.1 start point probe', result);
    return result;
  };

  console.info(`${VERSION} loaded. 可用：v1591StartPointProbe('學生姓名')`);
})();
</script>
