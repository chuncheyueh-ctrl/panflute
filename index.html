setTimeout(()=>console.log('V7 health', v7SystemHealth()),1000);

/* =========================================================

   ========================================================= */
window.async = window.async || function(fn){ return fn; };


/* v8.0.2: 已清除單獨殘留的 async 行，避免 Safari 初始載入時誤判為變數。 */

</script>
