<style>

/* =========================================================
   v3.5.0 iPad / Safari 介面修正
   ========================================================= */
*, *::before, *::after{
  box-sizing:border-box !important;
}

input, select, textarea{
  max-width:100% !important;
  min-width:0 !important;
}

.row > *{
  min-width:0 !important;
}

/* iPad Safari 對 date input 比較容易爆版，特別修正 */
input[type="date"]{
  -webkit-appearance:none !important;
  appearance:none !important;
  width:100% !important;
  max-width:100% !important;
  min-width:0 !important;
  overflow:hidden !important;
}

/* iPad 橫向時，篩選列不要把日期推出外框 */
@supports (-webkit-touch-callout: none){
  .row{
    width:100% !important;
  }
  .card{
    overflow:hidden !important;
  }
  select, input[type="date"]{
    font-size:16px !important; /* 避免 iPad 自動放大 */
  }
}

    max-width:calc(33.333% - 12px) !important;
  }
}

/* =========================================================
   V10.5.4 SAFE TASK LIGHT CONTROLLER
   Same light logic as v10.5.3, but safe DOM insertion.
   ========================================================= */
function sc1054Tasks(){
  try{
    const lesson = typeof sc105Lesson === "function" ? sc105Lesson() : (typeof scCoreLesson === "function" ? scCoreLesson() : null);
    if(lesson && Array.isArray(lesson.tasks)){
      lesson.tasks.forEach(t=>{
        if(!t.status) t.status = t.done ? "done" : "pending";
        t.done = t.status === "done";
      });
      return lesson.tasks;
    }
  }catch(e){}
  try{
    return sc939TaskItems().map(t=>{
      if(!t.status) t.status = t.done ? "done" : "pending";
      t.done = t.status === "done";
      return t;
    });
  }catch(e){}
  return [];
}
function sc1054Status(task){
  if(!task) return "pending";
  if(!task.status) task.status = task.done ? "done" : "pending";
  task.done = task.status === "done";
  return task.status || "pending";
}
function sc1054Icon(status){ return status === "done" ? "✓" : (status === "carry" ? "↷" : "○"); }
function sc1054Label(status){ return status === "done" ? "已完成" : (status === "carry" ? "保留至下次" : "未完成"); }
function sc1054Next(status){ return status === "pending" ? "done" : (status === "done" ? "carry" : "pending"); }
function sc1054Ranges(){
  if(typeof scCoreRanges === "function") return scCoreRanges();
  if(typeof sc939Ranges === "function") return sc939Ranges();
  return [];
}
function sc1054NowSeconds(){
  if(typeof scCoreNowSeconds === "function") return scCoreNowSeconds();
  if(typeof sc1042NowSeconds === "function") return sc1042NowSeconds();
  const d = new Date();
  return d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
}
function sc1054SetStatus(idx,status){
  const tasks = sc1054Tasks();
  if(!tasks[idx]) return;
  tasks[idx].status = status;
  tasks[idx].done = status === "done";

  if(typeof sc105SyncCarryTasks === "function"){
    try{ sc105SyncCarryTasks(); }catch(e){}
  }
  try{ saveState(); }catch(e){}
  renderStartClassMode();
}
function sc1054Cycle(idx){
  const tasks = sc1054Tasks();
  const status = sc1054Status(tasks[idx]);
  sc1054SetStatus(idx, sc1054Next(status));
}
function sc1054OverdueSeconds(range, task){
  if(sc1054Status(task) !== "pending") return 0;
  const now = sc1054NowSeconds();
  return Math.max(0, now - range.end);
}
function sc1054OverdueLevel(range, task){
  const sec = sc1054OverdueSeconds(range, task);
  if(sec <= 0) return "none";
  if(sec >= 180) return "hard";
  return "soft";
}
function sc1054FirstOverdueIdx(ranges,tasks){
  for(const r of ranges){
    if(sc1054OverdueLevel(r, tasks[r.idx]) !== "none") return r.idx;
  }
  return -1;
}
function sc1054TaskCards(){
  return [...document.querySelectorAll(".sc-core-flow-card,.v942-start-flow-card,.sc939-flow-card")];
}
function sc1054AppendBadges(card, html){
  const title = card.querySelector(".sc-core-task-title,.v942-start-title,.sc939-flow-title");
  if(!title) return;
  title.querySelectorAll(".sc1053-badge,.sc1052-badge,.sc1051-overdue-badge").forEach(x=>x.remove());
  if(html) title.insertAdjacentHTML("beforeend", html);
}
function sc1054Badge(kind,text){
  return `<span class="sc1053-badge ${kind}">${text}</span>`;
}
function sc1054AppendSuggestion(card, html){
  card.querySelectorAll(".sc1053-suggestion,.sc1052-suggestion,.sc1051-suggestion").forEach(x=>x.remove());
  if(!html) return;
  const meta = card.querySelector(".sc-core-task-meta,.v942-start-meta,.sc939-flow-time");
  if(meta) meta.insertAdjacentHTML("afterend", html);
}
function sc1054EnsureStatusButton(card, idx, status){
  const oldInput = card.querySelector('input[type="checkbox"]');
  if(oldInput) oldInput.classList.add("sc1054-hide-old-check","sc1053-hidden-old-check");

  let wrap = card.querySelector(".sc1054-status-wrap");
  if(!wrap){
    wrap = document.createElement("div");
    wrap.className = "sc1054-status-wrap";
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "sc1054-status-btn";
    btn.onclick = () => sc1054Cycle(idx);
    wrap.appendChild(btn);

    // Safe insertion: only insert into card itself, never into ambiguous old input parent.
    card.insertBefore(wrap, card.firstChild);
  }

  const btn = wrap.querySelector(".sc1054-status-btn");
  btn.className = `sc1054-status-btn ${status}`;
  btn.textContent = sc1054Icon(status);
  btn.title = sc1054Label(status);
  btn.onclick = () => sc1054Cycle(idx);
}
function sc1054ApplyLights(){
  try{
    if(!document.body.classList.contains("start-class-mode")) return;

    const cards = sc1054TaskCards();
    const ranges = sc1054Ranges();
    const tasks = sc1054Tasks();
    const now = sc1054NowSeconds();
    const nextIdx = ranges.findIndex(r=>now<r.start);
    const activeOverdueIdx = sc1054FirstOverdueIdx(ranges,tasks);

    cards.forEach((card,idx)=>{
      const r = ranges[idx];
      if(!r) return;
      const task = tasks[idx] || {};
      const status = sc1054Status(task);
      const isCurrent = now >= r.start && now < r.end;
      const isPast = now >= r.end;
      const isNext = !isCurrent && !isPast && idx === nextIdx;
      const overdueSec = sc1054OverdueSeconds(r, task);
      const overdueLevel = sc1054OverdueLevel(r, task);
      const activeOverdue = idx === activeOverdueIdx;

      card.classList.add("sc1053-card","sc1053-reset");
      card.classList.remove(
        "sc1053-current","sc1053-next","sc1053-past","sc1053-done","sc1053-carry",
        "sc1053-overdue-soft","sc1053-overdue-hard","sc1053-active-overdue",
        "v1041-task-current","v1041-task-next","v1041-task-past","v1041-task-done",
        "v1042-task-current","v1042-task-next","v1042-task-past","v1042-task-done",
        "sc1052-current","sc1052-next","sc1052-past","sc1052-done","sc1052-carry",
        "sc1052-overdue-soft","sc1052-overdue-hard","sc1052-active-overdue"
      );

      if(isCurrent) card.classList.add("sc1053-current");
      if(isNext) card.classList.add("sc1053-next");
      if(isPast && status === "pending" && overdueLevel === "none") card.classList.add("sc1053-past");
      if(status === "done") card.classList.add("sc1053-done");
      if(status === "carry") card.classList.add("sc1053-carry");
      if(overdueLevel === "soft") card.classList.add("sc1053-overdue-soft");
      if(overdueLevel === "hard") card.classList.add("sc1053-overdue-hard");
      if(activeOverdue) card.classList.add("sc1053-active-overdue");

      sc1054EnsureStatusButton(card, idx, status);

      let badges = "";
      if(isCurrent) badges += sc1054Badge("now","現在");
      if(isNext) badges += sc1054Badge("next","下一個");
      if(status === "carry") badges += sc1054Badge("carry","保留");
      if(overdueLevel !== "none"){
        const min = Math.floor(overdueSec/60);
        badges += sc1054Badge(`overdue-${overdueLevel}`, min > 0 ? `超時 ${min} 分` : "超時中");
      }
      sc1054AppendBadges(card,badges);

      let suggestion = "";
      if(overdueLevel === "soft"){
        suggestion = `<div class="sc1053-suggestion">已超時，可完成、保留至下次或繼續觀察。</div>`;
      }else if(overdueLevel === "hard"){
        suggestion = `<div class="sc1053-suggestion hard">已落後 ${Math.floor(overdueSec/60)} 分鐘，建議保留部分任務或縮短後面流程。</div>`;
      }
      sc1054AppendSuggestion(card,suggestion);
    });
  }catch(e){
    console.warn("sc1054ApplyLights skipped:", e);
  }
}

const __sc1054RenderStart = typeof renderStartClassMode === "function" ? renderStartClassMode : null;
if(__sc1054RenderStart){
  renderStartClassMode = function(){
    const result = __sc1054RenderStart.apply(this, arguments);
    setTimeout(sc1054ApplyLights,0);
    setTimeout(sc1054ApplyLights,120);
    return result;
  };
}

if(window.sc1054Interval) clearInterval(window.sc1054Interval);
window.sc1054Interval = setInterval(()=>{
  if(document.body.classList.contains("start-class-mode")){
    sc1054ApplyLights();
  }
},500);

setTimeout(sc1054ApplyLights,500);

</script>
</body>
