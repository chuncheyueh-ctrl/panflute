<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Battle 排笛教學管理系統 V34.4</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#fff8ef; --card:#fff; --ink:#2d241f; --muted:#7b6f63; --line:#ead9c8;
  --brand:#b36a22; --brand2:#d8cbb8; --green:#5fa35f; --red:#b9534f; --blue:#3e78bd;
  --radius:20px; --shadow:0 10px 24px rgba(96,57,24,.10);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif}
header{position:sticky;top:0;z-index:10;background:rgba(255,248,239,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.header-inner{max-width:1280px;margin:auto;padding:14px 18px;display:flex;gap:14px;align-items:center;justify-content:space-between}
.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:#8d5627;display:grid;place-items:center;font-size:24px}
h1{font-size:22px;margin:0}.sub{font-size:12px;color:var(--muted);font-weight:700}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select,input,textarea,button{font:inherit;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#fff;color:var(--ink)}
button{font-weight:900;cursor:pointer;border:0;background:#e9ddcc}
button.primary{background:var(--brand);color:white}button.good{background:var(--green);color:white}button.bad{background:var(--red);color:white}button.blue{background:var(--blue);color:white}
main{max-width:1280px;margin:18px auto 60px;padding:0 18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:380px 1fr;gap:18px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px}.stat b{display:block;font-size:34px}.stat span{font-size:13px;color:var(--muted);font-weight:800}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
label{font-weight:900;font-size:13px;color:var(--muted);display:block;margin:10px 0 6px}
.field input,.field select{width:100%}
.student-list,.rank-list,.level-list{display:grid;gap:10px;max-height:520px;overflow:auto;padding-right:4px}
.student-item,.rank-item,.level-item{display:grid;grid-template-columns:52px 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:10px;background:#fff;cursor:pointer}
.student-item.active,.level-item.active{outline:2px solid var(--brand)}
.avatar{width:48px;height:48px;border-radius:16px;background:#eadfce;display:grid;place-items:center;font-weight:1000;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.name{font-weight:1000}.meta{font-size:12px;color:var(--muted);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{background:#1f1c1a;color:#fff;border-radius:999px;padding:6px 10px;font-weight:1000}
.check-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:8px 0 18px}.check-grid label{display:flex;gap:8px;align-items:center;color:var(--ink);background:#fffaf4;border:1px solid var(--line);border-radius:999px;padding:10px;margin:0}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.hidden{display:none!important}
.progress{height:16px;border-radius:999px;background:#eee0ce;overflow:hidden}.progress>div{height:100%;background:var(--brand)}
.att-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px}.att-table{border-collapse:collapse;min-width:900px;width:100%;background:white}.att-table th,.att-table td{border:1px solid var(--line);padding:8px;text-align:center}.att-table th:first-child,.att-table td:first-child{position:sticky;left:0;background:#fffaf4;text-align:left;min-width:260px;z-index:1}.serial{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:50%;background:var(--brand2);font-weight:1000;margin-right:8px}
.pill{display:inline-block;border-radius:999px;padding:4px 10px;background:#e9ddcc;font-weight:900}.pill.present{background:#dceed2}.pill.absent{background:#f1d3d0}.pill.leave{background:#d8e7fb}.pill.late{background:#eee0ce}
.ability-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.ability-row{display:grid;grid-template-columns:70px 1fr 34px;align-items:center;gap:10px}.ability-row input{width:100%}
@media(max-width:900px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.header-inner{align-items:flex-start;flex-direction:column}.toolbar{width:100%}.toolbar select,.toolbar button{flex:1}.two,.three{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="header-inner">
  <div class="brand"><div class="logo">🐶</div><div><h1>Battle 排笛教學管理系統</h1><div class="sub">V34.4｜JS 修復版</div></div></div>
  <div class="toolbar">
    <select id="viewSelect">
      <option value="sync">雲端同步設定</option>
      <option value="teacher">老師管理</option>
      <option value="dashboard">班級控制台</option>
      <option value="student">學生個人頁</option>
      <option value="levels">等級目標管理</option>
      <option value="manage">學校／年級管理</option>
      <option value="display">展示頁</option>
      <option value="notes">備註／紀錄</option>
    </select>
    <button onclick="renderAll()">重新整理</button>
    <button onclick="loadCloud()">Firebase 讀取</button>
    <button class="primary" onclick="saveCloud()">Firebase 儲存</button><button onclick="testFirebase()">測試 Firebase</button>
    <button onclick="exportBackup()">匯出備份</button>
    <button onclick="document.getElementById('importFile').click()">匯入</button>
    <input id="importFile" type="file" accept=".json" class="hidden" onchange="importBackup(event)">
  </div>
</div></header>
<main>
<section class="card"><h2>班級篩選</h2><div class="three">
  <div class="field"><label>學校</label><select id="schoolFilter"></select></div>
  <div class="field"><label>年級／班級</label><select id="gradeFilter"></select></div>
  <div class="field"><label>操作</label><button class="blue" onclick="sortByCurrent()">選排序第一名</button></div>
</div></section>
<section class="stats">
 <div class="stat"><b id="statStudents">0</b><span>學生數</span></div>
 <div class="stat"><b id="statAvg">0</b><span>平均等級</span></div>
 <div class="stat"><b id="statMax">0</b><span>最高等級</span></div>
 <div class="stat"><b id="statPoints">0</b><span>班級總點數</span></div>
</section>


<section id="syncView" class="hidden">
  <div class="card">
    <h2>雲端同步設定</h2>
    <p class="meta">這裡是 Google Apps Script / 同步網址設定區。Firebase 按鈕仍保留在上方工具列。</p>
    <label>同步網址（Google Apps Script Web App URL）</label>
    <input id="syncUrlInput" placeholder="請貼上 https://script.google.com/macros/s/.../exec" style="width:100%">
    <div class="actions">
      <button class="primary" onclick="saveSyncUrl()">儲存同步網址</button>
      <button onclick="testSyncUrl()">測試網址</button>
      <button onclick="copySyncUrl()">複製網址</button>
    </div>
    <p id="syncUrlStatus" class="meta"></p>
  </div>
</section>

<section id="teacherView" class="hidden">
  <div class="card">
    <h2>老師管理</h2>
    <p class="meta">V34.1 先補回入口；老師權限與登入功能會在核心穩定後再接回。</p>
    <label>老師名稱</label>
    <input id="teacherNameInput" placeholder="例如：岳駿哲老師" style="width:100%">
    <div class="actions"><button class="primary" onclick="saveTeacherName()">儲存老師名稱</button></div>
  </div>
</section>

<section id="displayView" class="hidden">
  <div class="card">
    <h2>展示頁</h2>
    <p class="meta">可用於投影排行榜、等級進度或班級成果。V34.1 先補回入口。</p>
    <div id="displayContent"></div>
  </div>
</section>

<section id="notesView" class="hidden">
  <div class="card">
    <h2>備註／紀錄</h2>
    <textarea id="globalNotes" rows="10" placeholder="可記錄課堂事項、學生提醒、比賽備忘。" style="width:100%"></textarea>
    <div class="actions"><button class="primary" onclick="saveGlobalNotes()">儲存備註</button></div>
  </div>
</section>

<section id="dashboardView">
 <div class="grid">
  <aside>
   <div class="card"><h2>新增學生</h2>
    <div class="meta" id="addHint"></div>
    <div class="two"><div class="field"><label>姓名</label><input id="newName" placeholder="學生姓名"></div><div class="field"><label>初始等級</label><input id="newLevel" type="number" min="1" value="1"></div></div>
    <div class="two"><div class="field"><label>座號</label><input id="newSeat" type="number" min="1" placeholder="例如：8"></div><div class="field"><label>點數</label><input id="newPoints" type="number" value="0"></div></div>
    <button class="primary" style="width:100%;margin-top:12px" onclick="addStudent()">新增學生</button>
   </div>
   <div class="card"><h2>學生名單</h2><div id="studentList" class="student-list"></div></div>
   <div class="card"><h2>排行榜</h2><div id="rankList" class="rank-list"></div></div>
  </aside>
  <section>
   <div class="card"><h2>學生資料與等級調整</h2>
    <div id="editHint" class="meta"></div>
    <div class="two"><div class="field"><label>姓名</label><input id="editName"></div><div class="field"><label>目前等級</label><input id="editLevel" type="number" min="1"></div></div>
    <div class="two"><div class="field"><label>座號</label><input id="editSeat" type="number" min="1"></div><div class="field"><label>點數</label><input id="editPoints" type="number"></div></div>
    <div class="actions"><button class="good" onclick="changeLevel(1)">+1級</button><button class="blue" onclick="changePoints(1)">+1點</button><button class="blue" onclick="changePoints(5)">+5點</button><button class="bad" onclick="changePoints(-1)">-1點</button><button onclick="saveEdit()">儲存學生資料</button><button class="bad" onclick="deleteStudent()">刪除學生</button></div>
    <hr><h3>所屬班級／團隊</h3><div id="membershipGrid"></div>
    <hr><h3>照片</h3><input id="photoInput" type="file" accept="image/*" onchange="setPhoto(event)">
    <div id="studentProfileMini"></div>
   </div>
   <div class="card"><h2>點名總覽表</h2>
    <div class="three"><div class="field"><label>起始日期</label><input id="attStart" type="date"></div><div class="field"><label>週數</label><input id="attWeeks" type="number" value="10" min="1"></div><div class="field"><label>&nbsp;</label><button onclick="generateWeeks()">產生每週日期</button></div></div>
    <div id="dateChips" class="actions"></div><div class="att-wrap"><table id="attTable" class="att-table"></table></div>
   </div>
  </section>
 </div>
</section>

<section id="studentView" class="hidden"><div class="card">
 <div class="three"><div class="field"><label>學校</label><select id="studentSchoolFilter"></select></div><div class="field"><label>年級／班級</label><select id="studentGradeFilter"></select></div><div class="field"><label>學生</label><select id="studentSelect"></select></div></div>
 <div id="studentPage"></div>
</div></section>

<section id="levelsView" class="hidden"><div class="grid"><aside class="card"><h2>等級清單</h2><div class="actions"><button class="primary" onclick="addLevel()">新增一級</button><button class="bad" onclick="deleteLastLevel()">刪除最後一級</button><button onclick="resetLevels()">恢復預設50級</button></div><div id="levelList" class="level-list"></div></aside><section class="card"><h2>編輯等級內容</h2><div id="levelEditor"></div></section></div></section>

<section id="manageView" class="hidden"><div class="grid"><div class="card"><h2>學校選單管理</h2><input id="newSchoolName" placeholder="新增學校"><button class="primary" onclick="addSchool()">新增</button><div id="schoolManage"></div></div><div class="card"><h2>年級／班級選單管理</h2><input id="newGradeName" placeholder="新增年級/班級，例如：四年級"><button class="primary" onclick="addGrade()">新增</button><div id="gradeManage"></div><hr><h2>年度升級</h2><button class="blue" onclick="promoteGrades()">三→四、四→五、五→六</button></div></div></section>
</main>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="app-v17.js?v=34.4-js-repair"></script>
</body>
</html>
