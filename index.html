<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Battle 排笛系統 Version B.1</title><link rel="manifest" href="manifest.json"><style>
:root{--bg:#fff8ef;--card:#fffdf9;--line:#ead8c7;--ink:#2b211b;--muted:#77695f;--brand:#b46b24;--green:#5d9b61;--red:#b6544d;--blue:#3f79bd}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}header{position:sticky;top:0;z-index:10;background:#fff8eff2;border-bottom:1px solid var(--line);padding:12px 16px}.head{max-width:1280px;margin:auto;display:flex;gap:12px;align-items:center;justify-content:space-between}.brand{display:flex;gap:10px;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:#8d572a;display:grid;place-items:center;font-size:24px}h1{font-size:22px;margin:0}.sub,.meta{font-size:12px;color:var(--muted);font-weight:800}.tools{display:flex;gap:8px;flex-wrap:wrap}button,input,select,textarea{font:inherit}button{border:0;border-radius:999px;padding:10px 14px;font-weight:900;background:#e8dccb;cursor:pointer}button.primary{background:var(--brand);color:white}button.good{background:var(--green);color:white}button.bad{background:var(--red);color:white}button.blue{background:var(--blue);color:white}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:10px;background:white}main{max-width:1280px;margin:18px auto 70px;padding:0 16px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:16px;box-shadow:0 10px 24px #6339171a}.view{display:none}.view.on{display:block}.grid{display:grid;grid-template-columns:380px 1fr;gap:16px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat b{font-size:32px;display:block}.list{display:grid;gap:10px;max-height:520px;overflow:auto}.item{display:grid;grid-template-columns:48px 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:16px;background:white;padding:10px;cursor:pointer}.item.active{outline:2px solid var(--brand)}.avatar{width:48px;height:48px;border-radius:15px;background:#eadfce;display:grid;place-items:center;font-weight:1000;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.badge,.pill{border-radius:999px;padding:5px 10px;font-weight:900;background:#1f1a17;color:white}.pill{background:#efe2cf;color:var(--ink);display:inline-block}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.checkgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:8px}.check{display:flex;gap:8px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:9px;background:#fffaf4}.check input{width:auto}.attwrap{overflow:auto;border:1px solid var(--line);border-radius:16px}.att{border-collapse:collapse;min-width:880px;width:100%;background:white}.att th,.att td{border:1px solid var(--line);padding:8px;text-align:center}.att th:first-child,.att td:first-child{position:sticky;left:0;background:#fffaf4;text-align:left;min-width:260px}.serial{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:50%;background:#efe2cf;font-weight:1000;margin-right:6px}.status{display:inline-block;border-radius:999px;min-width:38px;padding:5px 8px;background:#e8dccb;font-weight:900}.present{background:#d8ecd6}.absent{background:#f1d2ce}.late{background:#f0dfc8}.leave{background:#d8e6fa}.ability{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.arow{display:grid;grid-template-columns:65px 1fr 38px;gap:8px;align-items:center}@media(max-width:900px){.head{display:block}.grid,.two,.three,.stats,.ability{grid-template-columns:1fr}.tools{margin-top:10px}}
</style></head><body><header><div class="head"><div class="brand"><div class="logo">🐶</div><div><h1>Battle 排笛教學管理系統</h1><div class="sub">Version B.1｜New Core</div></div></div><div class="tools"><select id="view"><option value="dash">班級控制台</option><option value="student">學生個人頁</option><option value="levels">等級目標管理</option><option value="calendar">行事曆</option><option value="notes">備註／紀錄</option><option value="display">展示頁</option><option value="sync">雲端同步／備份</option><option value="manage">學校／班級管理</option></select><button onclick="render()">重整</button><button class="primary" onclick="saveCloud()">Firebase 儲存</button><button onclick="loadCloud()">Firebase 讀取</button><button onclick="exportBackup()">匯出備份</button><button onclick="imp.click()">匯入</button><input id="imp" type="file" accept=".json" style="display:none" onchange="importBackup(event)"></div></div></header><main>
<div class="card"><h2>班級篩選</h2><div class="three"><div><label>學校</label><select id="fschool"></select></div><div><label>班級／團隊</label><select id="fclass"></select></div><div><label>操作</label><button class="blue" onclick="selectTop()">選排行榜第一名</button></div></div></div>
<div class="stats"><div class="card stat"><b id="stCount">0</b><span>學生數</span></div><div class="card stat"><b id="stAvg">0</b><span>平均等級</span></div><div class="card stat"><b id="stMax">0</b><span>最高等級</span></div><div class="card stat"><b id="stPts">0</b><span>班級總點數</span></div></div>
<section id="dash" class="view on"><div class="grid"><aside><div class="card"><h2>新增學生</h2><p class="meta" id="addHint"></p><div class="two"><input id="newName" placeholder="姓名"><input id="newSeat" type="number" placeholder="座號"></div><div class="two"><input id="newLevel" type="number" value="1"><input id="newPts" type="number" value="0"></div><button class="primary" style="width:100%;margin-top:10px" onclick="addStudent()">新增學生</button></div><div class="card"><h2>學生名單</h2><div id="slist" class="list"></div></div><div class="card"><h2>排行榜</h2><div id="rlist" class="list"></div></div></aside><section><div class="card"><h2>學生資料</h2><div id="editor"></div></div><div class="card"><h2>點名總覽表</h2><div class="three"><input id="attStart" type="date"><input id="attWeeks" type="number" value="10"><button class="blue" onclick="genWeeks()">產生每週日期</button></div><div class="actions"><input id="manualDate" type="date" style="max-width:190px"><button onclick="addDate()">新增上課日</button></div><div id="dateChips" class="actions"></div><div class="attwrap"><table id="att" class="att"></table></div></div></section></div></section>
<section id="student" class="view"><div class="card"><h2>學生個人頁</h2><div class="three"><select id="pschool"></select><select id="pclass"></select><select id="pstudent"></select></div><div id="profile"></div></div></section>
<section id="levels" class="view"><div class="grid"><aside class="card"><h2>等級清單</h2><div class="actions"><button class="primary" onclick="addLevel()">新增一級</button><button class="bad" onclick="delLevel()">刪除最後一級</button><button onclick="resetLevels()">恢復預設50級</button></div><div id="levelsList" class="list"></div></aside><div class="card"><h2>等級內容</h2><div id="levelEdit"></div></div></div></section>
<section id="calendar" class="view"><div class="card"><h2>行事曆</h2><div class="three"><input id="evDate" type="date"><select id="evType"><option>演出</option><option>考試</option><option>練習</option><option>其他</option></select><input id="evTitle" placeholder="標題"></div><button class="primary" onclick="addEvent()">新增事件</button></div><div class="card"><div id="events" class="list"></div></div></section>
<section id="notes" class="view"><div class="card"><h2>備註／紀錄</h2><textarea id="noteText" rows="5"></textarea><button class="primary" onclick="addNote()">新增紀錄</button></div><div class="card"><div id="notesList" class="list"></div></div></section>
<section id="display" class="view"><div class="card"><h2>展示頁</h2><div id="board"></div></div></section>
<section id="sync" class="view"><div class="card"><h2>雲端同步／備份</h2><label>Google Apps Script 同步網址</label><input id="syncUrl" placeholder="https://script.google.com/macros/s/.../exec"><div class="actions"><button class="primary" onclick="saveSync()">儲存同步網址</button><button onclick="testFirebase()">測試 Firebase</button><button onclick="saveCloud()">Firebase 儲存</button><button onclick="loadCloud()">Firebase 讀取</button></div><p id="syncStatus" class="meta"></p></div></section>
<section id="manage" class="view"><div class="grid"><div class="card"><h2>學校管理</h2><div class="two"><input id="newSchool"><button class="primary" onclick="addSchool()">新增學校</button></div><div id="schoolsManage"></div></div><div class="card"><h2>班級／團隊管理</h2><div class="two"><input id="newClass"><button class="primary" onclick="addClass()">新增班級</button></div><div id="classesManage"></div><hr><button class="blue" onclick="promote()">年度升級 三→四、四→五、五→六</button></div></div></section>
</main><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="version-b.js?v=20260430-b2"></script></body></html>
