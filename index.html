<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教學系統 v2.0</title>

<style>
body { margin:0; font-family:sans-serif; background:#F7F3EF;}
.container{display:flex;height:100vh;}
.sidebar{width:220px;background:#7FC8A9;color:white;padding:20px;}
.sidebar button{width:100%;margin:8px 0;padding:10px;border:none;border-radius:10px;background:white;color:#333;cursor:pointer;}
.content{flex:1;padding:20px;overflow:auto;}
.card{background:white;border-radius:16px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.name{font-size:20px;font-weight:bold;}
.points{float:right;font-size:22px;color:#F5C542;}
.sub{font-size:12px;color:#666;}
.btn{margin:5px;padding:6px 10px;border:none;border-radius:8px;cursor:pointer;}
.green{background:#7FC8A9;color:white;}
.blue{background:#7DA6FF;color:white;}
.red{background:#FF8A8A;color:white;}
textarea{width:100%;border-radius:10px;padding:10px;}
</style>
</head>

<body>
<div class="container">
<div class="sidebar">
<h2>🎵 教學系統</h2>
<button onclick="setPage('class')">上課</button>
<button onclick="setPage('exam')">升級考試</button>
<button onclick="setPage('settings')">設定</button>
</div>

<div class="content" id="app"></div>
</div>

<script>
let state = JSON.parse(localStorage.getItem("app")) || {
  classes:[{id:1,name:"三年級"},{id:2,name:"排笛隊"}],
  students:[{id:1,name:"任琪"}],
  enrollments:[{studentId:1,classId:1},{studentId:1,classId:2}],
  points:{1:10},
  settings:{add1:1,add5:5,minus:-1,upgradeReward:5}
};

function save(){localStorage.setItem("app",JSON.stringify(state));}

function getStudentsInClass(classId){
  return state.enrollments.filter(e=>e.classId==classId)
  .map(e=>state.students.find(s=>s.id==e.studentId));
}

function addPoint(id,val){
  state.points[id]=(state.points[id]||0)+val;
  save();render();
}

let page="class";
function setPage(p){page=p;render();}

function render(){
  const app=document.getElementById("app");
  if(page==="class") renderClass(app);
  if(page==="exam") app.innerHTML="<h2>升級考試（下一版）</h2>";
  if(page==="settings") app.innerHTML="<h2>設定</h2>";
}

function renderClass(app){
  app.innerHTML=`
  <h2>📅 上課</h2>
  <div class="card">
  課程：
  <select id="classSelect" onchange="render()">
  ${state.classes.map(c=>`<option value="${c.id}">${c.name}</option>`).join("")}
  </select>
  </div>
  <div class="card">
  📝 今日紀錄
  <textarea></textarea>
  </div>
  `;

  const classId=document.getElementById("classSelect").value;
  const students=getStudentsInClass(classId);

  students.forEach(s=>{
    const div=document.createElement("div");
    const point=state.points[s.id]||0;
    div.className="card";
    div.innerHTML=`
    <div class="name">${s.name}<span class="points">⭐ ${point}</span></div>
    <div>
    <button class="btn green" onclick="addPoint(${s.id},${state.settings.add1})">+1</button>
    <button class="btn blue" onclick="addPoint(${s.id},${state.settings.add5})">+5</button>
    <button class="btn red" onclick="addPoint(${s.id},${state.settings.minus})">-1</button>
    </div>
    `;
    app.appendChild(div);
  });
}

render();
</script>
</body>
</html>
