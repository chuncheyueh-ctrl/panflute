<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教學管理系統 v1.3</title>
  <style>
    :root{
      --bg:#fff8ea; --panel:#ffffff; --ink:#2f2a24; --muted:#7a6f61;
      --primary:#68b9c8; --primary-dark:#2f8799; --accent:#ffd66b; --accent2:#ffec9e;
      --pink:#ffb8c8; --green:#a8d8a8; --danger:#e55e68; --line:#f0dfbd;
      --shadow:0 14px 34px rgba(106,79,35,.12); --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:"Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;background:radial-gradient(circle at top left,#fff0b6 0,#fff8ea 34%,#edfaff 100%);color:var(--ink)}
    button,input,select,textarea{font:inherit} button{cursor:pointer;border:0;border-radius:14px;padding:10px 14px;background:var(--primary);color:white;font-weight:800;box-shadow:var(--shadow);touch-action:manipulation}
    button:hover{filter:brightness(.98);transform:translateY(-1px)}
    button.secondary{background:#fff;border:1px solid var(--line);color:var(--ink)} button.warn{background:var(--danger)} button.gold{background:var(--accent);color:#5b4212} button.ghost{background:transparent;color:var(--primary-dark);box-shadow:none;border:1px dashed var(--primary)}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px 12px;background:#fffdf8;color:var(--ink);outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(104,185,200,.17)}
    textarea{min-height:86px;resize:vertical}.small{font-size:13px;color:var(--muted)} .muted{color:var(--muted)}
    .app{display:grid;grid-template-columns:282px 1fr;min-height:100vh}.sidebar{padding:22px;background:rgba(255,255,255,.72);backdrop-filter:blur(16px);border-right:1px solid rgba(240,223,189,.85);position:sticky;top:0;height:100vh;overflow:auto}.brand{background:linear-gradient(135deg,#fff,#fff4ce);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:18px}.brand h1{font-size:22px;margin:0 0 6px}.brand .subtitle{color:var(--muted);font-size:14px}.nav{display:grid;gap:8px}.nav button{background:transparent;color:var(--ink);box-shadow:none;text-align:left;padding:12px 14px;border-radius:16px}.nav button.active,.nav button:hover{background:#fff;box-shadow:var(--shadow);color:var(--primary-dark)}
    .main{padding:28px;max-width:1320px;width:100%;margin:auto}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}.page-title{font-size:30px;font-weight:950;margin:0}.spark{display:inline-block;animation:float 2.4s ease-in-out infinite}@keyframes float{50%{transform:translateY(-4px) rotate(6deg)}}
    .grid{display:grid;gap:16px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}.card{background:rgba(255,255,255,.9);border:1px solid rgba(240,223,189,.95);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.card h2,.card h3{margin:0 0 12px}.row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.field{flex:1;min-width:160px;margin-bottom:10px}.pill{display:inline-flex;gap:6px;align-items:center;border-radius:999px;background:#fff3c3;color:#5b4212;padding:7px 10px;font-weight:900}.table-wrap{overflow:auto}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{text-align:left;color:var(--muted);font-size:13px;padding:0 10px;white-space:nowrap}.table td{background:#fff;padding:10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:middle}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}.actions{display:flex;gap:6px;flex-wrap:wrap}.stat{font-size:28px;font-weight:950}.shop{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}.reward{background:linear-gradient(180deg,#fff,#fff5d4);border:1px solid var(--line);border-radius:20px;padding:14px;position:relative;overflow:hidden}.reward:before{content:"🎁";position:absolute;right:10px;top:6px;font-size:36px;opacity:.2}.coin{font-weight:950;color:#8a6500}.hidden{display:none!important}.notice{border:1px dashed var(--primary);background:#eefbff;border-radius:16px;padding:12px;color:#315f68}.danger-note{border:1px dashed var(--danger);background:#fff1f2;border-radius:16px;padding:12px;color:#8a2e35}.query-wrap{max-width:940px;margin:0 auto}.student-hero{background:linear-gradient(135deg,#fff,#fff1bd 48%,#eafaff);border-radius:28px;padding:22px;border:1px solid var(--line);box-shadow:var(--shadow)}
    .level-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.level-tabs button{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}.level-tabs button.active{background:var(--primary);color:#fff}
    .mini-card{border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px}.list{display:grid;gap:10px}.divider{height:1px;background:var(--line);margin:14px 0}.calendar-event{border-left:6px solid var(--primary);background:#fff;border-radius:16px;padding:12px;border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .type-badge{border-radius:999px;background:#eefbff;color:#315f68;padding:4px 8px;font-size:12px;font-weight:900}.type-考試{background:#fff1c7;color:#7a5400}.type-演出{background:#ffe6ed;color:#8a334b}.type-停課{background:#eee;color:#555}.type-補課{background:#eaffea;color:#2d6b31}.type-兌換日{background:#fff0b8;color:#7a5400}
    svg.radar{width:100%;max-width:360px;height:auto;display:block;margin:auto}.radar-label{font-size:12px;fill:#51483e;font-weight:700}.radar-score{font-size:11px;fill:#7a6f61}
    @media(max-width:980px){.app{grid-template-columns:220px 1fr}.sidebar{padding:16px}.main{padding:18px}.grid.three,.grid.four{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.nav{grid-template-columns:repeat(2,1fr)}.main{padding:16px}.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.page-title{font-size:24px}.table{font-size:14px}.brand h1{font-size:20px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1 id="brandName">🎵 教學管理系統</h1>
      <div id="brandSubtitle" class="subtitle">可愛穩定重構版 v1.3</div>
    </div>
    <div class="nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1 class="page-title" id="pageTitle"><span class="spark">⭐</span> 首頁</h1>
      <div class="pill">目前資料存在這台瀏覽器</div>
    </div>
    <div id="content"></div>
  </main>
</div>
<script>
(() => {
'use strict';
const KEY='bt_music_teaching_system_v1';
const $=(id)=>document.getElementById(id);
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);
const esc=(s='')=>String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const deepCopy=o=>JSON.parse(JSON.stringify(o));
const msg=(text)=>setTimeout(()=>alert(text),0);
const active = (arr)=>arr.filter(x=>x.active!==false && x.isActive!==false);

const defaultFields=[
  {id:'f_name',name:'名稱',type:'text',active:true,order:1},
  {id:'f_goal',name:'能力指標',type:'textarea',active:true,order:2},
  {id:'f_skill',name:'技巧重點',type:'textarea',active:true,order:3},
  {id:'f_rhythm',name:'節奏能力',type:'textarea',active:true,order:4},
  {id:'f_range',name:'音域範圍',type:'text',active:true,order:5},
  {id:'f_repertoire',name:'建議曲目',type:'textarea',active:true,order:6},
  {id:'f_pass',name:'通過標準',type:'textarea',active:true,order:7},
  {id:'f_note',name:'老師備註',type:'textarea',active:true,order:8},
  {id:'f_bonus',name:'通過獎勵點數',type:'number',active:true,order:9}
];
const makeLevels=()=>{
  const levels=[];
  for(let i=1;i<=50;i++) levels.push({id:'e'+i,stage:'初中階',number:i,fields:{f_name:`第${i}等`,f_goal:i===1?'能認識排笛持笛姿勢與基本吹奏方向':'',f_bonus:i%10===0?'5':'3'},active:true});
  for(let i=1;i<=15;i++) levels.push({id:'p'+i,stage:'演奏家',number:i,fields:{f_name:`演奏家第${i}級`,f_goal:'',f_bonus:i%5===0?'10':'6'},active:true});
  return levels;
};
const defaults=()=>({
  settings:{systemName:'教學管理系統',subtitle:'可愛穩定重構版 v1.3'},
  schools:[
    {id:'s1',name:'中正國小',active:true},
    {id:'s2',name:'銅蘭國小',active:true},
    {id:'s3',name:'康樂國小',active:true},
    {id:'s4',name:'豐裡國小',active:true},
    {id:'s5',name:'富源國小',active:true}
  ],
  units:[
    {id:'u1',schoolId:'s1',name:'三年級',order:1,active:true},
    {id:'u2',schoolId:'s2',name:'四年級',order:1,active:true}
  ],
  students:[
    {id:'st1',name:'王小明',schoolId:'s1',unitId:'u1',seat:'01',code:'A30518',password:'1476',stage:'初中階',level:12,pointsCurrent:30,pointsEarned:30,pointsSpent:0,note:'',active:true}
  ],
  rewards:[
    {id:'r1',name:'貼紙',cost:5,stock:30,active:true,note:'小獎勵'},
    {id:'r2',name:'鉛筆',cost:10,stock:15,active:true,note:''},
    {id:'r3',name:'神秘禮物',cost:50,stock:5,active:true,note:'兌換日領取'}
  ],
  levelFields:defaultFields,
  levels:makeLevels(),
  pointLogs:[{id:'pl1',studentId:'st1',schoolId:'s1',unitId:'u1',date:today(),points:30,reason:'示範點數',note:'初始資料'}],
  redemptions:[], scores:[], attendance:[], lessons:[], events:[]
});
let db=loadDB();
let state={page:'home', selectedSchoolId: db.schools[0]?.id||'', selectedUnitSchoolId: db.schools[0]?.id||'', selectedCourseUnitId:'', selectedStudentSchoolId: db.schools[0]?.id||'', selectedStudentUnitId:'', selectedLevelStage:'初中階'};

function loadDB(){
  let data=null;
  try{ data=JSON.parse(localStorage.getItem(KEY)||'null'); }catch(e){ data=null; }
  if(!data) data=defaults();
  data.settings ||= {systemName:'教學管理系統',subtitle:'可愛穩定版'};
  data.schools ||= []; data.units ||= data.courseUnits || []; data.students ||= []; data.rewards ||= [];
  data.levelFields ||= defaultFields; data.levels ||= makeLevels(); data.pointLogs ||= []; data.redemptions ||= []; data.scores ||= []; data.attendance ||= [];
  data.lessons ||= []; data.events ||= [];
  // migrate old property names
  data.schools.forEach(x=>{ if(x.isActive!==undefined && x.active===undefined) x.active=x.isActive; if(x.active===undefined) x.active=true; });
  data.units.forEach(x=>{ if(x.isActive!==undefined && x.active===undefined) x.active=x.isActive; if(x.active===undefined) x.active=true; });
  data.rewards.forEach(x=>{ if(x.isActive!==undefined && x.active===undefined) x.active=x.isActive; if(x.active===undefined) x.active=true; });
  data.students.forEach(s=>{
    if(s.active===undefined) s.active=true;
    s.pointsCurrent=Number(s.pointsCurrent||0); s.pointsEarned=Number(s.pointsEarned ?? s.pointsTotalEarned ?? s.pointsCurrent ?? 0); s.pointsSpent=Number(s.pointsSpent ?? s.pointsTotalSpent ?? 0);
    s.stage ||= '初中階'; s.level=Number(s.level||1); s.password ||= String(Math.floor(1000+Math.random()*9000)); s.code ||= genCode();
  });
  save(data); return data;
}
function save(data=db){ localStorage.setItem(KEY,JSON.stringify(data)); }
function render(){ renderBrand(); renderNav(); const page=pages.find(p=>p.id===state.page)||pages[0]; $('pageTitle').innerHTML=`<span class="spark">${page.icon}</span> ${page.label}`; $('content').innerHTML=page.render(); if(page.after) page.after(); }
function renderBrand(){ $('brandName').textContent='🎵 '+(db.settings.systemName||'教學管理系統'); $('brandSubtitle').textContent=db.settings.subtitle||'可愛穩定重構版 v1.3'; document.title=db.settings.systemName||'教學管理系統'; }
function renderNav(){ $('nav').innerHTML=pages.map(p=>`<button class="${state.page===p.id?'active':''}" onclick="App.go('${p.id}')">${p.icon} ${p.label}</button>`).join(''); }
function findSchool(id){return db.schools.find(x=>x.id===id)} function findUnit(id){return db.units.find(x=>x.id===id)} function findStudent(id){return db.students.find(x=>x.id===id)}
function schoolOptions(selected=''){return active(db.schools).map(s=>`<option value="${s.id}" ${s.id===selected?'selected':''}>${esc(s.name)}</option>`).join('')}
function unitOptions(schoolId, selected=''){return active(db.units).filter(u=>u.schoolId===schoolId).sort((a,b)=>(+a.order||0)-(+b.order||0)).map(u=>`<option value="${u.id}" ${u.id===selected?'selected':''}>${esc(u.name)}</option>`).join('')}
function studentOptions(selected=''){return active(db.students).map(s=>`<option value="${s.id}" ${s.id===selected?'selected':''}>${esc(s.name)}（${esc(findSchool(s.schoolId)?.name||'')} / ${esc(findUnit(s.unitId)?.name||'')}）</option>`).join('')}
function genCode(){ return 'S'+Math.floor(100000+Math.random()*900000); }
function genPass(){ return String(Math.floor(1000+Math.random()*9000)); }
function schoolName(id){return findSchool(id)?.name||'未指定'} function unitName(id){return findUnit(id)?.name||'未指定'}
function confirmDelete(text){ return confirm(text+'\n\n注意：刪除後無法復原；若已有相關資料，建議改用停用。'); }

const pages=[
 {id:'home',label:'首頁',icon:'⭐',render:homePage},
 {id:'settings',label:'系統設定',icon:'⚙️',render:settingsPage},
 {id:'schools',label:'學校管理',icon:'🏫',render:schoolsPage},
 {id:'units',label:'課程單位',icon:'📚',render:unitsPage},
 {id:'students',label:'學生管理',icon:'🧒',render:studentsPage},
 {id:'attendance',label:'出席紀錄',icon:'📅',render:attendancePage},
 {id:'lessons',label:'課程紀錄',icon:'📝',render:lessonsPage},
 {id:'calendar',label:'行事曆',icon:'🗓️',render:calendarPage},
 {id:'scores',label:'成績輸入',icon:'📊',render:scoresPage},
 {id:'levels',label:'分級檢定',icon:'🎓',render:levelsPage},
 {id:'points',label:'點數獎勵',icon:'🪙',render:pointsPage},
 {id:'rewards',label:'獎品兌換',icon:'🎁',render:rewardsPage},
 {id:'query',label:'個人查詢',icon:'🔍',render:queryPage},
 {id:'stats',label:'統計總覽',icon:'📈',render:statsPage}
];

function homePage(){
 const studentCount=active(db.students).length, schoolCount=active(db.schools).length, unitCount=active(db.units).length, pointSum=db.students.reduce((a,s)=>a+(+s.pointsCurrent||0),0);
 return `<div class="grid four">
  ${statCard('🏫',schoolCount,'學校')}${statCard('📚',unitCount,'課程單位')}${statCard('🧒',studentCount,'學生')}${statCard('🪙',pointSum,'目前總點數')}
 </div><div class="card" style="margin-top:16px"><h2>今天可以做什麼？</h2><div class="grid three">
  <button onclick="App.go('lessons')">📝 新增課程紀錄</button><button class="gold" onclick="App.go('points')">🪙 快速加點</button><button class="secondary" onclick="App.go('calendar')">🗓️ 查看行事曆</button>
 </div></div>`;
}
function statCard(icon,num,label){return `<div class="card"><div class="stat">${icon} ${num}</div><div class="small">${label}</div></div>`}
function settingsPage(){return `<div class="grid two"><div class="card"><h2>⚙️ 系統設定</h2><div class="field"><label>系統名稱</label><input id="setName" value="${esc(db.settings.systemName)}"></div><div class="field"><label>副標題</label><input id="setSub" value="${esc(db.settings.subtitle)}"></div><button onclick="App.saveSettings()">儲存設定</button></div><div class="card"><h2>💾 備份資料</h2><p class="small">目前資料存在這台瀏覽器。建議正式使用前定期匯出備份。</p><div class="actions"><button class="gold" onclick="App.exportData()">匯出 JSON 備份</button><button class="secondary" onclick="document.getElementById('importFile').click()">匯入 JSON</button><button class="warn" onclick="App.resetDemo()">重置示範資料</button></div><input type="file" id="importFile" accept="application/json" class="hidden" onchange="App.importData(event)"></div></div>`}
function schoolsPage(){return `<div class="card"><h2>🏫 學校管理</h2><div class="row"><div class="field"><label>新增學校名稱</label><input id="newSchool" placeholder="例如：銅蘭國小"></div><button onclick="App.addSchool()">新增</button></div><div class="table-wrap"><table class="table"><thead><tr><th>名稱</th><th>狀態</th><th>操作</th></tr></thead><tbody>${db.schools.map(s=>`<tr><td><input value="${esc(s.name)}" onchange="App.updateSchool('${s.id}',this.value)"></td><td>${s.active!==false?'啟用':'停用'}</td><td><div class="actions"><button class="secondary" onclick="App.toggleSchool('${s.id}')">${s.active!==false?'停用':'啟用'}</button><button class="warn" onclick="App.deleteSchool('${s.id}')">刪除</button></div></td></tr>`).join('')}</tbody></table></div></div>`}
function unitsPage(){ const sid= state.selectedUnitSchoolId || active(db.schools)[0]?.id || ''; state.selectedUnitSchoolId=sid; const rows=db.units.filter(u=>u.schoolId===sid).sort((a,b)=>(+a.order||0)-(+b.order||0)); return `<div class="card"><h2>📚 課程單位管理</h2><div class="row"><div class="field"><label>學校</label><select id="unitSchool" onchange="App.setUnitSchool(this.value)">${schoolOptions(sid)}</select></div><div class="field"><label>課程單位名稱</label><input id="newUnit" placeholder="例如：社團課、排笛隊、三年級排笛課"></div><div class="field"><label>排序</label><input id="unitOrder" type="number" value="${rows.length+1}"></div><button onclick="App.addUnit()">新增</button></div><div class="table-wrap"><table class="table"><thead><tr><th>學校</th><th>名稱</th><th>排序</th><th>狀態</th><th>操作</th></tr></thead><tbody>${rows.map(u=>`<tr><td>${esc(schoolName(u.schoolId))}</td><td><input value="${esc(u.name)}" onchange="App.updateUnit('${u.id}','name',this.value)"></td><td><input type="number" value="${+u.order||1}" onchange="App.updateUnit('${u.id}','order',this.value)"></td><td>${u.active!==false?'啟用':'停用'}</td><td><div class="actions"><button class="secondary" onclick="App.toggleUnit('${u.id}')">${u.active!==false?'停用':'啟用'}</button><button class="warn" onclick="App.deleteUnit('${u.id}')">刪除</button></div></td></tr>`).join('')}</tbody></table></div></div>`}
function studentsPage(){ const sid=state.selectedStudentSchoolId || active(db.schools)[0]?.id || ''; state.selectedStudentSchoolId=sid; const units=unitOptions(sid,state.selectedStudentUnitId); if(!state.selectedStudentUnitId || !active(db.units).some(u=>u.id===state.selectedStudentUnitId&&u.schoolId===sid)) state.selectedStudentUnitId=active(db.units).find(u=>u.schoolId===sid)?.id||''; return `<div class="card"><h2>🧒 學生管理</h2><div class="grid three"><div class="field"><label>姓名</label><input id="stuName"></div><div class="field"><label>學校</label><select id="stuSchool" onchange="App.setStudentSchool(this.value)">${schoolOptions(sid)}</select></div><div class="field"><label>課程單位</label><select id="stuUnit">${unitOptions(sid,state.selectedStudentUnitId)}</select></div><div class="field"><label>座號/編號</label><input id="stuSeat"></div><div class="field"><label>階段</label><select id="stuStage"><option>初中階</option><option>演奏家</option></select></div><div class="field"><label>等級</label><input id="stuLevel" type="number" value="1"></div></div><button onclick="App.addStudent()">新增學生</button></div><div class="card" style="margin-top:16px"><h3>學生列表</h3><div class="table-wrap"><table class="table"><thead><tr><th>學生</th><th>學校/課程</th><th>查詢資料</th><th>等級</th><th>點數</th><th>操作</th></tr></thead><tbody>${db.students.map(s=>`<tr><td><input value="${esc(s.name)}" onchange="App.updateStudent('${s.id}','name',this.value)"><div class="small">${esc(s.seat||'')}</div></td><td>${esc(schoolName(s.schoolId))}<br><span class="small">${esc(unitName(s.unitId))}</span></td><td><b>${esc(s.code)}</b> / <b>${esc(s.password)}</b></td><td>${esc(s.stage)} 第${+s.level||1}${s.stage==='演奏家'?'級':'等'}</td><td class="coin">${+s.pointsCurrent||0}</td><td><div class="actions"><button class="secondary" onclick="App.resetStudentPass('${s.id}')">重設密碼</button><button class="secondary" onclick="App.copyQuery('${s.id}')">複製查詢</button><button class="warn" onclick="App.toggleStudent('${s.id}')">${s.active!==false?'停用':'啟用'}</button></div></td></tr>`).join('')}</tbody></table></div></div>`}
function attendancePage(){ const sid=state.attSchool||active(db.schools)[0]?.id||''; const uidv=state.attUnit||active(db.units).find(u=>u.schoolId===sid)?.id||''; const date=state.attDate||today(); const students=active(db.students).filter(s=>s.schoolId===sid && s.unitId===uidv); return `<div class="card"><h2>📅 出席紀錄</h2><div class="row"><div class="field"><label>日期</label><input type="date" id="attDate" value="${date}" onchange="App.attDate=this.value"></div><div class="field"><label>學校</label><select id="attSchool" onchange="App.setAttSchool(this.value)">${schoolOptions(sid)}</select></div><div class="field"><label>課程單位</label><select id="attUnit" onchange="App.setAttUnit(this.value)">${unitOptions(sid,uidv)}</select></div></div><div class="table-wrap"><table class="table"><thead><tr><th>學生</th><th>狀態</th><th>操作</th></tr></thead><tbody>${students.map(s=>`<tr><td>${esc(s.name)}</td><td>${esc(getAttendance(s.id,date)||'未記錄')}</td><td><div class="actions">${['出席','缺席','遲到','請假'].map(x=>`<button class="secondary" onclick="App.markAttendance('${s.id}','${x}')">${x}</button>`).join('')}</div></td></tr>`).join('')||`<tr><td colspan="3">尚無學生</td></tr>`}</tbody></table></div></div>`}
function lessonsPage(){ const rows=[...db.lessons].sort((a,b)=>String(b.date).localeCompare(String(a.date))); return `<div class="grid two"><div class="card"><h2>📝 新增課程紀錄</h2><div class="field"><label>日期</label><input type="date" id="lessonDate" value="${today()}"></div><div class="field"><label>學校</label><select id="lessonSchool" onchange="App.lessonSchoolChange(this.value)">${schoolOptions(state.lessonSchool||active(db.schools)[0]?.id||'')}</select></div><div class="field"><label>課程單位</label><select id="lessonUnit">${unitOptions(state.lessonSchool||active(db.schools)[0]?.id||'', state.lessonUnit||'')}</select></div><div class="field"><label>上課內容</label><textarea id="lessonContent" placeholder="今天教了什麼？"></textarea></div><div class="field"><label>學生狀況</label><textarea id="lessonStatus" placeholder="學生反應、秩序、學習狀況"></textarea></div><div class="field"><label>作業 / 練習目標</label><textarea id="lessonHomework" placeholder="回家練習內容"></textarea></div><div class="field"><label>下次提醒</label><textarea id="lessonNext" placeholder="下次要注意什麼？"></textarea></div><button onclick="App.addLesson()">儲存課程紀錄</button></div><div class="card"><h2>📚 歷史紀錄</h2><div class="list">${rows.map(l=>`<div class="mini-card"><b>${esc(l.date)}｜${esc(schoolName(l.schoolId))} / ${esc(unitName(l.unitId))}</b><div class="small">上課內容</div><div>${esc(l.content||'')}</div><div class="small">作業 / 下次提醒</div><div>${esc(l.homework||'')} ${l.next?'｜'+esc(l.next):''}</div><div class="actions" style="margin-top:8px"><button class="warn" onclick="App.deleteLesson('${l.id}')">刪除</button></div></div>`).join('')||'<div class="notice">尚無課程紀錄</div>'}</div></div></div>`}
function calendarPage(){ const rows=[...db.events].sort((a,b)=>String(a.date).localeCompare(String(b.date))); return `<div class="grid two"><div class="card"><h2>🗓️ 新增行事曆事件</h2><div class="field"><label>日期</label><input type="date" id="eventDate" value="${today()}"></div><div class="field"><label>事件名稱</label><input id="eventTitle" placeholder="例如：期末檢定、演出、停課"></div><div class="field"><label>類型</label><select id="eventType"><option>上課</option><option>考試</option><option>演出</option><option>停課</option><option>補課</option><option>兌換日</option></select></div><div class="field"><label>學校</label><select id="eventSchool"><option value="">全部/不指定</option>${schoolOptions('')}</select></div><div class="field"><label>備註</label><textarea id="eventNote"></textarea></div><button onclick="App.addEvent()">新增事件</button></div><div class="card"><h2>📌 事件列表</h2><div class="list">${rows.map(e=>`<div class="calendar-event"><b>${esc(e.date)}｜${esc(e.title)}</b> <span class="type-badge type-${esc(e.type)}">${esc(e.type)}</span><div class="small">${e.schoolId?esc(schoolName(e.schoolId)):'全部學校'}</div><div>${esc(e.note||'')}</div><div class="actions" style="margin-top:8px"><button class="warn" onclick="App.deleteEvent('${e.id}')">刪除</button></div></div>`).join('')||'<div class="notice">尚無行事曆事件</div>'}</div></div></div>`}
function scoresPage(){ return `<div class="card"><h2>📊 成績輸入</h2><div class="grid three"><div class="field"><label>學生</label><select id="scoreStudent">${studentOptions()}</select></div><div class="field"><label>考試名稱</label><input id="scoreName" value="能力測驗"></div><div class="field"><label>日期</label><input type="date" id="scoreDate" value="${today()}"></div>${['音準','節奏','氣息','指法','視譜','音樂表現'].map((x,i)=>`<div class="field"><label>${x}</label><input type="number" id="score${i}" min="0" max="100" value="80"></div>`).join('')}<div class="field" style="grid-column:1/-1"><label>評語</label><textarea id="scoreNote"></textarea></div></div><button onclick="App.addScore()">儲存成績</button></div><div class="card" style="margin-top:16px"><h3>最近成績</h3><div class="table-wrap"><table class="table"><thead><tr><th>日期</th><th>學生</th><th>名稱</th><th>總分</th><th>操作</th></tr></thead><tbody>${[...db.scores].reverse().slice(0,20).map(sc=>`<tr><td>${esc(sc.date)}</td><td>${esc(findStudent(sc.studentId)?.name||'')}</td><td>${esc(sc.name)}</td><td>${Math.round(sc.values.reduce((a,b)=>a+(+b||0),0)/6)}</td><td><button class="warn" onclick="App.deleteScore('${sc.id}')">刪除</button></td></tr>`).join('')||'<tr><td colspan="5">尚無成績</td></tr>'}</tbody></table></div></div>`}
function levelsPage(){ const fields=[...db.levelFields].sort((a,b)=>(+a.order||0)-(+b.order||0)); const stage=state.selectedLevelStage; const levels=db.levels.filter(l=>l.stage===stage).sort((a,b)=>a.number-b.number); const first=levels[0]; return `<div class="grid two"><div class="card"><h2>🎓 分級欄位設定</h2><div class="row"><div class="field"><label>新增欄位名稱</label><input id="newFieldName" placeholder="例如：呼吸控制"></div><div class="field"><label>類型</label><select id="newFieldType"><option value="text">單行文字</option><option value="textarea">多行文字</option><option value="number">數字</option></select></div><button onclick="App.addLevelField()">新增欄位</button></div><div class="table-wrap"><table class="table"><thead><tr><th>欄位</th><th>排序</th><th>狀態</th><th>操作</th></tr></thead><tbody>${fields.map(f=>`<tr><td><input value="${esc(f.name)}" onchange="App.updateLevelField('${f.id}','name',this.value)"></td><td><input type="number" value="${+f.order||1}" onchange="App.updateLevelField('${f.id}','order',this.value)"></td><td>${f.active!==false?'顯示':'隱藏'}</td><td><button class="secondary" onclick="App.toggleLevelField('${f.id}')">${f.active!==false?'隱藏':'顯示'}</button></td></tr>`).join('')}</tbody></table></div></div><div class="card"><h2>📘 等級內容設定</h2><div class="level-tabs"><button class="${stage==='初中階'?'active':''}" onclick="App.setLevelStage('初中階')">初中階 1～50等</button><button class="${stage==='演奏家'?'active':''}" onclick="App.setLevelStage('演奏家')">演奏家 1～15級</button></div><div class="field"><label>選擇等級</label><select id="levelSelect" onchange="App.renderLevelEditor(this.value)">${levels.map(l=>`<option value="${l.id}">${esc(l.fields?.f_name || (l.stage==='演奏家'?`演奏家第${l.number}級`:`第${l.number}等`))}</option>`).join('')}</select></div><div id="levelEditor">${levelEditorHTML(first?.id)}</div></div></div>`}
function levelEditorHTML(levelId){ const l=db.levels.find(x=>x.id===levelId); if(!l) return '<div class="notice">找不到等級</div>'; const fields=[...db.levelFields].filter(f=>f.active!==false).sort((a,b)=>(+a.order||0)-(+b.order||0)); return fields.map(f=>`<div class="field"><label>${esc(f.name)}</label>${f.type==='textarea'?`<textarea onchange="App.updateLevel('${l.id}','${f.id}',this.value)">${esc(l.fields?.[f.id]||'')}</textarea>`:`<input type="${f.type==='number'?'number':'text'}" value="${esc(l.fields?.[f.id]||'')}" onchange="App.updateLevel('${l.id}','${f.id}',this.value)">`}</div>`).join(''); }
function pointsPage(){return `<div class="card"><h2>🪙 點數獎勵</h2><div class="grid three"><div class="field"><label>學生</label><select id="pointStudent">${studentOptions()}</select></div><div class="field"><label>點數變動</label><input id="pointAmount" type="number" value="1"></div><div class="field"><label>原因</label><select id="pointReason"><option>出席</option><option>帶樂器</option><option>完成練習</option><option>考試進步</option><option>升級成功</option><option>演出參與</option><option>特殊表現</option><option>修正</option></select></div><div class="field" style="grid-column:1/-1"><label>備註</label><input id="pointNote"></div></div><button onclick="App.addPoints()">儲存點數</button></div><div class="card" style="margin-top:16px"><h3>點數紀錄</h3><div class="table-wrap"><table class="table"><thead><tr><th>日期</th><th>學生</th><th>點數</th><th>原因</th><th>備註</th></tr></thead><tbody>${[...db.pointLogs].reverse().slice(0,30).map(l=>`<tr><td>${esc(l.date)}</td><td>${esc(findStudent(l.studentId)?.name||'')}</td><td class="coin">${+l.points>0?'+':''}${+l.points}</td><td>${esc(l.reason)}</td><td>${esc(l.note||'')}</td></tr>`).join('')}</tbody></table></div></div>`}
function rewardsPage(){return `<div class="grid two"><div class="card"><h2>🎁 獎品管理</h2><div class="row"><div class="field"><label>名稱</label><input id="rewardName"></div><div class="field"><label>點數</label><input id="rewardCost" type="number" value="5"></div><div class="field"><label>庫存</label><input id="rewardStock" type="number" value="10"></div><button onclick="App.addReward()">新增獎品</button></div><div class="shop">${db.rewards.map(r=>`<div class="reward"><h3>${esc(r.name)}</h3><div class="coin">${+r.cost} 點</div><div class="small">庫存：${+r.stock}</div><div class="actions" style="margin-top:10px"><button class="secondary" onclick="App.toggleReward('${r.id}')">${r.active!==false?'下架':'上架'}</button><button class="warn" onclick="App.deleteReward('${r.id}')">刪除</button></div></div>`).join('')}</div></div><div class="card"><h2>🛒 兌換獎品</h2><div class="field"><label>學生</label><select id="redeemStudent">${studentOptions()}</select></div><div class="field"><label>獎品</label><select id="redeemReward">${active(db.rewards).map(r=>`<option value="${r.id}">${esc(r.name)}（${+r.cost}點 / 庫存${+r.stock}）</option>`).join('')}</select></div><button class="gold" onclick="App.redeem()">確認兌換</button><div class="divider"></div><h3>兌換紀錄</h3><div class="list">${[...db.redemptions].reverse().slice(0,15).map(r=>`<div class="mini-card">${esc(r.date)}｜${esc(findStudent(r.studentId)?.name||'')} 兌換 ${esc(r.rewardName)} <span class="coin">-${+r.cost}</span></div>`).join('')||'<div class="notice">尚無兌換紀錄</div>'}</div></div></div>`}
function queryPage(){return `<div class="query-wrap"><div class="student-hero"><h2>🔍 個人查詢</h2><div class="grid two"><div class="field"><label>查詢碼</label><input id="qCode" placeholder="例如 A30518"></div><div class="field"><label>查詢密碼</label><input id="qPass" placeholder="例如 1476"></div></div><button onclick="App.queryStudent()">查詢我的資料</button></div><div id="queryResult" style="margin-top:16px"></div></div>`}
function statsPage(){ const bySchool=active(db.schools).map(s=>({name:s.name,count:active(db.students).filter(st=>st.schoolId===s.id).length})); const ranking=[...db.students].sort((a,b)=>(+b.pointsCurrent||0)-(+a.pointsCurrent||0)).slice(0,10); return `<div class="grid two"><div class="card"><h2>📈 統計總覽</h2><div class="grid two">${statCard('🧒',active(db.students).length,'總學生數')}${statCard('🪙',db.students.reduce((a,s)=>a+(+s.pointsCurrent||0),0),'目前總點數')}${statCard('📚',active(db.units).length,'課程單位')}${statCard('🎁',db.redemptions.length,'兌換次數')}</div></div><div class="card"><h2>🏫 各校人數</h2>${bySchool.map(x=>`<div class="mini-card"><b>${esc(x.name)}</b>：${x.count} 人</div>`).join('')}</div><div class="card"><h2>🏆 點數排行榜</h2>${ranking.map((s,i)=>`<div class="mini-card">${i+1}. ${esc(s.name)} <span class="coin">${+s.pointsCurrent||0} 點</span></div>`).join('')||'<div class="notice">尚無學生</div>'}</div><div class="card"><h2>📌 最近行事曆</h2>${[...db.events].sort((a,b)=>String(a.date).localeCompare(String(b.date))).slice(0,8).map(e=>`<div class="mini-card">${esc(e.date)}｜${esc(e.title)}</div>`).join('')||'<div class="notice">尚無事件</div>'}</div></div>`}

function getAttendance(studentId,date){ return db.attendance.find(a=>a.studentId===studentId&&a.date===date)?.status; }
function radarSVG(values=[0,0,0,0,0,0]){ const labels=['音準','節奏','氣息','指法','視譜','表現']; const cx=180,cy=180,R=110; const pts=values.map((v,i)=>{const ang=-Math.PI/2+i*Math.PI*2/6; const r=R*(Math.max(0,Math.min(100,+v||0))/100); return [cx+Math.cos(ang)*r, cy+Math.sin(ang)*r];}); const grid=[.25,.5,.75,1].map(k=>{const p=labels.map((_,i)=>{const a=-Math.PI/2+i*Math.PI*2/6; return `${cx+Math.cos(a)*R*k},${cy+Math.sin(a)*R*k}`}).join(' '); return `<polygon points="${p}" fill="none" stroke="#f0dfbd"/>`;}).join(''); const axes=labels.map((lab,i)=>{const a=-Math.PI/2+i*Math.PI*2/6; const x=cx+Math.cos(a)*(R+35), y=cy+Math.sin(a)*(R+35); const x2=cx+Math.cos(a)*R, y2=cy+Math.sin(a)*R; return `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#f0dfbd"/><text x="${x}" y="${y}" text-anchor="middle" class="radar-label">${lab}</text><text x="${x}" y="${y+14}" text-anchor="middle" class="radar-score">${values[i]||0}</text>`}).join(''); return `<svg class="radar" viewBox="0 0 360 360">${grid}${axes}<polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="rgba(104,185,200,.35)" stroke="#378899" stroke-width="3"/><circle cx="${cx}" cy="${cy}" r="3" fill="#378899"/></svg>`; }
function showStudentResult(s){ const scores=db.scores.filter(sc=>sc.studentId===s.id); const latest=scores[scores.length-1]; const nextReward=active(db.rewards).filter(r=>+r.stock>0).sort((a,b)=>a.cost-b.cost).find(r=>r.cost>s.pointsCurrent); const can=active(db.rewards).filter(r=>r.cost<=s.pointsCurrent && r.stock>0); const level=db.levels.find(l=>l.stage===s.stage&&l.number==s.level); const fields=[...db.levelFields].filter(f=>f.active!==false).sort((a,b)=>(+a.order||0)-(+b.order||0)); $('queryResult').innerHTML=`<div class="grid two"><div class="card"><h2>哈囉，${esc(s.name)}！</h2><div class="stat">⭐ ${+s.pointsCurrent||0} 點</div><div class="small">目前點數</div>${nextReward?`<p class="pill">距離 ${esc(nextReward.name)} 還差 ${nextReward.cost-s.pointsCurrent} 點</p>`:''}<h3>🎁 可以兌換</h3><div class="shop">${can.map(r=>`<div class="reward"><b>${esc(r.name)}</b><div class="coin">${+r.cost}點</div></div>`).join('')||'<div class="notice">目前點數還不能兌換獎品，繼續加油！</div>'}</div></div><div class="card"><h2>🎓 等級</h2><div class="stat">${esc(s.stage)} 第${+s.level}${s.stage==='演奏家'?'級':'等'}</div>${level?fields.map(f=>level.fields?.[f.id]?`<div class="mini-card"><b>${esc(f.name)}</b><br>${esc(level.fields[f.id])}</div>`:'').join(''):''}</div><div class="card"><h2>📊 六角能力</h2>${latest?radarSVG(latest.values):'<div class="notice">尚無成績資料</div>'}</div><div class="card"><h2>🪙 最近點數</h2>${db.pointLogs.filter(l=>l.studentId===s.id).slice(-8).reverse().map(l=>`<div class="mini-card">${esc(l.date)}｜${esc(l.reason)} <span class="coin">${+l.points>0?'+':''}${+l.points}</span></div>`).join('')||'<div class="notice">尚無點數紀錄</div>'}</div></div>`; }

window.App={
 go(id){state.page=id; render();}, saveSettings(){db.settings.systemName=$('setName').value.trim()||'教學管理系統'; db.settings.subtitle=$('setSub').value.trim(); save(); render();},
 exportData(){const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='teaching-system-backup-'+today()+'.json'; a.click(); URL.revokeObjectURL(a.href);},
 importData(e){const file=e.target.files[0]; if(!file)return; const r=new FileReader(); r.onload=()=>{try{const data=JSON.parse(r.result); db=data; save(); msg('匯入完成'); render();}catch(err){msg('檔案格式不正確');}}; r.readAsText(file);},
 resetDemo(){if(confirm('確定重置成示範資料？目前資料會被覆蓋。')){db=defaults(); save(); location.reload();}},
 addSchool(){const name=$('newSchool').value.trim(); if(!name)return msg('請輸入學校名稱'); const id=uid(); db.schools.push({id,name,active:true}); state.selectedUnitSchoolId=id; state.selectedStudentSchoolId=id; save(); render();},
 updateSchool(id,name){const s=findSchool(id); if(s){s.name=name.trim()||s.name; save(); renderBrand();}}, toggleSchool(id){const s=findSchool(id); if(s){s.active=s.active===false; save(); render();}}, deleteSchool(id){if(!confirmDelete('確定刪除這間學校？'))return; db.schools=db.schools.filter(s=>s.id!==id); db.units=db.units.filter(u=>u.schoolId!==id); db.students=db.students.filter(s=>s.schoolId!==id); save(); state.selectedUnitSchoolId=active(db.schools)[0]?.id||''; render();},
 setUnitSchool(id){state.selectedUnitSchoolId=id; render();}, addUnit(){const sid=$('unitSchool').value; const name=$('newUnit').value.trim(); if(!sid||!name)return msg('請選學校並輸入課程單位名稱'); db.units.push({id:uid(),schoolId:sid,name,order:+$('unitOrder').value||1,active:true}); state.selectedUnitSchoolId=sid; save(); render();}, updateUnit(id,key,val){const u=findUnit(id); if(u){u[key]=key==='order'?+val:val; save();}}, toggleUnit(id){const u=findUnit(id); if(u){u.active=u.active===false; save(); render();}}, deleteUnit(id){if(!confirmDelete('確定刪除這個課程單位？'))return; db.units=db.units.filter(u=>u.id!==id); db.students=db.students.filter(s=>s.unitId!==id); save(); render();},
 setStudentSchool(id){state.selectedStudentSchoolId=id; state.selectedStudentUnitId=active(db.units).find(u=>u.schoolId===id)?.id||''; const cache={name:$('stuName')?.value||'',seat:$('stuSeat')?.value||'',level:$('stuLevel')?.value||1,stage:$('stuStage')?.value||'初中階'}; render(); setTimeout(()=>{if($('stuName')){$('stuName').value=cache.name; $('stuSeat').value=cache.seat; $('stuLevel').value=cache.level; $('stuStage').value=cache.stage;}},0);},
 addStudent(){const name=$('stuName').value.trim(); const schoolId=$('stuSchool').value; const unitId=$('stuUnit').value; if(!name)return msg('請輸入學生姓名'); if(!schoolId||!unitId)return msg('請選擇學校與課程單位'); db.students.push({id:uid(),name,schoolId,unitId,seat:$('stuSeat').value.trim(),code:genCode(),password:genPass(),stage:$('stuStage').value,level:+$('stuLevel').value||1,pointsCurrent:0,pointsEarned:0,pointsSpent:0,note:'',active:true}); state.selectedStudentSchoolId=schoolId; state.selectedStudentUnitId=unitId; save(); render();},
 updateStudent(id,key,val){const s=findStudent(id); if(s){s[key]=val; save();}}, resetStudentPass(id){const s=findStudent(id); if(s){s.password=genPass(); save(); render();}}, copyQuery(id){const s=findStudent(id); if(!s)return; navigator.clipboard?.writeText(`${s.name} 查詢碼：${s.code} / 密碼：${s.password}`); msg('已複製查詢資料');}, toggleStudent(id){const s=findStudent(id); if(s){s.active=s.active===false; save(); render();}},
 setAttSchool(id){state.attSchool=id; state.attUnit=active(db.units).find(u=>u.schoolId===id)?.id||''; render();}, setAttUnit(id){state.attUnit=id; render();}, markAttendance(studentId,status){const date=$('attDate').value; const old=db.attendance.find(a=>a.studentId===studentId&&a.date===date); if(old) old.status=status; else db.attendance.push({id:uid(),studentId,date,status,schoolId:findStudent(studentId).schoolId,unitId:findStudent(studentId).unitId}); save(); render();},
 lessonSchoolChange(id){state.lessonSchool=id; render();}, addLesson(){const l={id:uid(),date:$('lessonDate').value,schoolId:$('lessonSchool').value,unitId:$('lessonUnit').value,content:$('lessonContent').value,status:$('lessonStatus').value,homework:$('lessonHomework').value,next:$('lessonNext').value}; db.lessons.push(l); save(); render();}, deleteLesson(id){db.lessons=db.lessons.filter(x=>x.id!==id); save(); render();},
 addEvent(){const title=$('eventTitle').value.trim(); if(!title)return msg('請輸入事件名稱'); db.events.push({id:uid(),date:$('eventDate').value,title,type:$('eventType').value,schoolId:$('eventSchool').value,note:$('eventNote').value}); save(); render();}, deleteEvent(id){db.events=db.events.filter(x=>x.id!==id); save(); render();},
 addScore(){const studentId=$('scoreStudent').value; const values=[0,1,2,3,4,5].map(i=>+$('score'+i).value||0); db.scores.push({id:uid(),studentId,name:$('scoreName').value,date:$('scoreDate').value,values,note:$('scoreNote').value}); save(); render();}, deleteScore(id){db.scores=db.scores.filter(x=>x.id!==id); save(); render();},
 setLevelStage(stage){state.selectedLevelStage=stage; render();}, renderLevelEditor(id){$('levelEditor').innerHTML=levelEditorHTML(id);}, addLevelField(){const name=$('newFieldName').value.trim(); if(!name)return; db.levelFields.push({id:'f_'+uid(),name,type:$('newFieldType').value,active:true,order:db.levelFields.length+1}); save(); render();}, updateLevelField(id,key,val){const f=db.levelFields.find(x=>x.id===id); if(f){f[key]=key==='order'?+val:val; save();}}, toggleLevelField(id){const f=db.levelFields.find(x=>x.id===id); if(f){f.active=f.active===false; save(); render();}}, updateLevel(lid,fid,val){const l=db.levels.find(x=>x.id===lid); if(l){l.fields ||= {}; l.fields[fid]=val; save();}},
 addPoints(){const s=findStudent($('pointStudent').value); const pts=+$('pointAmount').value||0; if(!s)return; s.pointsCurrent=(+s.pointsCurrent||0)+pts; if(pts>0)s.pointsEarned=(+s.pointsEarned||0)+pts; if(pts<0)s.pointsSpent=(+s.pointsSpent||0)+Math.abs(pts); db.pointLogs.push({id:uid(),studentId:s.id,schoolId:s.schoolId,unitId:s.unitId,date:today(),points:pts,reason:$('pointReason').value,note:$('pointNote').value}); save(); render();},
 addReward(){const name=$('rewardName').value.trim(); if(!name)return; db.rewards.push({id:uid(),name,cost:+$('rewardCost').value||0,stock:+$('rewardStock').value||0,active:true,note:''}); save(); render();}, toggleReward(id){const r=db.rewards.find(x=>x.id===id); if(r){r.active=r.active===false; save(); render();}}, deleteReward(id){db.rewards=db.rewards.filter(x=>x.id!==id); save(); render();}, redeem(){const s=findStudent($('redeemStudent').value); const r=db.rewards.find(x=>x.id===$('redeemReward').value); if(!s||!r)return; if(r.stock<=0)return msg('庫存不足'); if(s.pointsCurrent<r.cost)return msg(`點數不足，還差 ${r.cost-s.pointsCurrent} 點`); s.pointsCurrent-=r.cost; s.pointsSpent=(+s.pointsSpent||0)+r.cost; r.stock-=1; db.redemptions.push({id:uid(),studentId:s.id,rewardId:r.id,rewardName:r.name,date:today(),cost:r.cost}); db.pointLogs.push({id:uid(),studentId:s.id,schoolId:s.schoolId,unitId:s.unitId,date:today(),points:-r.cost,reason:'兌換獎品',note:r.name}); save(); render();},
 queryStudent(){const code=$('qCode').value.trim(); const pass=$('qPass').value.trim(); const s=db.students.find(x=>x.code===code&&x.password===pass&&x.active!==false); if(!s){$('queryResult').innerHTML='<div class="danger-note">查不到資料，請確認查詢碼與密碼。</div>'; return;} showStudentResult(s);}
};
render();
