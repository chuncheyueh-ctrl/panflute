<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教學管理系統 v1</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#fff8ea; --panel:#ffffff; --ink:#2f2a24; --muted:#7a6f61;
      --primary:#68b9c8; --primary-dark:#378899; --accent:#ffd66b; --pink:#ffb8c8;
      --green:#a8d8a8; --danger:#ff7b7b; --line:#f0dfbd; --shadow:0 10px 25px rgba(106,79,35,.10);
      --radius:22px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:"Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;background:radial-gradient(circle at top left,#fff2bf 0,#fff8ea 32%,#eefbff 100%);color:var(--ink)}
    button,input,select,textarea{font:inherit} button{cursor:pointer;border:0;border-radius:14px;padding:10px 14px;background:var(--primary);color:white;font-weight:700;box-shadow:var(--shadow)}
    button.secondary{background:#fff;border:1px solid var(--line);color:var(--ink)} button.warn{background:var(--danger)} button.gold{background:var(--accent);color:#5b4212} button.ghost{background:transparent;color:var(--primary-dark);box-shadow:none;border:1px dashed var(--primary)}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px 12px;background:#fffdf8;color:var(--ink)} textarea{min-height:86px;resize:vertical}.small{font-size:13px;color:var(--muted)}
    .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{padding:22px;background:rgba(255,255,255,.66);backdrop-filter:blur(16px);border-right:1px solid rgba(240,223,189,.85);position:sticky;top:0;height:100vh;overflow:auto}.brand{background:linear-gradient(135deg,#fff,#fff4ce);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:18px}.brand h1{font-size:22px;margin:0 0 6px}.brand .subtitle{color:var(--muted);font-size:14px}.nav{display:grid;gap:8px}.nav button{background:transparent;color:var(--ink);box-shadow:none;text-align:left;padding:12px 14px;border-radius:16px}.nav button.active,.nav button:hover{background:#fff;box-shadow:var(--shadow);color:var(--primary-dark)}
    .main{padding:26px;max-width:1280px;width:100%;margin:auto}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}.page-title{font-size:30px;font-weight:900;margin:0}.spark{display:inline-block;animation:float 2.4s ease-in-out infinite}@keyframes float{50%{transform:translateY(-4px) rotate(6deg)}}
    .grid{display:grid;gap:16px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:rgba(255,255,255,.88);border:1px solid rgba(240,223,189,.95);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.card h2,.card h3{margin:0 0 12px}.row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.field{flex:1;min-width:160px;margin-bottom:10px}.pill{display:inline-flex;gap:6px;align-items:center;border-radius:999px;background:#fff3c3;color:#5b4212;padding:7px 10px;font-weight:800}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{text-align:left;color:var(--muted);font-size:13px;padding:0 10px}.table td{background:#fff;padding:10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}.actions{display:flex;gap:6px;flex-wrap:wrap}.stat{font-size:28px;font-weight:900}.shop{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}.reward{background:linear-gradient(180deg,#fff,#fff5d4);border:1px solid var(--line);border-radius:20px;padding:14px;position:relative;overflow:hidden}.reward:before{content:"🎁";position:absolute;right:10px;top:6px;font-size:34px;opacity:.22}.coin{font-weight:900;color:#8a6500}.hidden{display:none!important}.notice{border:1px dashed var(--primary);background:#eefbff;border-radius:16px;padding:12px;color:#315f68}.query-wrap{max-width:940px;margin:0 auto}.student-hero{background:linear-gradient(135deg,#fff,#fff1bd 48%,#eafaff);border-radius:28px;padding:22px;border:1px solid var(--line);box-shadow:var(--shadow)}
    @media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.nav{grid-template-columns:repeat(2,1fr)}.main{padding:16px}.grid.two,.grid.three{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.page-title{font-size:24px}.table{font-size:14px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1 id="brandName">🎵 教學管理系統</h1>
      <div id="brandSubtitle" class="subtitle">可愛穩定版 v1</div>
    </div>
    <div class="nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1 class="page-title" id="pageTitle"><span class="spark">⭐</span> 首頁</h1>
      <div class="pill">目前資料存在這台瀏覽器</div>
    </div>
    <div id="content"></div>
  </main>
</div>
<script>
const KEY='bt_music_teaching_system_v1';
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);
const deepCopy=o=>JSON.parse(JSON.stringify(o));
const defaultFields=[
  {id:'f_name',name:'名稱',type:'text',active:true,order:1},
  {id:'f_goal',name:'能力指標',type:'textarea',active:true,order:2},
  {id:'f_skill',name:'技巧重點',type:'textarea',active:true,order:3},
  {id:'f_rhythm',name:'節奏能力',type:'textarea',active:true,order:4},
  {id:'f_range',name:'音域範圍',type:'text',active:true,order:5},
  {id:'f_piece',name:'建議曲目',type:'textarea',active:true,order:6},
  {id:'f_pass',name:'通過標準',type:'textarea',active:true,order:7},
  {id:'f_note',name:'老師備註',type:'textarea',active:true,order:8},
  {id:'f_points',name:'通過獎勵點數',type:'number',active:true,order:9}
];
const makeLevels=()=>{
  const arr=[]; for(let i=1;i<=50;i++)arr.push({id:'L'+i,stage:'初中階',number:i,fields:{f_name:`第${i}等`,f_goal:'可自行編輯能力指標',f_points:i%10===0?5:3}});
  for(let i=1;i<=15;i++)arr.push({id:'P'+i,stage:'演奏家',number:i,fields:{f_name:`演奏家第${i}級`,f_goal:'可自行編輯演奏家級能力指標',f_points:10}});
  return arr;
};
let db=load();
function load(){
  const raw=localStorage.getItem(KEY); if(raw) return JSON.parse(raw);
  const s1={id:uid(),name:'中正國小',active:true}; const u1={id:uid(),schoolId:s1.id,name:'三年級排笛課',order:1,active:true};
  const stu={id:uid(),name:'王小明',schoolId:s1.id,unitId:u1.id,seat:'01',queryCode:'A30518',queryPassword:'4721',stage:'初中階',level:12,pointsCurrent:28,pointsEarned:38,pointsSpent:10,note:'示範學生',active:true};
  return {settings:{systemName:'🎵 BattleTone 教學管理系統',subtitle:'排笛課程 × 點數獎勵 × 分級檢定'},schools:[s1],units:[u1],students:[stu],levelFields:defaultFields,levels:makeLevels(),pointLogs:[{id:uid(),studentId:stu.id,date:today(),points:5,reason:'升級成功',note:'示範紀錄'}],rewards:[{id:uid(),name:'星星貼紙',cost:5,stock:20,active:true,note:''},{id:uid(),name:'小鉛筆',cost:10,stock:12,active:true,note:''},{id:uid(),name:'神秘禮物',cost:50,stock:3,active:true,note:'高級獎品'}],redemptions:[],scores:[{id:uid(),studentId:stu.id,date:today(),exam:'示範小測驗',pitch:80,rhythm:75,breath:82,finger:78,reading:70,expression:85,total:78,comment:'音色穩定，節奏可再加強。'}],attendance:[]};
}
function save(){localStorage.setItem(KEY,JSON.stringify(db)); render();}
function byId(arr,id){return arr.find(x=>x.id===id)}
function schoolName(id){return byId(db.schools,id)?.name||'未指定'} function unitName(id){return byId(db.units,id)?.name||'未指定'}
const pages=[['dashboard','🏠 總覽'],['settings','⚙️ 系統設定'],['schools','🏫 學校管理'],['units','📚 課程單位'],['students','🧒 學生管理'],['levels','🎓 分級檢定'],['points','⭐ 點數獎勵'],['rewards','🎁 獎品兌換'],['scores','📊 成績輸入'],['attendance','📅 出席紀錄'],['query','🔍 個人查詢']];
let current='dashboard';
function nav(){document.getElementById('nav').innerHTML=pages.map(p=>`<button class="${current===p[0]?'active':''}" onclick="current='${p[0]}';render()">${p[1]}</button>`).join('');}
function render(){nav(); document.getElementById('brandName').textContent=db.settings.systemName; document.getElementById('brandSubtitle').textContent=db.settings.subtitle; const p=pages.find(x=>x[0]===current); document.getElementById('pageTitle').innerHTML=`<span class="spark">⭐</span> ${p?p[1]:'頁面'}`; const c=document.getElementById('content'); c.innerHTML=views[current](); setTimeout(afterRender,0);}
function afterRender(){ if(current==='query'&&window.queryChartData){drawRadar('queryChart',window.queryChartData)} if(current==='dashboard') drawRadar('dashChart',[80,75,82,78,70,85]); }
function drawRadar(id,data){const el=document.getElementById(id); if(!el) return; new Chart(el,{type:'radar',data:{labels:['音準','節奏','氣息','指法','視譜','音樂表現'],datasets:[{label:'能力值',data,fill:true}]},options:{responsive:true,scales:{r:{min:0,max:100,ticks:{stepSize:20}}}}});}
function optionSchools(sel=''){return db.schools.filter(x=>x.active).map(x=>`<option value="${x.id}" ${sel===x.id?'selected':''}>${x.name}</option>`).join('')}
function optionUnits(schoolId='',sel=''){return db.units.filter(x=>x.active&&(!schoolId||x.schoolId===schoolId)).sort((a,b)=>a.order-b.order).map(x=>`<option value="${x.id}" ${sel===x.id?'selected':''}>${x.name}</option>`).join('')}
function optionStudents(sel=''){return db.students.filter(x=>x.active).map(x=>`<option value="${x.id}" ${sel===x.id?'selected':''}>${x.name}｜${schoolName(x.schoolId)}｜${unitName(x.unitId)}</option>`).join('')}
const views={
 dashboard(){const pts=[...db.students].sort((a,b)=>b.pointsCurrent-a.pointsCurrent).slice(0,5); return `<div class="grid three"><div class="card"><div class="small">學生數</div><div class="stat">${db.students.length}</div></div><div class="card"><div class="small">學校數</div><div class="stat">${db.schools.filter(x=>x.active).length}</div></div><div class="card"><div class="small">獎品數</div><div class="stat">${db.rewards.filter(x=>x.active).length}</div></div></div><div class="grid two" style="margin-top:16px"><div class="card"><h2>⭐ 點數排行榜</h2><table class="table"><tbody>${pts.map((s,i)=>`<tr><td>${i+1}</td><td>${s.name}</td><td class="coin">${s.pointsCurrent} 點</td></tr>`).join('')}</tbody></table></div><div class="card"><h2>📊 示範六角能力圖</h2><canvas id="dashChart"></canvas></div></div>`},
 settings(){return `<div class="card"><h2>⚙️ 系統設定</h2><div class="field"><label>系統名稱</label><input id="setName" value="${db.settings.systemName}"></div><div class="field"><label>副標題</label><input id="setSub" value="${db.settings.subtitle}"></div><button onclick="db.settings.systemName=setName.value;db.settings.subtitle=setSub.value;save()">儲存設定</button><button class="warn" onclick="if(confirm('確定清空並回到示範資料？')){localStorage.removeItem(KEY);db=load();save()}">重置示範資料</button></div>`},
 schools(){return `<div class="card"><h2>🏫 學校管理</h2><div class="row"><div class="field"><input id="newSchool" placeholder="新增學校名稱"></div><button onclick="if(newSchool.value.trim()){db.schools.push({id:uid(),name:newSchool.value.trim(),active:true});save()}">新增</button></div><table class="table"><thead><tr><th>名稱</th><th>狀態</th><th>操作</th></tr></thead><tbody>${db.schools.map(s=>`<tr><td><input value="${s.name}" onchange="sName('${s.id}',this.value)"></td><td>${s.active?'啟用':'停用'}</td><td><button class="secondary" onclick="toggleSchool('${s.id}')">${s.active?'停用':'啟用'}</button></td></tr>`).join('')}</tbody></table></div>`},
 units(){return `<div class="card"><h2>📚 課程單位管理</h2><div class="row"><div class="field"><label>學校</label><select id="unitSchool">${optionSchools()}</select></div><div class="field"><label>課程單位名稱</label><input id="unitName" placeholder="例如：社團課、排笛隊、三年級排笛課"></div><button onclick="addUnit()">新增</button></div><table class="table"><thead><tr><th>學校</th><th>名稱</th><th>排序</th><th>狀態</th><th>操作</th></tr></thead><tbody>${db.units.map(u=>`<tr><td>${schoolName(u.schoolId)}</td><td><input value="${u.name}" onchange="uName('${u.id}',this.value)"></td><td><input type="number" value="${u.order}" onchange="uOrder('${u.id}',this.value)"></td><td>${u.active?'啟用':'停用'}</td><td><button class="secondary" onclick="toggleUnit('${u.id}')">${u.active?'停用':'啟用'}</button></td></tr>`).join('')}</tbody></table></div>`},
 students(){return `<div class="card"><h2>🧒 學生管理</h2><div class="grid three"><div class="field"><label>姓名</label><input id="stuName"></div><div class="field"><label>學校</label><select id="stuSchool" onchange="render()">${optionSchools()}</select></div><div class="field"><label>課程單位</label><select id="stuUnit">${optionUnits()}</select></div><div class="field"><label>座號/編號</label><input id="stuSeat"></div><div class="field"><label>階段</label><select id="stuStage"><option>初中階</option><option>演奏家</option></select></div><div class="field"><label>等級</label><input id="stuLevel" type="number" value="1"></div></div><button onclick="addStudent()">新增學生</button></div><div class="card" style="margin-top:16px"><table class="table"><thead><tr><th>學生</th><th>學校/課程</th><th>查詢資料</th><th>等級</th><th>點數</th><th>操作</th></tr></thead><tbody>${db.students.map(s=>`<tr><td>${s.name}<div class="small">${s.seat||''}</div></td><td>${schoolName(s.schoolId)}<div class="small">${unitName(s.unitId)}</div></td><td><b>${s.queryCode}</b> / <b>${s.queryPassword}</b></td><td>${s.stage} 第${s.level}${s.stage==='初中階'?'等':'級'}</td><td class="coin">${s.pointsCurrent}</td><td class="actions"><button class="secondary" onclick="resetPass('${s.id}')">重設密碼</button><button class="warn" onclick="delStudent('${s.id}')">停用</button></td></tr>`).join('')}</tbody></table></div>`},
 levels(){const fields=db.levelFields.sort((a,b)=>a.order-b.order); const levels=db.levels; return `<div class="grid two"><div class="card"><h2>🧩 等級欄位設定</h2><div class="notice">欄位可改名、新增、排序、隱藏；不直接刪除，避免歷史資料壞掉。</div><div class="row" style="margin-top:12px"><div class="field"><input id="newField" placeholder="新增欄位名稱"></div><button onclick="addField()">新增欄位</button></div><table class="table"><tbody>${fields.map(f=>`<tr><td><input value="${f.name}" onchange="fName('${f.id}',this.value)"></td><td><input type="number" value="${f.order}" onchange="fOrder('${f.id}',this.value)"></td><td><button class="secondary" onclick="fToggle('${f.id}')">${f.active?'隱藏':'啟用'}</button></td></tr>`).join('')}</tbody></table></div><div class="card"><h2>🎓 編輯等級內容</h2><div class="field"><label>選擇等級</label><select id="levelPick" onchange="showLevelEditor(this.value)">${levels.map(l=>`<option value="${l.id}">${l.stage}｜${l.fields.f_name||l.id}</option>`).join('')}</select></div><div id="levelEditor"></div></div></div>`},
 points(){return `<div class="card"><h2>⭐ 點數獎勵</h2><div class="grid three"><div class="field"><label>學生</label><select id="ptStu">${optionStudents()}</select></div><div class="field"><label>點數</label><input id="ptVal" type="number" value="1"></div><div class="field"><label>原因</label><select id="ptReason"><option>出席</option><option>帶樂器</option><option>完成練習</option><option>考試進步</option><option>升級成功</option><option>演出參與</option><option>特殊表現</option><option>修正</option></select></div></div><div class="field"><label>備註</label><input id="ptNote"></div><button class="gold" onclick="addPoints()">加 / 扣點數</button></div><div class="card" style="margin-top:16px"><h2>最近點數紀錄</h2><table class="table"><tbody>${db.pointLogs.slice().reverse().slice(0,20).map(l=>`<tr><td>${l.date}</td><td>${byId(db.students,l.studentId)?.name||'學生'}</td><td class="coin">${l.points>0?'+':''}${l.points}</td><td>${l.reason}</td><td>${l.note||''}</td></tr>`).join('')}</tbody></table></div>`},
 rewards(){return `<div class="grid two"><div class="card"><h2>🎁 獎品小商店</h2><div class="grid two"><input id="rwName" placeholder="獎品名稱"><input id="rwCost" type="number" placeholder="所需點數"><input id="rwStock" type="number" placeholder="庫存"><input id="rwNote" placeholder="備註"></div><button style="margin-top:10px" onclick="addReward()">新增獎品</button><div class="shop" style="margin-top:14px">${db.rewards.map(r=>`<div class="reward"><h3>${r.name}</h3><div class="coin">${r.cost} 點</div><div class="small">庫存：${r.stock}</div><button class="secondary" onclick="toggleReward('${r.id}')">${r.active?'下架':'上架'}</button></div>`).join('')}</div></div><div class="card"><h2>🛒 兌換</h2><div class="field"><label>學生</label><select id="redeemStu">${optionStudents()}</select></div><div class="field"><label>獎品</label><select id="redeemReward">${db.rewards.filter(r=>r.active).map(r=>`<option value="${r.id}">${r.name}｜${r.cost}點｜庫存${r.stock}</option>`).join('')}</select></div><button class="gold" onclick="redeem()">確認兌換</button><h3 style="margin-top:18px">兌換紀錄</h3><table class="table"><tbody>${db.redemptions.slice().reverse().map(x=>`<tr><td>${x.date}</td><td>${byId(db.students,x.studentId)?.name}</td><td>${x.rewardName}</td><td>${x.cost}點</td></tr>`).join('')}</tbody></table></div></div>`},
 scores(){return `<div class="card"><h2>📊 成績輸入</h2><div class="grid three"><div class="field"><label>學生</label><select id="scStu">${optionStudents()}</select></div><div class="field"><label>考試名稱</label><input id="scExam" value="課堂小測驗"></div><div class="field"><label>日期</label><input id="scDate" type="date" value="${today()}"></div>${['pitch:音準','rhythm:節奏','breath:氣息','finger:指法','reading:視譜','expression:音樂表現'].map(x=>{const [id,n]=x.split(':'); return `<div class="field"><label>${n}</label><input id="${id}" type="number" min="0" max="100" value="80"></div>`}).join('')}</div><div class="field"><label>評語</label><textarea id="scComment"></textarea></div><button onclick="addScore()">儲存成績</button></div>`},
 attendance(){return `<div class="card"><h2>📅 出席紀錄</h2><div class="grid three"><div class="field"><label>學生</label><select id="attStu">${optionStudents()}</select></div><div class="field"><label>日期</label><input id="attDate" type="date" value="${today()}"></div><div class="field"><label>狀態</label><select id="attStatus"><option>出席</option><option>缺席</option><option>遲到</option><option>請假</option></select></div></div><button onclick="addAttendance()">儲存出席</button></div><div class="card" style="margin-top:16px"><table class="table"><tbody>${db.attendance.slice().reverse().slice(0,30).map(a=>`<tr><td>${a.date}</td><td>${byId(db.students,a.studentId)?.name}</td><td>${a.status}</td></tr>`).join('')}</tbody></table></div>`},
 query(){return `<div class="query-wrap"><div class="student-hero"><h2>🔍 個人查詢</h2><div class="row"><div class="field"><label>查詢碼</label><input id="qCode" placeholder="例如 A30518"></div><div class="field"><label>查詢密碼</label><input id="qPass" placeholder="例如 4721"></div><button onclick="doQuery()">查詢我的資料</button></div><div class="small">示範：A30518 / 4721</div></div><div id="queryResult" style="margin-top:16px"></div></div>`}
};
function sName(id,v){byId(db.schools,id).name=v;save()} function toggleSchool(id){byId(db.schools,id).active=!byId(db.schools,id).active;save()}
function addUnit(){if(unitName.value.trim()){db.units.push({id:uid(),schoolId:unitSchool.value,name:unitName.value.trim(),order:db.units.length+1,active:true});save()}}
function uName(id,v){byId(db.units,id).name=v;save()} function uOrder(id,v){byId(db.units,id).order=+v;save()} function toggleUnit(id){byId(db.units,id).active=!byId(db.units,id).active;save()}
function addStudent(){const code='S'+Math.floor(100000+Math.random()*899999); const pass=''+Math.floor(1000+Math.random()*8999); db.students.push({id:uid(),name:stuName.value.trim()||'未命名學生',schoolId:stuSchool.value,unitId:stuUnit.value,seat:stuSeat.value,queryCode:code,queryPassword:pass,stage:stuStage.value,level:+stuLevel.value||1,pointsCurrent:0,pointsEarned:0,pointsSpent:0,note:'',active:true});save()}
function resetPass(id){byId(db.students,id).queryPassword=''+Math.floor(1000+Math.random()*8999);save()} function delStudent(id){byId(db.students,id).active=false;save()}
function addField(){if(newField.value.trim()){db.levelFields.push({id:uid(),name:newField.value.trim(),type:'textarea',active:true,order:db.levelFields.length+1});save()}}
function fName(id,v){byId(db.levelFields,id).name=v;save()} function fOrder(id,v){byId(db.levelFields,id).order=+v;save()} function fToggle(id){byId(db.levelFields,id).active=!byId(db.levelFields,id).active;save()}
function showLevelEditor(id){const l=byId(db.levels,id); const fs=db.levelFields.sort((a,b)=>a.order-b.order); document.getElementById('levelEditor').innerHTML=fs.map(f=>`<div class="field ${f.active?'':'hidden'}"><label>${f.name}</label>${f.type==='number'?`<input type="number" value="${l.fields[f.id]||0}" onchange="levelSet('${id}','${f.id}',this.value)">`:`<textarea onchange="levelSet('${id}','${f.id}',this.value)">${l.fields[f.id]||''}</textarea>`}</div>`).join('');}
function levelSet(lid,fid,v){byId(db.levels,lid).fields[fid]=v;localStorage.setItem(KEY,JSON.stringify(db));}
function addPoints(){const s=byId(db.students,ptStu.value); const p=+ptVal.value||0; s.pointsCurrent+=p; if(p>0)s.pointsEarned+=p; else s.pointsSpent+=Math.abs(p); db.pointLogs.push({id:uid(),studentId:s.id,date:today(),points:p,reason:ptReason.value,note:ptNote.value});save()}
function addReward(){db.rewards.push({id:uid(),name:rwName.value||'未命名獎品',cost:+rwCost.value||0,stock:+rwStock.value||0,active:true,note:rwNote.value||''});save()}
function toggleReward(id){byId(db.rewards,id).active=!byId(db.rewards,id).active;save()}
function redeem(){const s=byId(db.students,redeemStu.value), r=byId(db.rewards,redeemReward.value); if(!s||!r)return; if(r.stock<=0)return alert('此獎品目前無庫存'); if(s.pointsCurrent<r.cost)return alert(`點數不足，還差 ${r.cost-s.pointsCurrent} 點`); s.pointsCurrent-=r.cost; s.pointsSpent+=r.cost; r.stock--; db.redemptions.push({id:uid(),studentId:s.id,rewardId:r.id,rewardName:r.name,date:today(),cost:r.cost}); db.pointLogs.push({id:uid(),studentId:s.id,date:today(),points:-r.cost,reason:'兌換獎品',note:r.name}); save()}
function addScore(){const vals=['pitch','rhythm','breath','finger','reading','expression'].map(id=>+document.getElementById(id).value||0); const total=Math.round(vals.reduce((a,b)=>a+b,0)/6); db.scores.push({id:uid(),studentId:scStu.value,date:scDate.value,exam:scExam.value,pitch:vals[0],rhythm:vals[1],breath:vals[2],finger:vals[3],reading:vals[4],expression:vals[5],total,comment:scComment.value});save()}
function addAttendance(){db.attendance.push({id:uid(),studentId:attStu.value,date:attDate.value,status:attStatus.value}); if(attStatus.value==='出席'){const s=byId(db.students,attStu.value); s.pointsCurrent+=1; s.pointsEarned+=1; db.pointLogs.push({id:uid(),studentId:s.id,date:attDate.value,points:1,reason:'出席',note:'出席自動加點'});} save()}
function doQuery(){const s=db.students.find(x=>x.queryCode===qCode.value.trim()&&x.queryPassword===qPass.value.trim()&&x.active); const box=document.getElementById('queryResult'); if(!s){box.innerHTML='<div class="card">查無資料，請確認查詢碼與密碼。</div>';return;} const scores=db.scores.filter(x=>x.studentId===s.id); const last=scores[scores.length-1]; const rewards=db.rewards.filter(r=>r.active&&s.pointsCurrent>=r.cost); const next=db.rewards.filter(r=>r.active&&s.pointsCurrent<r.cost).sort((a,b)=>a.cost-b.cost)[0]; window.queryChartData=last?[last.pitch,last.rhythm,last.breath,last.finger,last.reading,last.expression]:[0,0,0,0,0,0]; box.innerHTML=`<div class="grid two"><div class="card"><h2>哈囉，${s.name}！今天也有進步喔 ✨</h2><div class="stat coin">⭐ ${s.pointsCurrent} 點</div><p>目前階段：${s.stage}｜第${s.level}${s.stage==='初中階'?'等':'級'}</p><h3>🎁 可兌換獎品</h3>${rewards.length?rewards.map(r=>`<span class="pill">${r.name} ${r.cost}點</span>`).join(' '):'<div class="small">目前還沒有可兌換獎品，繼續集點！</div>'}${next?`<p class="notice">距離「${next.name}」還差 ${next.cost-s.pointsCurrent} 點</p>`:''}</div><div class="card"><h2>📊 最近能力圖</h2><canvas id="queryChart"></canvas></div></div><div class="card" style="margin-top:16px"><h2>最近成績</h2>${last?`<b>${last.exam}</b>｜${last.date}｜總分 ${last.total}<p>${last.comment||''}</p>`:'尚無成績'}</div><div class="card" style="margin-top:16px"><h2>最近點數紀錄</h2><table class="table"><tbody>${db.pointLogs.filter(l=>l.studentId===s.id).slice().reverse().slice(0,10).map(l=>`<tr><td>${l.date}</td><td class="coin">${l.points>0?'+':''}${l.points}</td><td>${l.reason}</td><td>${l.note||''}</td></tr>`).join('')}</tbody></table></div>`; setTimeout(()=>drawRadar('queryChart',window.queryChartData),0);}
render(); setTimeout(()=>{const pick=document.getElementById('levelPick'); if(pick)showLevelEditor(pick.value)},0);
</script>
</body>
</html>
